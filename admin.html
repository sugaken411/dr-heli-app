<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>AW109 システム管理</title>
  <style>
    :root { --bg: #f2f2f7; --card: #ffffff; --brand: #d32f2f; --ink: #1c1c1e; --sub: #8e8e93; --blue: #007aff; --line: rgba(60,60,67,0.12); }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    
    header { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--line); flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
    .hdr-btn { background: none; border: none; color: var(--blue); font-weight: bold; cursor: pointer; font-size: 14px; }
    .timer-badge { background: #e5e5ea; padding: 4px 10px; border-radius: 12px; font-family: monospace; font-weight: bold; font-size: 14px; color: var(--ink); }
    
    main { padding: 20px; flex: 1; overflow-y: auto; max-width: 800px; margin: 0 auto; width: 100%; }
    
    .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--line); }
    
    input, select, textarea { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; background: var(--bg); color: var(--ink); font-weight: 600; outline: none; }
    
    button.btn-primary { background: var(--blue); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.2s; }
    button.btn-primary:hover { opacity: 0.8; }
    
    #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-text { font-size: 16px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
    .loader-subtext { font-size: 13px; font-weight: 600; color: var(--sub); text-align: center; max-width: 80%; }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="card" style="width:100%; max-width:320px; text-align:center;">
      <h2 style="margin-top:0; color:var(--ink);">システム管理</h2>
      <p style="color:var(--sub); font-size:14px; margin-bottom:20px;">管理者用アクセスコードを入力</p>
      <input type="password" inputmode="numeric" pattern="[0-9]*" id="login-pin" style="width:100%; margin-bottom:20px; text-align:center; font-size:24px; letter-spacing:8px; background:#fff;" placeholder="****" oninput="toHalfWidth(this)">
      <button type="button" class="btn-primary" onclick="checkLogin()" style="width:100%; padding:16px; font-size:16px;">ログイン 🔓</button>
      <p id="login-err" style="color:var(--brand); font-size:12px; margin-top:12px; display:none; font-weight:bold;">パスワードが違います</p>
    </div>
  </div>

  <div id="global-loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-main-text">通信中...</div>
    <div class="loader-subtext" id="loader-sub-text">システムに接続しています</div>
  </div>

  <header>
    <div style="display:flex; gap:12px; align-items:center;">
      <button type="button" class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
      <button type="button" class="hdr-btn no-print" onclick="fetchLatestData(false, true)">🔄 更新</button>
    </div>
    <div style="font-weight:900;">システム管理 <span style="font-size:10px; background:var(--blue); color:#fff; padding:2px 6px; border-radius:4px; margin-left:4px;">v12.0</span></div>
    <div style="display:flex; gap:12px; align-items:center;">
      <span class="timer-badge" id="lock-timer" title="オートロックまで">10:00</span>
      <button type="button" class="hdr-btn" onclick="location.reload()" style="color:var(--brand);">🔒 ロック</button>
    </div>
  </header>

  <main>
    <div class="card" style="border:2px solid #ffcc00; background:#fffdf0;">
      <h3 style="margin-top:0; color:#d48806; display:flex; align-items:center; gap:6px;">👑 マスタデータ追加</h3>
      <p style="font-size:12px; color:var(--sub); margin-top:-8px; margin-bottom:12px;">※ 追加したデータはすべてのアプリに即座に反映されます。</p>
      
      <div style="display:flex; flex-direction:column; gap:12px;">
        <div>
          <label style="font-size:12px; font-weight:bold; color:var(--sub); display:block; margin-bottom:4px;">種類を選択</label>
          <select id="add-type" style="width:100%; background:#fff;">
            <option value="dr">👨‍⚕️ フライトドクター</option>
            <option value="ns">👩‍⚕️ フライトナース</option>
            <option value="dest">🏥 出場先</option>
            <option value="diagnosis">🩺 現場診断 (病名マスタ)</option>
            <option value="keyword">🔑 キーワード要請</option>
            <option value="pilot">🚁 機長</option>
            <option value="mechanic">🔧 整備士</option>
            <option value="cs">🎧 CS</option>
            <option value="ext_affil">🚒 外部所属 (消防本部など)</option>
            <option value="ext_staff">🧑‍🚒 外部スタッフ (救急隊員など)</option>
            <option value="mail">✉️ メール送信先 (宛先リスト)</option>
          </select>
        </div>
        
        <div>
          <label style="font-size:12px; font-weight:bold; color:var(--sub); display:block; margin-bottom:4px;">値1 (登録する名称)</label>
          <input type="text" id="add-val1" placeholder="名前や施設名を入力" style="width:100%; background:#fff;">
        </div>
        
        <div id="box-val2" style="display:none;">
          <label style="font-size:12px; font-weight:bold; color:var(--sub); display:block; margin-bottom:4px;">値2 (メールアドレス ※メール送信先追加時のみ)</label>
          <input type="email" id="add-val2" placeholder="example@gmail.com" style="width:100%; background:#fff;">
        </div>
        
        <button type="button" class="btn-primary" onclick="addMaster()" style="background:#d48806; padding:14px; margin-top:8px;">＋ マスタデータベースに追加</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:16px;">
        <div>
          <h3 style="margin:0; display:flex; align-items:center; gap:6px;">❓ Q&A 未回答リスト</h3>
          <div style="font-size:12px; color:var(--sub); margin-top:4px;">現場から届いた要望・質問に回答して公開します。</div>
        </div>
        <span style="font-size:11px; color:var(--sub); background:var(--bg); padding:4px 8px; border-radius:4px;">※削除はスプレッドシートから</span>
      </div>
      <div id="qa-list" style="font-size:13px; line-height:1.5; color:var(--sub);">読込中...</div>
    </div>
  </main>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  const PIN_ADMIN = "9999"; 
  const CACHE_KEY = "aw109_admin_cache_v12";
  const CACHE_EXPIRE_MS = 6 * 60 * 60 * 1000;
  
  window.onerror = function(message, source, lineno, colno, error) {
    const errDetail = `Type: GlobalError\nMsg: ${message}\nLine: ${lineno}:${colno}\nStack: ${error ? error.stack : 'N/A'}`;
    sendErrorLog(errDetail); 
    return false;
  };
  window.addEventListener('unhandledrejection', function(event) {
    const reason = event.reason ? (event.reason.stack || event.reason) : 'N/A';
    if(String(reason).includes("Load failed")) return;
    sendErrorLog(`Type: PromiseRejection\nReason: ${reason}`);
  });

  let lockTime = 600; 
  let timerInterval;

  let loaderTimer1, loaderTimer2;
  function showLoader(msg1="通信中...", msg2="データベースに接続しています") {
    document.getElementById("loader-main-text").innerText = msg1;
    document.getElementById("loader-sub-text").innerHTML = msg2;
    document.getElementById("global-loader").style.display = "flex";
    loaderTimer1 = setTimeout(() => { document.getElementById("loader-sub-text").innerText = "電波が弱い可能性があります。そのままお待ちください..."; }, 5000);
    loaderTimer2 = setTimeout(() => { document.getElementById("loader-sub-text").innerHTML = "<span style='color:var(--brand);'>通信タイムアウト<br>リロードしてください。</span>"; }, 15000);
  }
  function hideLoader() { clearTimeout(loaderTimer1); clearTimeout(loaderTimer2); document.getElementById("global-loader").style.display = "none"; }
  
  function sendErrorLog(errMsg) { 
    if(String(errMsg).includes("Load failed")) return;
    try { 
      fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "error_log", source: "システム管理(v12.0)", errorMsg: errMsg, userAgent: navigator.userAgent }), redirect: "follow" }); 
    } catch(e) {} 
  }

  function toHalfWidth(ele) { let val = ele.value; val = val.replace(/[０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); }); ele.value = val; }
  function resetTimer() { lockTime = 600; updateTimerDisplay(); }
  function updateTimerDisplay() { const m = String(Math.floor(lockTime/60)).padStart(2,'0'); const s = String(lockTime%60).padStart(2,'0'); document.getElementById("lock-timer").textContent = `${m}:${s}`; }
  
  function startTimer() { 
    updateTimerDisplay(); 
    timerInterval = setInterval(() => { lockTime--; updateTimerDisplay(); if(lockTime <= 0) location.reload(); }, 1000); 
    ['mousemove','keydown','touchstart','scroll'].forEach(evt => window.addEventListener(evt, resetTimer)); 
  }
  
  function checkLogin() {
    const input = document.getElementById("login-pin").value;
    if(input === PIN_ADMIN) { 
      document.getElementById("login-overlay").style.display = "none"; 
      startTimer(); 
      initAdminApp(); 
    } else { 
      document.getElementById("login-err").style.display = "block"; 
      document.getElementById("login-pin").value = ""; 
    }
  }

  function initAdminApp() {
    const cachedStr = localStorage.getItem(CACHE_KEY);
    if(cachedStr) {
      try {
        const cacheObj = JSON.parse(cachedStr);
        if (Date.now() - cacheObj.timestampMs < CACHE_EXPIRE_MS) {
          applyData(cacheObj.data);
          return;
        }
      } catch(e) {}
    }
    fetchLatestData(false, false);
  }

  function applyData(jsonRes) {
    const qaBox = document.getElementById("qa-list");
    const unanswered = jsonRes.qa ? jsonRes.qa.filter(q => q.status !== "◯") : [];
    
    if (unanswered.length > 0) {
      qaBox.innerHTML = unanswered.map((item, i) => `
        <div style="background:var(--bg); padding:16px; border-radius:8px; margin-bottom:12px; border-left:4px solid var(--blue); border:1px solid var(--line);">
          <div style="font-size:11px; color:var(--sub); margin-bottom:6px; font-weight:bold;">🕒 ${item.date} ｜ 📱 ${item.source}</div>
          <div style="color:var(--ink); font-size:14px; font-weight:bold; margin-bottom:12px; line-height:1.4;">Q. ${item.q.replace(/\n/g, '<br>')}</div>
          <textarea id="ans-${i}" rows="3" placeholder="回答を入力して公開..." style="width:100%; border:1px solid #ccc; border-radius:6px; padding:10px; margin-bottom:8px; font-size:13px; background:#fff;"></textarea>
          <button type="button" class="btn-primary" onclick="answerQA('${item.q.replace(/'/g,"\\'")}', 'ans-${i}')" style="width:100%;">回答を送信・公開</button>
        </div>
      `).join("");
    } else {
      qaBox.innerHTML = '<div style="text-align:center; padding:30px; background:var(--bg); border-radius:8px; border:1px solid var(--line);">未回答の質問・要望はありません。</div>';
    }
  }
  
  async function fetchLatestData(isBackground, isManualUpdate) {
    if(!isBackground) showLoader("システム情報取得中...", "未回答のQ&Aリストを確認しています");
    try {
      const res = await fetch(GAS_API_URL, { 
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
        body: JSON.stringify({ action: "fetch_init", password: PIN_ADMIN, app_name: "管理" }), redirect: "follow" 
      });
      const jsonRes = await res.json();
      
      if (jsonRes.status === "success") {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ timestampMs: Date.now(), data: jsonRes }));
        applyData(jsonRes);
        if(isManualUpdate) alert("最新情報を取得しました。");
      } else { throw new Error(jsonRes.message); }
    } catch(e) { 
      sendErrorLog(e.toString());
      if(!isBackground) alert("通信エラーが発生しました。");
    } finally {
      if(!isBackground) hideLoader();
    }
  }
  
  async function answerQA(qText, textareaId) {
    const ans = document.getElementById(textareaId).value.trim(); 
    if(!ans) return alert("回答を入力してください");
    showLoader("回答を送信中...", "Q&Aデータベースを更新しています");
    try {
      const res = await fetch(GAS_API_URL, { 
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
        body: JSON.stringify({ action: "answer_question", password: PIN_ADMIN, q: qText, a: ans }), redirect: "follow"
      });
      const jsonRes = await res.json();
      
      if(jsonRes.status === "success") {
        alert("回答を公開しました。");
        fetchLatestData(true, false); 
      } else { throw new Error(jsonRes.message); }
    } catch(e) { 
      sendErrorLog(e.toString()); alert("通信エラーが発生しました。"); hideLoader();
    }
  }
  
  async function addMaster() {
    const type = document.getElementById("add-type").value; 
    const val1 = document.getElementById("add-val1").value.trim(); 
    const val2 = document.getElementById("add-val2").value.trim();
    if (!val1) return alert("登録する名称（値1）を入力してください。");
    if (type === 'mail' && !val2) return alert("メールアドレス（値2）を入力してください。");
    
    showLoader("マスタデータ追加中...", "システム全体へ即時反映させています");
    try {
      const res = await fetch(GAS_API_URL, { 
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
        body: JSON.stringify({ action: "add_master", password: PIN_ADMIN, type: type, val1: val1, val2: val2 }), redirect: "follow" 
      });
      const json = await res.json();
      if (json.status === "success") { 
        alert("マスタデータベースに正常に追加しました。"); 
        document.getElementById("add-val1").value = ""; 
      } else { throw new Error(json.message); }
    } catch(e) { 
      sendErrorLog(e.toString()); alert("通信エラーが発生しました。"); 
    } finally { hideLoader(); }
  }
  
  document.getElementById("add-type").addEventListener('change', (e) => { 
    document.getElementById("box-val2").style.display = e.target.value === 'mail' ? 'block' : 'none'; 
  });
</script>
</body>
</html>
