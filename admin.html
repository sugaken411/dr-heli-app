<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AW109 管理コンソール</title>
  <style>
    :root { --bg:#f2f2f7; --brand:#d32f2f; --ink:#1c1c1e; --sub:#8e8e93; }
    body { font-family:-apple-system,sans-serif; background:var(--bg); color:var(--ink); padding:20px; }
    .card { background:#fff; border-radius:12px; padding:20px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    input, select, button { padding:10px; border-radius:6px; border:1px solid #ccc; font-size:14px; }
    button { background:var(--brand); color:#fff; border:none; cursor:pointer; font-weight:bold; }
    .filter-btn { background:#e5e5ea; color:var(--ink); margin-right:8px; }
    .res-item { background:#fff; border:1px solid #ccc; border-radius:8px; padding:16px; margin-bottom:12px; cursor:pointer; }
    .badge { padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold; }
    
    /* モーダル */
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; padding:20px; }
    .modal.show { display:flex; }
    .modal-box { background:#fff; width:100%; max-width:600px; max-height:85vh; overflow-y:auto; border-radius:12px; padding:20px; position:relative; }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; font-weight:bold; font-size:12px; margin-bottom:4px; color:var(--sub); }
    .form-group input { width:100%; box-sizing:border-box; }
    
    @media print {
      body * { visibility: hidden; }
      .modal-box, .modal-box * { visibility: visible; }
      .modal-box { position: absolute; left: 0; top: 0; width: 100%; max-height:none; overflow:visible; box-shadow:none; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <h2>AW109 検索・管理コンソール <span style="font-size:12px; background:var(--brand); color:#fff; padding:4px 8px; border-radius:4px;">v1.0</span></h2>
  
  <div class="card no-print">
    <h3>🔍 絞り込みフィルター</h3>
    <div style="margin-bottom:16px;">
      <button class="filter-btn" onclick="quickFilter('未完了')">⚠️ 未完了のみ</button>
      <button class="filter-btn" onclick="quickFilter('本日')">🚁 今日の出動</button>
      <button class="filter-btn" onclick="quickFilter('')">🔄 全て表示</button>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <input type="text" id="q-id" placeholder="要請番号 (仮ID含む)">
      <input type="date" id="q-date">
      <button onclick="fetchData()">検索実行</button>
    </div>
  </div>

  <div id="results" class="no-print">
    <p style="text-align:center; color:var(--sub);">検索実行を押してください。</p>
  </div>

  <!-- 詳細・編集モーダル -->
  <div class="modal" id="detail-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ccc; padding-bottom:12px; margin-bottom:16px;">
        <h3 style="margin:0;">事案詳細・修正</h3>
        <button class="no-print" onclick="window.print()" style="background:#007aff;">🖨️ PDF保存/印刷</button>
      </div>
      
      <div style="background:#e3f2fd; padding:12px; border-radius:8px; margin-bottom:16px; font-size:14px;">
        <b>📦 消費資機材 補充リスト</b><br>
        <span id="supply-list"></span>
      </div>

      <input type="hidden" id="edit-old-id">
      <div style="display:flex; gap:12px;">
        <div class="form-group" style="flex:1;"><label>要請番号 (修正可)</label><input type="text" id="edit-id"></div>
        <div class="form-group" style="flex:1;"><label>日付</label><input type="date" id="edit-date"></div>
      </div>
      
      <div class="form-group"><label>更新履歴 (自動記録)</label><textarea id="edit-history" rows="4" readonly style="width:100%; background:#f2f2f7; border:none; padding:8px;"></textarea></div>
      
      <div class="no-print" style="margin-top:20px; border-top:1px solid #ccc; padding-top:16px;">
        <p style="font-size:12px; font-weight:bold; color:var(--brand);">※データを修正して上書き保存する場合は、担当者名を入力してください。</p>
        <input type="text" id="edit-person" placeholder="担当者名 (必須)" style="width:100%; margin-bottom:8px;">
        <div style="display:flex; gap:12px;">
          <button style="flex:1; background:#e5e5ea; color:var(--ink);" onclick="closeModal()">キャンセル</button>
          <button style="flex:1;" onclick="saveRecord()">💾 上書き保存</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  const PIN_CODE = "5740";
  let allData = [];

  function quickFilter(type) {
    if(type==='未完了') { document.getElementById('q-id').value=''; document.getElementById('q-date').value=''; fetchData('未完了'); }
    else if(type==='本日') { const d=new Date(); document.getElementById('q-date').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; document.getElementById('q-id').value=''; fetchData(); }
    else { document.getElementById('q-id').value=''; document.getElementById('q-date').value=''; fetchData(); }
  }

  async function fetchData(forceStatus = null) {
    document.getElementById("results").innerHTML = '<p style="text-align:center;">読込中...</p>';
    const qId = document.getElementById("q-id").value; const qDate = document.getElementById("q-date").value;
    
    try {
      const res = await fetch(GAS_API_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify({action:"fetch_all", password:PIN_CODE}), redirect:"follow" });
      const textRes = await res.text(); let json;
      try{ json = JSON.parse(textRes); } catch(e) { if(textRes.includes("Redirect OK")) json={status:"success",data:[]}; else throw e; }
      
      if(json.status==="success") {
        allData = json.data;
        const filtered = allData.filter(r => {
          let m = true;
          if(forceStatus && r["ステータス"] && !r["ステータス"].includes(forceStatus)) m = false;
          if(qId && r["要請番号"] && !String(r["要請番号"]).includes(qId)) m = false;
          if(qDate && r["日付"] && !String(r["日付"]).includes(qDate)) m = false;
          return m;
        });
        
        if(filtered.length===0) { document.getElementById("results").innerHTML = '<p style="text-align:center; color:red;">データが見つかりません。</p>'; return; }
        
        document.getElementById("results").innerHTML = `<div style="margin-bottom:8px; font-weight:bold;">該当: ${filtered.length} 件</div>` + filtered.map((r, i) => {
          const isDone = (r["ステータス"]||"").includes("完了") && !(r["ステータス"]||"").includes("未完了");
          return `<div class="res-item" onclick='openDetail(${JSON.stringify(r).replace(/'/g, "&apos;")})'>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <b>No.${r["要請番号"]} (${r["日付"]})</b>
              <span class="badge" style="background:${isDone?'#d1fae5':'#ffebeb'}; color:${isDone?'#065f46':'#d32f2f'}">${r["ステータス"]||"未完了"}</span>
            </div>
            <div style="font-size:12px; color:var(--sub);">出場先: ${r["出場先"]||"-"} | Dr: ${r["フライトドクター"]||"-"} / Ns: ${r["フライトナース"]||"-"}</div>
          </div>`;
        }).join("");
      }
    } catch(e) { document.getElementById("results").innerHTML = `<p style="color:red;">通信エラー: ${e.message}</p>`; }
  }

  function openDetail(row) {
    document.getElementById("edit-old-id").value = row["要請番号"];
    document.getElementById("edit-id").value = row["要請番号"];
    document.getElementById("edit-date").value = row["日付"] ? row["日付"].split("T")[0] : "";
    document.getElementById("edit-history").value = row["更新履歴"] || "履歴なし";
    
    // 補充リストの自動生成
    let supply = [];
    ["20G","18G","22G","24G","ベニューラ","骨髄針","1%カルボカイン10ml使用","28Frトロッカー","20Frトロッカー"].forEach(k => {
      let v = String(row[k]||""); if(v.includes("◯")) { let num = v.match(/\d+本/); supply.push(`${k}: ${num?num[0]:"1本"}`); }
    });
    if(String(row["除細動パッド"]||"").includes("◯")) supply.push("除細動パッド: 使用");
    if(String(row["心嚢穿刺・心嚢ドレナージ"]||"").includes("心嚢ドレナージキット")) supply.push("心嚢ドレナージキット: 使用");
    
    document.getElementById("supply-list").innerHTML = supply.length > 0 ? supply.join("<br>") : "特になし";
    document.getElementById("detail-modal").classList.add("show");
  }
  function closeModal() { document.getElementById("detail-modal").classList.remove("show"); }

  async function saveRecord() {
    const editor = document.getElementById("edit-person").value.trim();
    if(!editor) return alert("上書き保存するには担当者名を入力してください。");
    
    const oldId = document.getElementById("edit-old-id").value;
    const newId = document.getElementById("edit-id").value.trim();
    const newDate = document.getElementById("edit-date").value;
    
    if(!confirm(`要請番号 ${oldId} のデータを更新しますか？`)) return;
    
    const btn = event.target; btn.innerText = "保存中..."; btn.disabled = true;
    
    try {
      const res = await fetch(GAS_API_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify({action:"update_record", password:PIN_CODE, old_id:oldId, editor:editor, data:{"要請番号":newId, "日付":newDate}}), redirect:"follow" });
      const textRes = await res.text(); let json;
      try{ json = JSON.parse(textRes); } catch(e) { if(textRes.includes("Redirect OK")) json={status:"success"}; else throw e; }
      
      if(json.status==="success") { alert("データを更新しました。"); closeModal(); fetchData(); }
      else { alert("エラー: " + json.message); }
    } catch(e) { alert("通信エラー: " + e.message); }
    btn.innerText = "💾 上書き保存"; btn.disabled = false;
  }
</script>
</body>
</html>
