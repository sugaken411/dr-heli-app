<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AW109 システム管理</title>
  <style>
    :root { --bg: #f2f2f7; --card: #ffffff; --brand: #d32f2f; --ink: #1c1c1e; --sub: #8e8e93; --blue: #007aff; --line: rgba(60,60,67,0.12); }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    
    header { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--line); flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
    .hdr-btn { background: none; border: none; color: var(--blue); font-weight: bold; cursor: pointer; font-size: 14px; }
    .timer-badge { background: #e5e5ea; padding: 4px 10px; border-radius: 12px; font-family: monospace; font-weight: bold; font-size: 14px; color: var(--ink); }
    
    .tab-bar { display: flex; background: #fff; border-bottom: 1px solid var(--line); padding: 0 16px; overflow-x: auto; white-space: nowrap; flex-shrink: 0; }
    .tab-btn { background: none; border: none; padding: 16px; font-size: 14px; font-weight: bold; color: var(--sub); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

    main { padding: 20px; flex: 1; overflow-y: auto; max-width: 900px; margin: 0 auto; width: 100%; }
    
    .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--line); }
    
    input, select, textarea { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; background: var(--bg); color: var(--ink); font-weight: 600; outline: none; width: 100%; }
    
    button.btn-primary { background: var(--blue); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.2s; }
    button.btn-primary:hover { opacity: 0.8; }
    button.btn-danger { background: var(--brand); color: #fff; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
    
    #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-text { font-size: 16px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
    .loader-subtext { font-size: 13px; font-weight: 600; color: var(--sub); text-align: center; max-width: 80%; }

    .list-item { background: #f9f9f9; padding: 16px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #e5e5ea; position: relative; }
    .badge { font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    .badge-ok { background: #e8f5e9; color: #2e7d32; }
    .badge-ng { background: #ffebee; color: #c62828; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 20px; z-index: 9000; }
    .modal.show { display: flex; }
    .modal-box { background: #fff; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; border-radius: 12px; padding: 20px; }
    .modal-close { width: 100%; padding: 12px; margin-top: 16px; background: #e5e5ea; color: var(--ink); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 4px; color: var(--sub); }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="card" style="width:100%; max-width:320px; text-align:center;">
      <h2 style="margin-top:0; color:var(--ink);">システム管理</h2>
      <p style="color:var(--sub); font-size:14px; margin-bottom:20px;">管理者用アクセスコードを入力</p>
      <input type="password" inputmode="numeric" pattern="[0-9]*" id="login-pin" style="width:100%; margin-bottom:20px; text-align:center; font-size:24px; letter-spacing:8px; background:#fff;" placeholder="****" oninput="toHalfWidth(this)">
      <button type="button" class="btn-primary" onclick="checkLogin()" style="width:100%; padding:16px; font-size:16px;">ログイン 🔓</button>
      <p id="login-err" style="color:var(--brand); font-size:12px; margin-top:12px; display:none; font-weight:bold;">パスワードが違います</p>
    </div>
  </div>

  <div id="global-loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-main-text">通信中...</div>
    <div class="loader-subtext" id="loader-sub-text">システムに接続しています</div>
  </div>

  <header>
    <div style="display:flex; gap:12px; align-items:center;">
      <button type="button" class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
      <button type="button" class="hdr-btn" onclick="fetchLatestData(false, true)">🔄 同期</button>
    </div>
    <div style="font-weight:900;">マスター管理コンソール <span style="font-size:10px; background:var(--brand); color:#fff; padding:2px 6px; border-radius:4px; margin-left:4px;">v14.0</span></div>
    <div style="display:flex; gap:12px; align-items:center;">
      <span class="timer-badge" id="lock-timer" title="オートロックまで">10:00</span>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('master')">👑 基本マスタ</button>
    <button class="tab-btn" onclick="switchTab('qa')">❓ Q&A管理</button>
    <button class="tab-btn" onclick="switchTab('news')">📢 お知らせ</button>
    <button class="tab-btn" onclick="switchTab('manual')">📖 取説管理</button>
  </nav>

  <main>
    <!-- 👑 基本マスタ タブ -->
    <div id="tab-master" class="tab-content active">
      <div class="card" style="border:2px solid #ffcc00; background:#fffdf0;">
        <h3 style="margin-top:0; color:#d48806; display:flex; align-items:center; gap:6px;">👑 マスタデータ追加</h3>
        <p style="font-size:12px; color:var(--sub); margin-top:-8px; margin-bottom:12px;">※ 追加したデータはすべてのアプリに即座に反映されます。</p>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <div>
            <label style="font-size:12px; font-weight:bold; color:var(--sub); display:block; margin-bottom:4px;">種類を選択</label>
            <select id="add-type" style="background:#fff;">
              <option value="dr">👨‍⚕️ フライトドクター</option>
              <option value="ns">👩‍⚕️ フライトナース</option>
              <option value="dest">🏥 出場先</option>
              <option value="diagnosis">🩺 現場診断 (病名マスタ)</option>
              <option value="keyword">🔑 キーワード要請</option>
              <option value="pilot">🚁 機長</option>
              <option value="mechanic">🔧 整備士</option>
              <option value="cs">🎧 CS</option>
              <option value="ext_affil">🚒 外部所属 (消防本部など)</option>
              <option value="ext_staff">🧑‍🚒 外部スタッフ (救急隊員など)</option>
              <option value="mail">✉️ メール送信先 (宛先リスト)</option>
            </select>
          </div>
          <div>
            <label style="font-size:12px; font-weight:bold; color:var(--sub); display:block; margin-bottom:4px;">値1 (登録する名称)</label>
            <input type="text" id="add-val1" placeholder="名前や施設名を入力" style="background:#fff;">
          </div>
          <div id="box-val2" style="display:none;">
            <label style="font-size:12px; font-weight:bold; color:var(--sub); display:block; margin-bottom:4px;">値2 (メールアドレス ※メール送信先追加時のみ)</label>
            <input type="email" id="add-val2" placeholder="example@gmail.com" style="background:#fff;">
          </div>
          <button type="button" class="btn-primary" onclick="addMaster()" style="background:#d48806; padding:14px; margin-top:8px;">＋ マスタデータベースに追加</button>
        </div>
      </div>
    </div>

    <!-- ❓ Q&A管理 タブ -->
    <div id="tab-qa" class="tab-content">
      <div class="card">
        <h3 style="margin-top:0;">❓ Q&A データベース管理</h3>
        <p style="font-size:12px; color:var(--sub); margin-top:-8px; margin-bottom:16px;">現場からの要望への回答、既存Q&Aの修正・削除を行います。</p>
        <div id="list-qa">読込中...</div>
      </div>
    </div>

    <!-- 📢 お知らせ管理 タブ -->
    <div id="tab-news" class="tab-content">
      <div class="card">
        <h3 style="margin-top:0;">📢 お知らせ新規作成</h3>
        <div class="form-group"><label>日付 (必須)</label><input type="date" id="news-date"></div>
        <div class="form-group"><label>カテゴリ (必須)</label><input type="text" id="news-category" placeholder="例: システム, 業務連絡"></div>
        <div class="form-group"><label>タイトル (必須)</label><input type="text" id="news-title"></div>
        <div class="form-group"><label>内容</label><textarea id="news-content" rows="4"></textarea></div>
        <div class="form-group"><label>公開ステータス</label><select id="news-status"><option value="公開">公開</option><option value="非公開">非公開(下書き)</option></select></div>
        <button type="button" class="btn-primary" onclick="manageNews('add', 0)" style="width:100%; padding:14px;">＋ お知らせを配信</button>
      </div>
      <div class="card">
        <h3 style="margin-top:0;">📋 配信済みお知らせ一覧</h3>
        <div id="list-news">読込中...</div>
      </div>
    </div>

    <!-- 📖 取扱説明書管理 タブ -->
    <div id="tab-manual" class="tab-content">
      <div class="card">
        <h3 style="margin-top:0;">📖 取扱説明書 新規追加</h3>
        <div class="form-group"><label>タイトル (必須)</label><input type="text" id="man-title"></div>
        <div class="form-group"><label>説明文 (改行可)</label><textarea id="man-text" rows="5"></textarea></div>
        <div class="form-group"><label>表示先アプリ (空欄で全アプリ)</label><input type="text" id="man-target" placeholder="例: ポータル, 現場, 検索"></div>
        <button type="button" class="btn-primary" onclick="manageManual('add', 0)" style="width:100%; padding:14px;">＋ マニュアルを追加</button>
      </div>
      <div class="card">
        <h3 style="margin-top:0;">📋 登録済みマニュアル一覧</h3>
        <div id="list-manual">読込中...</div>
      </div>
    </div>
  </main>

  <!-- 編集モーダル：Q&A -->
  <div class="modal" id="modal-edit-qa">
    <div class="modal-box">
      <h3 style="margin-top:0;">Q&A 編集</h3>
      <input type="hidden" id="edit-qa-idx">
      <div class="form-group"><label>日時</label><input type="text" id="edit-qa-date" readonly style="background:#e5e5ea;"></div>
      <div class="form-group"><label>質問内容</label><textarea id="edit-qa-q" rows="4"></textarea></div>
      <div class="form-group"><label>回答</label><textarea id="edit-qa-a" rows="4"></textarea></div>
      <div class="form-group"><label>公開ステータス (◯で公開)</label><input type="text" id="edit-qa-status"></div>
      <div class="form-group"><label>表示先アプリ</label><input type="text" id="edit-qa-target"></div>
      <div style="display:flex; gap:8px; margin-top:20px;">
        <button type="button" class="btn-danger" onclick="manageQA('delete')">🗑️ 削除</button>
        <button type="button" class="btn-primary" style="flex:1;" onclick="manageQA('update')">💾 更新して保存</button>
      </div>
      <button type="button" class="modal-close" onclick="closeModal('modal-edit-qa')">閉じる</button>
    </div>
  </div>

  <!-- 編集モーダル：お知らせ -->
  <div class="modal" id="modal-edit-news">
    <div class="modal-box">
      <h3 style="margin-top:0;">お知らせ 編集</h3>
      <input type="hidden" id="edit-news-idx">
      <div class="form-group"><label>日付</label><input type="date" id="edit-news-date"></div>
      <div class="form-group"><label>カテゴリ</label><input type="text" id="edit-news-category"></div>
      <div class="form-group"><label>タイトル</label><input type="text" id="edit-news-title"></div>
      <div class="form-group"><label>内容</label><textarea id="edit-news-content" rows="5"></textarea></div>
      <div class="form-group"><label>公開ステータス</label><select id="edit-news-status"><option value="公開">公開</option><option value="非公開">非公開</option></select></div>
      <div style="display:flex; gap:8px; margin-top:20px;">
        <button type="button" class="btn-danger" onclick="manageNews('delete')">🗑️ 削除</button>
        <button type="button" class="btn-primary" style="flex:1;" onclick="manageNews('update')">💾 更新して保存</button>
      </div>
      <button type="button" class="modal-close" onclick="closeModal('modal-edit-news')">閉じる</button>
    </div>
  </div>

  <!-- 編集モーダル：マニュアル -->
  <div class="modal" id="modal-edit-manual">
    <div class="modal-box">
      <h3 style="margin-top:0;">マニュアル 編集</h3>
      <input type="hidden" id="edit-man-idx">
      <div class="form-group"><label>タイトル</label><input type="text" id="edit-man-title"></div>
      <div class="form-group"><label>説明文</label><textarea id="edit-man-text" rows="6"></textarea></div>
      <div class="form-group"><label>表示先アプリ</label><input type="text" id="edit-man-target"></div>
      <div style="display:flex; gap:8px; margin-top:20px;">
        <button type="button" class="btn-danger" onclick="manageManual('delete')">🗑️ 削除</button>
        <button type="button" class="btn-primary" style="flex:1;" onclick="manageManual('update')">💾 更新して保存</button>
      </div>
      <button type="button" class="modal-close" onclick="closeModal('modal-edit-manual')">閉じる</button>
    </div>
  </div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  const PIN_ADMIN = "9999"; 
  let currentData = { qa: [], news: [], manuals: [] };
  
  window.onerror = function(msg, src, line, col, err) { sendErrorLog(`GlobalError: ${msg}`); return false; };
  window.addEventListener('unhandledrejection', function(e) { if(!String(e.reason).includes("Load failed")) sendErrorLog(`PromiseRejection: ${e.reason}`); });

  let lockTime = 600; 
  let timerInterval;

  function showLoader(msg1="通信中...", msg2="データベースに接続しています") {
    document.getElementById("loader-main-text").innerText = msg1; document.getElementById("loader-sub-text").innerHTML = msg2;
    document.getElementById("global-loader").style.display = "flex";
  }
  function hideLoader() { document.getElementById("global-loader").style.display = "none"; }
  function sendErrorLog(errMsg) { try { fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "error_log", source: "システム管理(v14.0)", errorMsg: errMsg, userAgent: navigator.userAgent }), redirect: "follow" }); } catch(e) {} }

  function toHalfWidth(ele) { ele.value = ele.value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)); }
  function resetTimer() { lockTime = 600; updateTimerDisplay(); }
  function updateTimerDisplay() { const m = String(Math.floor(lockTime/60)).padStart(2,'0'); const s = String(lockTime%60).padStart(2,'0'); document.getElementById("lock-timer").textContent = `${m}:${s}`; }
  
  function startTimer() { 
    updateTimerDisplay(); 
    timerInterval = setInterval(() => { lockTime--; updateTimerDisplay(); if(lockTime <= 0) location.reload(); }, 1000); 
    ['mousemove','keydown','touchstart','scroll'].forEach(evt => window.addEventListener(evt, resetTimer)); 
  }
  
  function checkLogin() {
    if(document.getElementById("login-pin").value === PIN_ADMIN) { 
      document.getElementById("login-overlay").style.display = "none"; 
      startTimer(); fetchLatestData(false, false); 
    } else { 
      document.getElementById("login-err").style.display = "block"; document.getElementById("login-pin").value = ""; 
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  function openModal(id) { document.getElementById(id).classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }

  async function fetchLatestData(isBackground, isManualUpdate) {
    if(!isBackground) showLoader("システム情報取得中...", "データベース全体を同期しています");
    try {
      const res = await fetch(GAS_API_URL, { 
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
        body: JSON.stringify({ action: "fetch_init", password: PIN_ADMIN, app_name: "管理" }), redirect: "follow" 
      });
      const jsonRes = await res.json();
      if (jsonRes.status === "success") {
        currentData.qa = jsonRes.qa || []; currentData.news = jsonRes.news || []; currentData.manuals = jsonRes.manuals || [];
        renderLists();
        if(isManualUpdate) alert("最新情報を取得しました。");
      } else { throw new Error(jsonRes.message); }
    } catch(e) { sendErrorLog(e.toString()); if(!isBackground) alert("通信エラーが発生しました。"); } finally { if(!isBackground) hideLoader(); }
  }

  function renderLists() {
    // QAレンダリング
    const qaBox = document.getElementById("list-qa");
    qaBox.innerHTML = currentData.qa.map(item => {
      const isAns = item.status === "◯";
      return `<div class="list-item">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <span style="font-size:11px; color:var(--sub);">🕒 ${item.date} ｜ ${item.source}</span>
          <span class="badge ${isAns ? 'badge-ok' : 'badge-ng'}">${isAns ? '✅ 公開中' : '⚠️ 未回答'}</span>
        </div>
        <div style="font-weight:bold; margin-bottom:8px; line-height:1.4;">Q. ${item.q.replace(/\n/g, '<br>')}</div>
        <div style="font-size:13px; color:var(--sub); margin-bottom:12px;">A. ${item.a ? item.a.replace(/\n/g, '<br>') : '(未回答)'}</div>
        <button type="button" class="btn-primary" style="padding:6px 12px; font-size:12px;" onclick="openEditQA(${item.rowIdx})">✏️ 編集 / 回答</button>
      </div>`;
    }).join("") || "<p>データがありません。</p>";

    // お知らせレンダリング
    const newsBox = document.getElementById("list-news");
    newsBox.innerHTML = currentData.news.map(item => `
      <div class="list-item">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <span style="font-size:11px; color:var(--blue); font-weight:bold;">[${item.category}] ${item.date}</span>
          <span class="badge ${item.status === '公開' ? 'badge-ok' : 'badge-ng'}">${item.status}</span>
        </div>
        <div style="font-weight:bold; margin-bottom:8px;">${item.title}</div>
        <button type="button" class="btn-primary" style="padding:6px 12px; font-size:12px;" onclick="openEditNews(${item.rowIdx})">✏️ 編集 / 削除</button>
      </div>`).join("") || "<p>データがありません。</p>";

    // マニュアルレンダリング
    const manBox = document.getElementById("list-manual");
    manBox.innerHTML = currentData.manuals.map(item => `
      <div class="list-item">
        <div style="font-weight:bold; margin-bottom:4px;">${item.title}</div>
        <div style="font-size:11px; color:var(--sub); margin-bottom:12px;">対象: ${item.target || '全て'}</div>
        <button type="button" class="btn-primary" style="padding:6px 12px; font-size:12px;" onclick="openEditManual(${item.rowIdx})">✏️ 編集 / 削除</button>
      </div>`).join("") || "<p>データがありません。</p>";
  }

  // --- Q&A管理 ---
  function openEditQA(rowIdx) {
    const item = currentData.qa.find(x => x.rowIdx === rowIdx); if(!item) return;
    document.getElementById("edit-qa-idx").value = item.rowIdx;
    document.getElementById("edit-qa-date").value = item.date;
    document.getElementById("edit-qa-q").value = item.q;
    document.getElementById("edit-qa-a").value = item.a;
    document.getElementById("edit-qa-status").value = item.status;
    document.getElementById("edit-qa-target").value = item.target;
    openModal('modal-edit-qa');
  }

  async function manageQA(actionType) {
    const rowIdx = document.getElementById("edit-qa-idx").value;
    if(actionType === 'delete' && !confirm("本当に削除しますか？")) return;
    
    const data = {
      date: document.getElementById("edit-qa-date").value,
      q: document.getElementById("edit-qa-q").value,
      a: document.getElementById("edit-qa-a").value,
      status: document.getElementById("edit-qa-status").value,
      source: "管理修正",
      target: document.getElementById("edit-qa-target").value
    };

    showLoader("Q&Aデータベース更新中...");
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "manage_qa_full", password: PIN_ADMIN, sub_action: actionType, rowIdx: rowIdx, data: data }), redirect: "follow" });

  }

  // --- お知らせ管理 ---
  function openEditNews(rowIdx) {
    const item = currentData.news.find(x => x.rowIdx === rowIdx); if(!item) return;
    document.getElementById("edit-news-idx").value = item.rowIdx;
    let dVal = item.date.replace(/\//g, "-");
    document.getElementById("edit-news-date").value = dVal;
    document.getElementById("edit-news-category").value = item.category;
    document.getElementById("edit-news-title").value = item.title;
    document.getElementById("edit-news-content").value = item.content;
    document.getElementById("edit-news-status").value = item.status || "公開";
    openModal('modal-edit-news');
  }

  async function manageNews(actionType, rowIdx=0) {
    if(actionType === 'delete' && !confirm("本当に削除しますか？")) return;
    let rIdx = rowIdx; let d = {};
    if(actionType === 'add') {
      d = { date: document.getElementById("news-date").value.replace(/-/g, "/"), category: document.getElementById("news-category").value, title: document.getElementById("news-title").value, content: document.getElementById("news-content").value, status: document.getElementById("news-status").value };
      if(!d.date || !d.category || !d.title) return alert("必須項目を入力してください。");
    } else {
      rIdx = document.getElementById("edit-news-idx").value;
      d = { date: document.getElementById("edit-news-date").value.replace(/-/g, "/"), category: document.getElementById("edit-news-category").value, title: document.getElementById("edit-news-title").value, content: document.getElementById("edit-news-content").value, status: document.getElementById("edit-news-status").value };
    }

    showLoader("お知らせデータベース更新中...");
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "manage_news", password: PIN_ADMIN, sub_action: actionType, rowIdx: rIdx, data: d }), redirect: "follow" });
      const json = await res.json();
      if(json.status === "success") { 
        if(actionType === 'add') { ["news-date", "news-category", "news-title", "news-content"].forEach(id => document.getElementById(id).value = ""); }
        closeModal('modal-edit-news'); fetchLatestData(true, false); alert("処理が完了しました。"); 
      } else { throw new Error(json.message); }
    } catch(e) { sendErrorLog(e.toString()); alert("通信エラーが発生しました。"); } finally { hideLoader(); }
  }

  // --- マニュアル管理 ---
  function openEditManual(rowIdx) {
    const item = currentData.manuals.find(x => x.rowIdx === rowIdx); if(!item) return;
    document.getElementById("edit-man-idx").value = item.rowIdx;
    document.getElementById("edit-man-title").value = item.title;
    document.getElementById("edit-man-text").value = item.text;
    document.getElementById("edit-man-target").value = item.target === "全て" ? "" : item.target;
    openModal('modal-edit-manual');
  }

  async function manageManual(actionType, rowIdx=0) {
    if(actionType === 'delete' && !confirm("本当に削除しますか？")) return;
    let rIdx = rowIdx; let d = {};
    if(actionType === 'add') {
      d = { title: document.getElementById("man-title").value, text: document.getElementById("man-text").value, target: document.getElementById("man-target").value || "全て" };
      if(!d.title) return alert("タイトルを入力してください。");
    } else {
      rIdx = document.getElementById("edit-man-idx").value;
      d = { title: document.getElementById("edit-man-title").value, text: document.getElementById("edit-man-text").value, target: document.getElementById("edit-man-target").value || "全て" };
    }

    showLoader("取扱説明書マスタ更新中...");
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "manage_manual", password: PIN_ADMIN, sub_action: actionType, rowIdx: rIdx, data: d }), redirect: "follow" });
      const json = await res.json();
      if(json.status === "success") { 
        if(actionType === 'add') { ["man-title", "man-text", "man-target"].forEach(id => document.getElementById(id).value = ""); }
        closeModal('modal-edit-manual'); fetchLatestData(true, false); alert("処理が完了しました。"); 
      } else { throw new Error(json.message); }
    } catch(e) { sendErrorLog(e.toString()); alert("通信エラーが発生しました。"); } finally { hideLoader(); }
  }

  document.getElementById("add-type").addEventListener('change', (e) => { document.getElementById("box-val2").style.display = e.target.value === 'mail' ? 'block' : 'none'; });
  
  async function addMaster() {
    const type = document.getElementById("add-type").value; const val1 = document.getElementById("add-val1").value.trim(); const val2 = document.getElementById("add-val2").value.trim();
    if (!val1) return alert("登録する名称（値1）を入力してください。");
    if (type === 'mail' && !val2) return alert("メールアドレス（値2）を入力してください。");
    
    showLoader("マスタデータ追加中...", "システム全体へ即時反映させています");
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "add_master", password: PIN_ADMIN, type: type, val1: val1, val2: val2 }), redirect: "follow" });
      const json = await res.json();
      if (json.status === "success") { alert("マスタデータベースに正常に追加しました。"); document.getElementById("add-val1").value = ""; document.getElementById("add-val2").value = ""; } else { throw new Error(json.message); }
    } catch(e) { sendErrorLog(e.toString()); alert("通信エラーが発生しました。"); } finally { hideLoader(); }
  }
