<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AW109 統合チェックリスト</title>
  <style>
    :root { --bg: #f2f2f7; --card: #ffffff; --ink: #1c1c1e; --sub: #8e8e93; --blue: #007aff; --brand: #d32f2f; --line: rgba(60,60,67,0.12); --safe-top: env(safe-area-inset-top); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--ink); padding-bottom: 80px; -webkit-font-smoothing: antialiased; }
    header { position: fixed; top: 0; left: 0; right: 0; height: calc(60px + var(--safe-top)); padding-top: var(--safe-top); padding-left: 10px; padding-right: 10px; background: rgba(242,242,247,0.92); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--line); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; min-width: 60px; text-align: center; }
    .hdr-title { font-weight: 900; font-size: 16px; text-align: center; flex: 1; display:flex; justify-content:center; align-items:center; }
    .version-tag { font-size: 11px; background: var(--blue); color: #fff; padding: 4px 10px; border-radius: 6px; margin-left: 8px; cursor: pointer; user-select: none; }
    .tab-container { position: fixed; top: calc(60px + var(--safe-top)); left: 0; right: 0; height: 44px; background: #fff; border-bottom: 1px solid var(--line); display: flex; z-index: 99; }
    .nav-tab { flex: 1; text-align: center; line-height: 44px; font-size: 13px; font-weight: 700; color: var(--sub); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
    .nav-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    main { margin-top: calc(114px + var(--safe-top)); padding: 16px; max-width: 800px; margin-left: auto; margin-right: auto; }
    .timing-label { font-size: 12px; font-weight: 800; color: var(--sub); margin-top: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .timing-label::before { content: ""; display: block; width: 4px; height: 12px; background: var(--blue); border-radius: 2px; }
    .type-picker { display: flex; flex-wrap: wrap; background: transparent; gap: 8px; margin-bottom: 8px; }
    .type-btn { flex: 1 1 calc(33.3% - 8px); min-width: 100px; text-align: center; padding: 12px 6px; font-size: 13px; font-weight: 800; color: var(--sub); background: #e5e5ea; border-radius: 8px; cursor: pointer; transition: 0.2s; white-space: normal; line-height: 1.3; display: flex; align-items: center; justify-content: center; box-sizing: border-box; border: 2px solid transparent; position: relative; }
    .type-btn.active { background: #fff; color: var(--blue); border-color: var(--blue); box-shadow: 0 4px 12px rgba(0,122,255,0.15); }
    .type-btn.completed { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
    .normal-info { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--line); }
    .card { background: var(--card); border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; border: 1px solid var(--line); }
    .card-header { background: #f9f9f9; padding: 12px 16px; border-bottom: 1px solid var(--line); font-weight: 800; font-size: 14px; color: var(--ink); display: flex; align-items: center; flex-wrap: wrap; }
    .sub-cat-badge { font-size: 11px; font-weight: bold; background: #e3f2fd; color: #0d47a1; padding: 4px 8px; border-radius: 6px; border: 1px solid #bbdefb; margin-left: 8px; white-space: nowrap; }
    .chk-row { padding: 16px; border-bottom: 0.5px solid var(--line); display: flex; flex-direction: column; gap: 10px; }
    .chk-row.error-highlight { background-color: #ffebee; border-left: 4px solid var(--brand); } 
    .chk-title { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.4; }
    .toggle-group { display: flex; gap: 8px; }
    .tgl-btn { flex: 1; padding: 12px 10px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; font-weight: 800; background: var(--bg); color: var(--sub); cursor: pointer; text-align: center; }
    .tgl-btn.ok.active { background: #e8f5e9; color: #2e7d32; border-color: #4caf50; }
    .tgl-btn.ng.active { background: #ffebee; color: #c62828; border-color: #ef5350; }
    .text-input { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; background: var(--bg); outline: none; box-sizing: border-box; font-weight:600; color:var(--ink); }
    .btn-submit { width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
  </style>
</head>
<body>

  <div id="global-loader">
    <div class="spinner"></div>
    <div style="font-weight:800; color:var(--ink); font-size:16px; margin-bottom:8px;" id="loader-main">同期中...</div>
    <div style="font-weight:600; color:var(--sub); font-size:13px;" id="loader-sub">データベースに接続しています</div>
  </div>

  <header class="no-print">
    <button type="button" class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
    <div class="hdr-title">統合チェックリスト<span class="version-tag">v12.1</span></div>
    <button type="button" class="hdr-btn" onclick="clearAllCache(true)">🔄 更新</button>
  </header>

  <div class="tab-container no-print">
    <div class="nav-tab active" id="nav-tab-input" onclick="switchMainTab('input')">✅ 点検入力</div>
    <div class="nav-tab" id="nav-tab-history" onclick="switchMainTab('history')">🔍 履歴・検索</div>
  </div>

  <main>
    <div id="tab-input" class="tab-content active">
      <div class="normal-info no-print">
        <div style="display:flex; gap:12px;">
          <div style="flex:1;"><label>共通 点検日</label><input type="date" id="c-date" class="text-input" onchange="fetchChecklistStatus()"></div>
          <div style="flex:1.5;"><label>共通 点検者 (Ns)</label><select id="c-staff" class="text-input"></select></div>
        </div>
      </div>

      <div class="timing-label no-print">🌅 朝・始業時</div>
      <div class="type-picker no-print">
        <div class="type-btn active" id="btn-type-daily-start" onclick="switchType('始業点検')">📋 始業点検</div>
        <div class="type-btn" id="btn-type-me" onclick="switchType('ME機器')">🔌 ME機器</div>
        <div class="type-btn" id="btn-type-ns" onclick="switchType('ナースバック')">🎒 ナースバック</div>
        <div class="type-btn" id="btn-type-heli" onclick="switchType('ヘリ内')">🚁 ヘリ機内</div>
        <div class="type-btn" id="btn-type-hbag" onclick="switchType('ヘリバック')">🎒 ヘリバック</div>
      </div>
      <div class="timing-label no-print">🌇 夕・終業時</div>
      <div class="type-picker no-print"><div class="type-btn" id="btn-type-daily-end" onclick="switchType('終業点検')">📋 終業点検</div></div>
      <div class="timing-label no-print">📅 月次・その他</div>
      <div class="type-picker no-print">
        <div class="type-btn" id="btn-type-taiki" onclick="switchType('待機物品')">🏠 待機所物品</div>
        <div class="type-btn" id="btn-type-periodic" onclick="switchType('定期点検')">📅 定期点検</div>
      </div>

      <div class="card" style="background:#f0f8ff; border:1px solid #90caf9;"><div style="padding:12px 16px; display:flex; justify-content:space-between; align-items:center;"><span id="current-check-title">始業点検 の入力</span><input type="time" id="c-time" style="width:100px;"></div></div>
      <div id="checklist-container"></div>
      <button type="button" class="btn-submit" id="btn-save" onclick="submitChecklist()" style="margin-top:20px;">点検データを保存する</button>
    </div>
    <div id="tab-history" class="tab-content"><div id="history-container"></div></div>
  </main>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
    const PIN_CODE = "5740";

    let currentType = "始業点検"; let currentMainTab = "input";
    let checklistItems = []; let currentData = {}; let errorDetails = {}; let allHistoryData = []; let mastersCache = {};

    window.onload = () => { resetTime(); loadCache(); fetchChecklistStatus(); loadDataForCurrentView(); };

    function resetTime() { const d = new Date(); const jst = new Date(d.getTime() + (d.getTimezoneOffset() + 540) * 60000); document.getElementById("c-date").value = `${jst.getFullYear()}-${String(jst.getMonth()+1).padStart(2,'0')}-${String(jst.getDate()).padStart(2,'0')}`; document.getElementById("c-time").value = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    function loadCache() { const list = localStorage.getItem("aw109_cl_nslist"); if(list) { const arr = JSON.parse(list); const sel = document.getElementById("c-staff"); sel.innerHTML = arr.map(n => `<option value="${n}">${n}</option>`).join(""); } }
    function clearAllCache() { localStorage.removeItem("aw109_cl_masters"); mastersCache = {}; loadDataForCurrentView(); }
    function showLoader(m1, m2) { document.getElementById("loader-main").innerText = m1; document.getElementById("loader-sub").innerText = m2; document.getElementById("global-loader").style.display = "flex"; }
    function hideLoader() { document.getElementById("global-loader").style.display = "none"; }

    async function fetchChecklistStatus() {
      try {
        const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_checklist_status", password: PIN_CODE, date: document.getElementById("c-date").value }) });
        const json = await res.json();
        if (json.status === "success") {
          document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('completed'));
          Object.keys(json.data).forEach(k => { if(json.data[k]) document.getElementById("btn-type-" + k)?.classList.add('completed'); });
        }
      } catch(e) {}
    }

    function switchType(type) { currentType = type; document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active')); document.getElementById("current-check-title").innerText = `${type} の入力`; loadDataForCurrentView(); }
    function loadDataForCurrentView() { fetchMaster(); }

    async function fetchMaster() {
      // 🌟 GAS(v2.2)の判定式に100%完全一致させるため、currentTypeをそのままダイレクト送信
      showLoader(`${currentType} マスタ読込中...`, "項目を生成中");
      try {
        const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_checklist", password: PIN_CODE, type: currentType }) });
        const json = await res.json();
        if (json.status === "success") {
          checklistItems = json.items.map((it, idx) => ({ ...it, originalIndex: idx }));
          if(json.nsList) {
            document.getElementById("c-staff").innerHTML = json.nsList.map(n => `<option value="${n}">${n}</option>`).join("");
            localStorage.setItem("aw109_cl_nslist", JSON.stringify(json.nsList));
          }
          renderChecklist();
        } else { alert("エラー: " + json.message); }
      } catch(e) { alert("通信エラー"); } finally { hideLoader(); }
    }

    function renderChecklist() {
      const container = document.getElementById("checklist-container"); container.innerHTML = "";
      let html = `<div class="card">`;
      checklistItems.forEach(it => {
        html += `<div class="chk-row" id="row-${it.originalIndex}">
          <div class="chk-title">${it.name}</div>
          <div class="toggle-group" style="margin-top:6px;">
            <button type="button" class="tgl-btn ok" id="btn-ok-${it.originalIndex}" onclick="setVal(${it.originalIndex}, '◯')">◯ 異常なし</button>
            <button type="button" class="tgl-btn ng" id="btn-ng-${it.originalIndex}" onclick="setVal(${it.originalIndex}, '✕')">✕ 異常あり</button>
          </div>
        </div>`;
      });
      html += `</div>`; container.innerHTML = html;
    }

    function setVal(idx, val) {
      currentData[idx] = val;
      document.getElementById(`btn-ok-${idx}`).classList.toggle('active', val === '◯');
      document.getElementById(`btn-ng-${idx}`).classList.toggle('active', val === '✕');
    }

    async function submitChecklist() {
      const staff = document.getElementById("c-staff").value; if(!staff) return alert("点検者を選択してください");
      const payload = { date: document.getElementById("c-date").value, time: document.getElementById("c-time").value, staff: staff, judgment: "異常なし", errorItems: "なし", rawJson: currentData };
      showLoader("保存中...", "データを書き込み中");
      try {
        const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "submit_checklist", password: PIN_CODE, type: currentType, data: payload }) });
        const json = await res.json();
        if(json.status === "success") { alert("保存しました"); fetchChecklistStatus(); }
      } catch(e) { alert("送信エラー"); } finally { hideLoader(); }
    }
    function switchMainTab(t) {}
    function sendErrorLog(m) {}
  </script>
</body>
</html>
