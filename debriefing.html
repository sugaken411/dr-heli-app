<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>AW109 デブリーフィング</title>
  <style>
    :root { --bg: #f2f2f7; --card: #ffffff; --ink: #1c1c1e; --sub: #8e8e93; --brand: #d32f2f; --blue: #007aff; --line: rgba(60,60,67,0.12); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--ink); padding-bottom: 80px; -webkit-font-smoothing: antialiased; }
    
    header { position: fixed; top: 0; left: 0; right: 0; height: 56px; padding: 0 16px; background: rgba(242,242,247,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: bold; cursor: pointer; }
    .version-tag { font-size: 10px; color: #fff; font-weight: bold; background: var(--blue); padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    
    .tab-container { position: fixed; top: 56px; left: 0; right: 0; height: 44px; background: #fff; border-bottom: 1px solid var(--line); display: flex; overflow-x: auto; z-index: 99; scrollbar-width: none; }
    .tab-container::-webkit-scrollbar { display: none; }
    .nav-tab { flex: 1; min-width: 75px; text-align: center; padding: 0 4px; height: 44px; line-height: 44px; font-size: 12px; font-weight: 700; color: var(--sub); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: 0.2s; }
    .nav-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    
    main { margin-top: 100px; padding: 16px; max-width: 800px; margin-left: auto; margin-right: auto; }
    .card { background: var(--card); border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 16px; }
    .section-label { font-size: 13px; font-weight: 800; color: var(--sub); margin-bottom: 12px; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
    
    input[type="text"], input[type="tel"], input[type="time"], textarea, select { width: 100%; border: 1px solid var(--line); font-size: 14px; background: var(--bg); outline: none; padding: 12px; border-radius: 8px; margin-bottom: 8px; color: var(--ink); font-weight: 600; box-sizing: border-box; }
    textarea { resize: vertical; line-height: 1.5; }
    
    .btn-blue { background: var(--blue); color: #fff; border: none; padding: 12px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; }
    .btn-next { background: var(--brand); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; margin-top: 8px; box-shadow: 0 4px 12px rgba(211,47,47,0.2); }
    .btn-small { background: #e5e5ea; color: var(--ink); border: none; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
    
    .radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .radio-lbl { display: inline-block; padding: 8px 12px; background: var(--bg); border: 1px solid var(--line); border-radius: 20px; font-size: 13px; font-weight: bold; color: var(--sub); cursor: pointer; transition: 0.2s; user-select: none; }
    input[type="radio"], input[type="checkbox"] { display: none; }
    input[type="radio"]:checked + .radio-lbl, input[type="checkbox"]:checked + .radio-lbl { background: var(--blue); color: #fff; border-color: var(--blue); }
    
    .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; } 
    .chip { border: 1px solid var(--line); border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--ink); background: var(--bg); transition: 0.15s; user-select: none; } 
    .chip.on { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 2px 6px rgba(0,122,255,0.2); }
    
    .acc-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); font-weight: 700; font-size: 14px; cursor: pointer; color: var(--ink); }
    .acc-header .arrow { font-size: 12px; color: var(--sub); transition: 0.3s; }
    .acc-header.open .arrow { transform: rotate(180deg); }
    .acc-body { display: none; padding: 12px 0; }
    .acc-body.open { display: block; animation: fadeIn 0.2s ease; }

    .search-result-item { padding: 12px; border: 1px solid var(--blue); border-radius: 8px; margin-bottom: 8px; cursor: pointer; background: #fff; }
    .data-preview { font-size: 12px; background: #f9f9f9; padding: 12px; border-radius: 6px; border-left: 4px solid var(--blue); margin-bottom: 12px; line-height: 1.6; }
    
    .eval-block { border: 2px solid var(--blue); border-radius: 8px; padding: 12px; margin-bottom: 16px; background: #fdfdfd; }
    .eval-row { display: flex; align-items: flex-start; margin-bottom: 6px; gap: 4px; }
    .eval-row span { font-size: 11px; font-weight: bold; width: 30px; padding-top: 10px; color: var(--blue); }

    .fb-block { background: #f9f9f9; border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 16px; }

    .tab-content { display: none; animation: fadeIn 0.3s ease; } 
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
    
    /* Q&Aモーダル用 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: var(--bg); width: 100%; max-width: 500px; border-radius: 16px; padding: 20px; max-height: 85vh; overflow-y: auto; }
    .modal-close { display: block; width: 100%; padding: 14px; margin-top: 16px; background: #e5e5ea; border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; }
    
    @media print { body { background: #fff; padding: 0; } header, .tab-container, main > div:not(#tab-sec5), .no-print { display: none !important; } #tab-sec5 { display: block !important; margin: 0; padding: 0; } }
  </style>
</head>
<body>

<datalist id="ext-affil-list"></datalist>
<datalist id="ext-staff-list"></datalist>
<datalist id="diagnosis-list"></datalist>

<div id="global-loader"><div class="spinner"></div><div style="margin-top:16px; font-weight:800; color:var(--ink);" id="loader-text">システム起動中...</div></div>

<header>
  <button class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
  <div style="font-weight:900; font-size:16px;">🧠 デブリーフィング <span class="version-tag">v11.0</span></div>
  <div style="display:flex; gap:12px;">
    <button class="hdr-btn no-print" onclick="openModal('qa')">❓ Q&A</button>
  </div>
</header>

<div class="tab-container no-print">
  <div class="nav-tab active" onclick="switchTab('sec1')">1.事案環境</div>
  <div class="nav-tab" onclick="switchTab('sec2')">2.症例評価</div>
  <div class="nav-tab" onclick="switchTab('sec3')">3.タグ付</div>
  <div class="nav-tab" onclick="switchTab('sec4')">4.多職種</div>
  <div class="nav-tab" onclick="switchTab('sec5')">5.保存</div>
</div>

<main>
  <div id="tab-sec1" class="tab-content active">
    <div class="card no-print">
      <div class="section-label">🔍 事案の検索と紐付け</div>
      <label style="display:flex; align-items:center; gap:8px; margin-bottom:12px; font-size:13px; font-weight:bold; color:var(--blue);">
        <input type="checkbox" id="s-today" checked onchange="searchCases()" style="display:block; width:16px; height:16px; margin:0;"> 本日の事案のみ表示
      </label>
      <div style="display:flex; gap:8px; margin-bottom:8px;">
        <input type="tel" inputmode="numeric" id="s-id" placeholder="要請番号" style="margin:0; flex:1;" oninput="toHalfWidth(this)">
        <button class="btn-blue" onclick="searchCases()" style="width:80px; padding:0;">検索</button>
      </div>
      <div id="search-results-area" style="display:none; margin-top:12px;"></div>
    </div>

    <div id="case-data-area" style="display:none;">
      <div class="card">
        <div class="section-label" style="color:var(--blue); border-bottom-color:var(--line);">📝 紐付けデータ</div>
        <div id="v-fetched-data"></div>
      </div>

      <div class="card">
        <div class="section-label">📋 要請形態 と 概要</div>
        <div class="radio-group" style="margin-bottom:16px;">
          <label><input type="radio" name="req-type" value="現場要請" onchange="toggleReqType()"> <span class="radio-lbl">現場要請</span></label>
          <label><input type="radio" name="req-type" value="キーワード要請" onchange="toggleReqType()"> <span class="radio-lbl">キーワード要請</span></label>
          <label><input type="radio" name="req-type" value="施設間要請" onchange="toggleReqType()"> <span class="radio-lbl">施設間搬送</span></label>
        </div>
        
        <div id="kw-container" style="display:none; margin-bottom:16px; background:#f9f9f9; padding:12px; border-radius:8px;">
          <div style="font-size:12px; font-weight:bold; color:var(--sub); margin-bottom:8px;">🔑 キーワード指定</div>
          <div class="chip-grid" id="chip-container-keyword"></div>
        </div>

        <div style="font-size:12px; font-weight:bold; color:var(--sub); margin-bottom:4px;">📖 事案概要・ストーリー</div>
        <textarea id="v-summary" rows="4" placeholder="事案の発生から結末までの全体的な流れや背景..."></textarea>
      </div>

      <div class="card">
        <div class="section-label">🩺 現場診断 (疾患)</div>
        <div class="chip-grid" id="chip-container-diagnosis" style="margin-bottom:12px;"></div>
        
        <div class="acc-header" onclick="toggleAcc(this, 'acc-diag-gen')" style="background:#e3f2fd; color:#0d47a1; padding:8px 12px; border-radius:8px; border:none; margin-bottom:8px; font-size:13px;">➕ 新しい病名を作成・追加する<span class="arrow">▼</span></div>
        <div class="acc-body" id="acc-diag-gen" style="background:#f9f9f9; padding:12px; border-radius:8px;">
          <select id="diag-category" style="margin-bottom:8px; border:1px solid #ccc; font-size:13px;">
            <option value="">大項目から絞り込む...</option>
            <option value="心停止">心停止</option><option value="ショック">ショック</option><option value="内因性疾患">内因性疾患</option><option value="外因性疾患">外因性疾患</option>
            <option value="小児内科疾患">小児内科疾患</option><option value="産婦人科">特殊疾患（産婦人科）</option><option value="中毒">特殊疾患（中毒）</option>
            <option value="熱傷">特殊疾患（熱傷）</option><option value="精神科">特殊疾患（精神科）</option>
          </select>
          <input type="text" id="diag-name" list="diagnosis-list" placeholder="病名を入力・選択" style="margin-bottom:8px; border:1px solid #ccc;">
          
          <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:12px; font-size:13px; font-weight:bold;">
            <label style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="diag-right" style="width:16px;height:16px;display:block;"> 右</label>
            <label style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="diag-left" style="width:16px;height:16px;display:block;"> 左</label>
            <label style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="diag-both" style="width:16px;height:16px;display:block;"> 両側</label>
            <span style="color:#ccc;">|</span>
            <label style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="diag-doubt" style="width:16px;height:16px;display:block;"> 疑い</label>
          </div>
          <button class="btn-small" style="background:var(--blue); color:#fff; width:100%; padding:10px;" onclick="generateDiagnosis()">＋ この病名で確定・マスタ追加</button>
        </div>
      </div>

      <div class="card">
        <div class="section-label">🏢 振り返り環境 と 参加者</div>
        
        <div style="margin-bottom:16px;">
          <div style="font-size:12px; font-weight:bold; color:var(--sub); margin-bottom:8px;">振り返り場所</div>
          <div class="radio-group">
            <label><input type="radio" name="env-loc" value="浜町待機所" checked onchange="toggleEnvOther('loc')"> <span class="radio-lbl">浜町待機所</span></label>
            <label><input type="radio" name="env-loc" value="運行調整室" onchange="toggleEnvOther('loc')"> <span class="radio-lbl">運行調整室</span></label>
            <label><input type="radio" name="env-loc" value="各自" onchange="toggleEnvOther('loc')"> <span class="radio-lbl">各自(リモート)</span></label>
            <label><input type="radio" name="env-loc" value="その他" onchange="toggleEnvOther('loc')"> <span class="radio-lbl">その他</span></label>
          </div>
          <input type="text" id="env-loc-other" placeholder="その他の場所を入力" style="display:none; margin-top:4px;">
        </div>

        <div style="margin-bottom:16px;">
          <div style="font-size:12px; font-weight:bold; color:var(--sub); margin-bottom:8px;">振り返り方法</div>
          <div class="radio-group">
            <label><input type="radio" name="env-method" value="対面" checked onchange="toggleEnvOther('method')"> <span class="radio-lbl">対面</span></label>
            <label><input type="radio" name="env-method" value="Zoom" onchange="toggleEnvOther('method')"> <span class="radio-lbl">Zoom</span></label>
            <label><input type="radio" name="env-method" value="対面＋Zoom" onchange="toggleEnvOther('method')"> <span class="radio-lbl">対面＋Zoom</span></label>
            <label><input type="radio" name="env-method" value="その他" onchange="toggleEnvOther('method')"> <span class="radio-lbl">その他</span></label>
          </div>
          <input type="text" id="env-method-other" placeholder="その他の方法を入力" style="display:none; margin-top:4px;">
        </div>

        <div style="margin-bottom:16px;">
          <div style="font-size:12px; font-weight:bold; color:var(--sub); margin-bottom:8px;">固定参加者</div>
          <div id="fixed-pt-accordions"></div>
        </div>
        
        <div style="margin-bottom:16px;">
          <div style="font-size:12px; font-weight:bold; color:var(--brand); margin-bottom:8px;">※ このシートの記載者(Ns)</div>
          <div class="chip-grid" id="recorder-container"></div>
        </div>

        <div style="border-top:1px dashed var(--line); padding-top:12px; margin-bottom:12px;">
          <div style="font-size:12px; font-weight:bold; color:var(--sub); margin-bottom:8px;">外部参加者 (消防・救急隊など)</div>
          <div id="ext-pt-container"></div>
          <button class="btn-small" style="background:#e3f2fd; color:#0d47a1;" onclick="addExtPt()">＋ 外部を追加</button>
        </div>
        
        <div style="border-top:1px dashed var(--line); padding-top:12px;">
          <div style="font-size:12px; font-weight:bold; color:var(--sub); margin-bottom:8px;">OJT (同乗研修)</div>
          <div id="ojt-pt-container"></div>
          <button class="btn-small" style="background:#fce4ec; color:#c2185b;" onclick="addOjtPt()">＋ OJTを追加</button>
        </div>
      </div>
    </div>
    <button class="btn-next no-print" onclick="switchTab('sec2')">次へ (症例評価) ➔</button>
  </div>

  <div id="tab-sec2" class="tab-content">
    <div id="eval-container"></div>
    <button class="btn-blue" style="background:#8b5cf6;" onclick="addEvalBlock()">＋ 新しい評価ポイントを追加</button>
    <button class="btn-next no-print" style="margin-top:24px;" onclick="switchTab('sec3')">次へ (タグ付け) ➔</button>
  </div>

  <div id="tab-sec3" class="tab-content">
    <div class="card" id="tags-container"></div>
    <button class="btn-next no-print" onclick="switchTab('sec4')">次へ (多職種振り返り) ➔</button>
  </div>

  <div id="tab-sec4" class="tab-content">
    <div id="feedback-container"></div>
    <button class="btn-blue" style="background:#10b981;" onclick="addFeedbackBlock()">＋ 振り返りの視点を追加</button>
    <button class="btn-next no-print" style="margin-top:24px;" onclick="switchTab('sec5')">次へ (プレビュー・保存) ➔</button>
  </div>

  <div id="tab-sec5" class="tab-content">
    <div class="card" style="padding: 0;"><div id="print-area"></div></div>
    <div class="no-print">
      <button class="btn-blue" id="btn-submit" onclick="submitDebriefing()" style="padding: 16px; font-size: 16px;">✅ アーカイブに保存</button>
    </div>
  </div>

</main>

<div class="modal-overlay" id="modal-qa" onclick="if(event.target===this)closeModal('qa')">
  <div class="modal-box">
    <h3 style="margin-top:0;">❓ Q&A ＆ 要望BOX</h3>
    <div id="qa-list" style="font-size:13px; line-height:1.5; color:var(--sub); margin-bottom:16px; max-height:30vh; overflow-y:auto; border-bottom:1px solid var(--line); padding-bottom:12px;">読込中...</div>
    <div style="font-size:13px; font-weight:700; margin-bottom:8px;">💡 開発チームへ要望を送る</div>
    <textarea id="qa-input" rows="3" style="width:100%; border:1px solid var(--line); border-radius:8px; padding:10px;"></textarea>
    <button onclick="submitQA(event)" style="width:100%; padding:12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700; margin-top:8px;">送信</button>
    <button class="modal-close" onclick="closeModal('qa')">閉じる</button>
  </div>
</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  const PIN_CODE = "5740";

  const SCENE_LIST = ["要請内容から出動前まで", "出動～接触前まで", "接触・現場対応", "搬送", "引き継ぎ", "次事案への準備"];
  
  // ★ 完全版のキーワード・タグリスト
  const TAG_MASTERS = {
    keyword: { label: "🔑 キーワード要請", items: [] }, // 初期化時にマスタから取得
    practice: { label: "🛠 実務項目", items: ["情報理解", "出動前準備", "リスク予測", "情報共有", "多職種連携・コーディネート", "アセスメント", "初期対応", "処置介助", "資器材管理", "患者の安全管理", "家族対応", "申し送り"] },
    treatment: { label: "💉 処置", items: ["バックボード固定", "骨盤固定", "ターニケット", "除染", "分娩介助", "気管挿管", "胸腔ドレナージ", "心エコー"] },
    special: { label: "🚨 特殊ケース", items: ["緊急外来搬送", "多数傷病", "補完ヘリや防災ヘリとの協働", "救急隊・支援隊不在エリアでの活動"] },
    risk: { label: "⚠️ リスク関連", items: ["リスク対策", "忘れ物", "コミュニケーションエラー", "ドレーンチューブ類管理", "処置関連"] }
  };

  let allCasesData = []; let existingDebriefs = []; let currentCase = null; 
  let masters = { dr:[], ns:[], pilot:[], mechanic:[], cs:[], extAffil:[], extStaff:[], diagnosis:[], keyword:[] };
  
  let sysData = {
    reqType: "",
    tags: { keyword:[], diagnosis:[], practice:[], treatment:[], special:[], risk:[], dr:[], ns:[], pilot:[], mechanic:[], cs:[], recorder:[] },
    evals: [], feedbacks: []
  };

  // 全角半角自動補正
  function toHalfWidth(ele) {
    let val = ele.value;
    val = val.replace(/[０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); });
    ele.value = val;
  }

  window.onload = async () => {
    buildTagUI();
    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('editId');
    if(editId) document.getElementById('s-id').value = editId;
    
    await fetchInitData();
    if(editId) searchCases();
  };

  function switchTab(id) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); 
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active'); document.getElementById('tab-' + id).classList.add('active'); window.scrollTo(0,0);
    if (id === 'sec4') renderFeedbackBlocks();
    if (id === 'sec5') generatePreview();
  }

  // --- Q&Aモーダル操作 ---
  function openModal(id) { document.getElementById('modal-'+id).classList.add('show'); }
  function closeModal(id) { document.getElementById('modal-'+id).classList.remove('show'); }
  async function submitQA(event) {
    const q = document.getElementById("qa-input").value.trim(); if (!q) return alert("入力してください。");
    const btn = event.target; btn.textContent = "送信中..."; btn.disabled = true;
    try {
      const res = await fetch(GAS_API_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify({action:"submit_question", password:PIN_CODE, question:q, source:"デブリーフィング"}) });
      const json = await res.json();
      if (json.status === "success") { alert("送信しました。"); document.getElementById("qa-input").value = ""; closeModal('qa'); }
    } catch (e) { alert("通信エラー"); } finally { btn.textContent = "送信"; btn.disabled = false; }
  }

  // --- 共通UIヘルパー ---
  function toggleAcc(el, targetId) { el.classList.toggle('open'); document.getElementById(targetId).classList.toggle('open'); }
  function toggleEnvOther(type) {
    const val = document.querySelector(`input[name="env-${type}"]:checked`).value;
    document.getElementById(`env-${type}-other`).style.display = (val === 'その他') ? 'block' : 'none';
  }
  
  function renderChips(containerId, list, category, isRadio = false) {
    const box = document.getElementById(containerId); box.innerHTML = "";
    list.forEach(item => {
      const isOn = sysData.tags[category] && sysData.tags[category].includes(item);
      const cls = isOn ? "chip on" : "chip";
      box.innerHTML += `<div class="${cls}" onclick="toggleChip('${category}', '${item}', ${isRadio})">${item}</div>`;
    });
  }
  function toggleChip(cat, item, isRadio) {
    if(!sysData.tags[cat]) sysData.tags[cat] = [];
    if(isRadio) { sysData.tags[cat] = [item]; } 
    else {
      if(sysData.tags[cat].includes(item)) sysData.tags[cat] = sysData.tags[cat].filter(x => x !== item);
      else sysData.tags[cat].push(item);
    }
    if(cat === 'keyword') renderChips('chip-container-keyword', masters.keyword, 'keyword');
    else if(cat === 'diagnosis') renderChips('chip-container-diagnosis', sysData.tags.diagnosis, 'diagnosis'); // 選ばれたものだけ表示
    else if(TAG_MASTERS[cat]) renderChips(`chip-container-${cat}`, TAG_MASTERS[cat].items, cat);
    else if(masters[cat]) renderChips(`chip-container-${cat}`, masters[cat], cat);
    else if(cat === 'recorder') renderChips('recorder-container', masters.ns, 'recorder', true);
  }

  // --- Tab 1: 初期化とマスタ ---
  async function fetchInitData() {
    try {
      const r1 = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_init", password: PIN_CODE, app_name: "デブリーフィング" }) });
      const j1 = await r1.json(); if (j1.status === "success") masters = j1.masters;
      
      if(j1.qa) document.getElementById("qa-list").innerHTML = j1.qa.filter(q => q.status === "◯").map(item => `<p style="margin-bottom:8px;"><b>Q. ${item.q}</b><br><span style="color:var(--ink);">A. ${item.a}</span></p><hr style="border:none;border-top:1px solid var(--line);">`).join("");
      
      masters.extAffil.forEach(a => document.getElementById("ext-affil-list").innerHTML += `<option value="${a}">`);
      masters.extStaff.forEach(s => document.getElementById("ext-staff-list").innerHTML += `<option value="${s}">`);
      masters.diagnosis.forEach(d => document.getElementById("diagnosis-list").innerHTML += `<option value="${d}">`);
      
      // キーワードマスタのセット
      if(masters.keyword && masters.keyword.length > 0) {
        TAG_MASTERS.keyword.items = masters.keyword;
      } else {
        masters.keyword = ["閉じ込められている", "車外放出された", "山岳部滑落", "溺れている", "CPA", "アナフィラキシーショック", "大量吐血", "D-call Net", "その他"];
        TAG_MASTERS.keyword.items = masters.keyword;
      }
      
      const buildFixedAcc = (cat, label, arr) => `
        <div class="acc-header" onclick="toggleAcc(this, 'acc-${cat}')">👤 ${label}<span class="arrow">▼</span></div>
        <div class="acc-body" id="acc-${cat}">
          <div class="chip-grid" id="chip-container-${cat}" style="margin-bottom:8px;"></div>
          <div style="display:flex; gap:8px;">
            <input type="text" id="new-${cat}" placeholder="${label}を追加" style="margin:0; flex:1; font-size:12px; padding:6px;">
            <button class="btn-small" style="background:var(--blue); color:#fff;" onclick="addMasterAndChip('${cat}', 'new-${cat}', 'chip-container-${cat}')">登録</button>
          </div>
        </div>`;
      document.getElementById("fixed-pt-accordions").innerHTML = buildFixedAcc('dr','フライトドクター', masters.dr) + buildFixedAcc('ns','フライトナース', masters.ns) + buildFixedAcc('pilot','機長', masters.pilot) + buildFixedAcc('mechanic','整備士', masters.mechanic) + buildFixedAcc('cs','CS', masters.cs);
      
      ['dr','ns','pilot','mechanic','cs'].forEach(cat => renderChips(`chip-container-${cat}`, masters[cat], cat));
      renderChips('recorder-container', masters.ns, 'recorder', true);
      renderChips('chip-container-keyword', masters.keyword, 'keyword');

      const r2 = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_recent_cases", password: PIN_CODE }) });
      const j2 = await r2.json(); if(j2.status === "success") allCasesData = j2.data;

      const r3 = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_debriefings", password: PIN_CODE }) });
      const j3 = await r3.json(); if(j3.status === "success") existingDebriefs = j3.data;

    } catch(e) { console.log(e); } finally { document.getElementById("global-loader").style.display = "none"; }
  }

  // 🌟 病名ジェネレーター
  async function generateDiagnosis() {
    const name = document.getElementById("diag-name").value.trim(); if(!name) return;
    const isRight = document.getElementById("diag-right").checked;
    const isLeft = document.getElementById("diag-left").checked;
    const isBoth = document.getElementById("diag-both").checked;
    const isDoubt = document.getElementById("diag-doubt").checked;
    
    let prefix = "";
    if(isBoth) prefix = "両側"; else if(isRight && isLeft) prefix = "両側"; else if(isRight) prefix = "右"; else if(isLeft) prefix = "左";
    let suffix = isDoubt ? "疑い" : "";
    const finalName = `${prefix}${name}${suffix}`;
    
    if(!sysData.tags.diagnosis) sysData.tags.diagnosis = [];
    if(!sysData.tags.diagnosis.includes(finalName)) sysData.tags.diagnosis.push(finalName);
    renderChips('chip-container-diagnosis', sysData.tags.diagnosis, 'diagnosis');
    
    document.getElementById("diag-name").value = ""; document.getElementById("diag-right").checked = false;
    document.getElementById("diag-left").checked = false; document.getElementById("diag-both").checked = false; document.getElementById("diag-doubt").checked = false;
  }

  async function addMasterAndChip(cat, inputId, containerId, directVal = null) {
    const val = directVal || document.getElementById(inputId).value.trim(); if(!val) return;
    if(inputId) document.getElementById(inputId).value = "追加中...";
    try {
      await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "add_master", password: PIN_CODE, type: cat, val1: val }) });
      if(!masters[cat].includes(val)) masters[cat].push(val); 
      if(!sysData.tags[cat]) sysData.tags[cat] = [];
      if(!sysData.tags[cat].includes(val)) sysData.tags[cat].push(val);
      renderChips(containerId, masters[cat], cat); 
      if(inputId) document.getElementById(inputId).value = "";
    } catch(e) { alert("エラー"); if(inputId) document.getElementById(inputId).value = ""; }
  }

    const val = document.querySelector('input[name="req-type"]:checked').value;

    document.getElementById('kw-container').style.display = (val === 'キーワード要請') ? 'block' : 'none';

  // --- 事案検索・紐付け ---
  function searchCases() {
    const isToday = document.getElementById("s-today").checked;
    const qId = document.getElementById("s-id").value.trim();
    const todayStr = new Date().toISOString().split('T')[0].replace(/-/g, '/');
    
    let results = allCasesData.filter(r => {
      if(!r.id) return false;
      if(isToday && r.date !== todayStr) return false;
      if(qId && !String(r.id).includes(qId)) return false;
      return true;
    }).slice(0, 15);

    const resArea = document.getElementById("search-results-area");
    if(results.length === 0) resArea.innerHTML = "<div style='color:var(--brand); font-weight:bold; text-align:center;'>該当なし</div>";
    else resArea.innerHTML = results.map(r => {
      const time = r.rawData["要請時刻・施設間搬送依頼時刻"] || r.rawData["初期離陸時間"] || "--:--";
      return `<div class="search-result-item" onclick='selectCase(${JSON.stringify(r).replace(/'/g, "&apos;")})'>
        <b>No.${r.id}</b> ｜ ${r.date} ｜ ${r.scheme || '未選択'}<br>
        <span style="font-size:12px;color:var(--sub);">[${time}] 出場先: ${r.dest} / Dr:${r.rawData["フライトドクター"]} Ns:${r.rawData["フライトナース"]}</span>
      </div>`;
    }).join("");
    resArea.style.display = "block";
  }

  function selectCase(rowWrapper) {
    currentCase = rowWrapper.rawData;
    document.getElementById("search-results-area").style.display = "none"; document.getElementById("case-data-area").style.display = "block";
    
    // 🌟 Phase 1の「システムデータ（現場診断・キーワード等）」の復元
    let sys = {};
    try { if(currentCase["システムデータ"]) sys = JSON.parse(currentCase["システムデータ"]); } catch(e){}
    
    if(sys.tags) {
      if(sys.tags.keyword) {
        sys.tags.keyword.forEach(k => { if(!sysData.tags.keyword.includes(k)) sysData.tags.keyword.push(k); });
      }
      if(sys.tags.diagnosis) {
        sys.tags.diagnosis.forEach(d => { if(!sysData.tags.diagnosis.includes(d)) sysData.tags.diagnosis.push(d); });
      }
    }
    // システムデータが無い場合のフォールバック（現場診断列や備考から）
    if(sysData.tags.diagnosis.length === 0 && currentCase["現場診断"]) {
      sysData.tags.diagnosis = currentCase["現場診断"].split(",").map(d => d.trim()).filter(Boolean);
    }
    if(sys.reqType) {
      document.querySelector(`input[name="req-type"][value="${sys.reqType}"]`).checked = true;
      toggleReqType();
    }
    
    // UI反映
    renderChips('chip-container-keyword', masters.keyword, 'keyword');
    renderChips('chip-container-diagnosis', sysData.tags.diagnosis, 'diagnosis');

    const past = existingDebriefs.find(d => String(d["要請番号"]) === String(currentCase["要請番号"]));
    if(past && past["システムデータ"]) {
      if(confirm("💡 この事案はすでにデブリーフィングが登録されています。データを読み込んで上書き編集しますか？")) {
        restoreSystemData(JSON.parse(past["システムデータ"]));
        document.getElementById("btn-submit").innerHTML = "💾 過去データを上書き保存"; document.getElementById("btn-submit").style.backgroundColor = "#ff9800";
      }
    }
    document.getElementById("v-fetched-data").innerHTML = `<div class="data-preview">No: <b>${currentCase["要請番号"]}</b><br>出場先: ${currentCase["出場先"]}<br>Dr: ${currentCase["フライトドクター"]} / Ns: ${currentCase["フライトナース"]}</div>`;
  }

  function restoreSystemData(sys) {
    sysData = sys;
    document.getElementById("v-summary").value = sys.summary || "";
    if(sys.reqType) { document.querySelector(`input[name="req-type"][value="${sys.reqType}"]`).checked = true; toggleReqType(); }
    if(sys.envLoc) { const el = document.querySelector(`input[name="env-loc"][value="${sys.envLoc}"]`); if(el) el.checked=true; else { document.querySelector(`input[name="env-loc"][value="その他"]`).checked=true; document.getElementById("env-loc-other").value = sys.envLoc; document.getElementById("env-loc-other").style.display="block"; } }
    if(sys.envMethod) { const el = document.querySelector(`input[name="env-method"][value="${sys.envMethod}"]`); if(el) el.checked=true; else { document.querySelector(`input[name="env-method"][value="その他"]`).checked=true; document.getElementById("env-method-other").value = sys.envMethod; document.getElementById("env-method-other").style.display="block"; } }
    
    ['dr','ns','pilot','mechanic','cs','diagnosis','recorder','keyword'].forEach(cat => {
      if(sysData.tags[cat]) {
        if(cat==='keyword') renderChips('chip-container-keyword', masters.keyword, 'keyword');
        else if(cat==='diagnosis') renderChips('chip-container-diagnosis', sysData.tags.diagnosis, 'diagnosis');
        else if(cat==='recorder') renderChips('recorder-container', masters.ns, 'recorder', true);
        else renderChips(`chip-container-${cat}`, masters[cat], cat);
      }
    });

    document.getElementById("ext-pt-container").innerHTML = ""; if(sys.ext) sys.ext.forEach(e => addExtPt(e.affil, e.name));
    document.getElementById("ojt-pt-container").innerHTML = ""; if(sys.ojt) sys.ojt.forEach(o => addOjtPt(o.job, o.name));
    
    renderEvalBlocks(); renderFeedbackBlocks();
  }

        <textarea rows="2" placeholder="🟢 Good (良かった点)" onchange="sysData.feedbacks[${idx}].good=this.value" style="border-color:#a5d6a7;">${fb.good}</textarea>
        <textarea rows="2" placeholder="⚠️ Bad / Gap (課題)" onchange="sysData.feedbacks[${idx}].bad=this.value" style="border-color:#fff59d;">${fb.bad}</textarea>
        <textarea rows="2" placeholder="🚀 Next (次回アクション)" onchange="sysData.feedbacks[${idx}].next=this.value" style="border-color:#bbdefb;">${fb.next}</textarea>
      </div>`;
      box.insertAdjacentHTML('beforeend', html);
    });
  }

  // --- Tab 5: 保存・プレビュー ---
  function generatePreview() {
    if (!currentCase) { document.getElementById("print-area").innerHTML = "<p style='text-align:center;color:var(--brand);padding:20px;'>事案を紐付けしてください。</p>"; return; }
    
    let envLoc = document.querySelector('input[name="env-loc"]:checked')?.value || ""; if(envLoc==='その他') envLoc = document.getElementById("env-loc-other").value;
    let envMethod = document.querySelector('input[name="env-method"]:checked')?.value || ""; if(envMethod==='その他') envMethod = document.getElementById("env-method-other").value;
    
    let ptList = [];
    ['dr','ns','pilot','mechanic','cs'].forEach(c => { if(sysData.tags[c]) sysData.tags[c].forEach(n=>ptList.push(n)); });
    document.querySelectorAll('.ext-row').forEach(r => { const a=r.querySelector('.e-affil').value; const n=r.querySelector('.e-name').value; if(a||n) ptList.push(`${a} ${n}`); });
    document.querySelectorAll('.ojt-row').forEach(r => { const j=r.querySelector('.o-job').value; const n=r.querySelector('.o-name').value; if(j||n) ptList.push(`[OJT]${j} ${n}`); });

    let evalHtml = sysData.evals.map((e,i) => {
      let sc = e.scene==='その他' ? e.sceneOther : e.scene;
      let html = `<div style="margin-bottom:12px; border-bottom:1px dashed #ccc; padding-bottom:8px;"><b>#${i+1} ${e.type} (${sc||'場面未選択'})</b><br>`;
      if(e.type === '状況評価') html += `[状況] ${e.desc||'-'}<br>`;
      else html += `[ABCDEF] A:${e.a||'-'} B:${e.b||'-'} C:${e.c||'-'} D:${e.d||'-'} E:${e.e||'-'} F:${e.f||'-'}<br>`;
      html += `[対応] ${e.response||'-'}<br><span style="color:#2e7d32">[Good] ${e.good||'-'}</span><br><span style="color:#d32f2f">[Bad] ${e.bad||'-'}</span></div>`;
      return html;
    }).join("");
    
    let fbHtml = sysData.feedbacks.map(f => {
      let nm = f.name ? `(${f.name})` : '';
      return `<div style="margin-bottom:8px;"><b>【${f.prof}${nm}】</b><br><span style="color:#2e7d32">G: ${f.good||'-'}</span><br><span style="color:#d32f2f">B: ${f.bad||'-'}</span><br><span style="color:#1565c0">N: ${f.next||'-'}</span></div>`;
    }).join("");

    const summaryVal = document.getElementById("v-summary").value || "";
    
    document.getElementById("print-area").innerHTML = `
      <div class="print-report">
        <h2>AW109 デブリーフィング</h2>
        <div style="margin-bottom:8px;"><b>要請:</b> ${sysData.reqType||'-'} / <b>診断:</b> ${(sysData.tags.diagnosis||[]).join(", ")||'-'}</div>
        <div style="margin-bottom:8px;"><b>環境:</b> ${envLoc} / ${envMethod}</div>
        <div style="margin-bottom:8px;"><b>参加者:</b> ${ptList.join(", ")||'未記入'}</div>
        <h3>■ 概要</h3><div style="padding:4px;">${summaryVal.replace(/\n/g,'<br>')||'記載なし'}</div>
        <h3>■ 症例評価</h3><div style="padding:4px;">${evalHtml||'記載なし'}</div>
        <h3>■ 振り返り</h3><div style="padding:4px;">${fbHtml||'記載なし'}</div>
      </div>
    `;
  }

  async function submitDebriefing() {
    if (!currentCase) return alert("事案がありません。");
    const rec = (sysData.tags.recorder && sysData.tags.recorder.length>0) ? sysData.tags.recorder[0] : "";
    if (!rec) return alert("タブ1で記載者(Ns)を選択してください。");

    // 保存用データの構築
    sysData.summary = document.getElementById("v-summary").value;
    sysData.envLoc = document.querySelector('input[name="env-loc"]:checked')?.value; if(sysData.envLoc==='その他') sysData.envLoc = document.getElementById("env-loc-other").value;
    sysData.envMethod = document.querySelector('input[name="env-method"]:checked')?.value; if(sysData.envMethod==='その他') sysData.envMethod = document.getElementById("env-method-other").value;
    
    sysData.ext = []; document.querySelectorAll('.ext-row').forEach(r => sysData.ext.push({affil:r.querySelector('.e-affil').value, name:r.querySelector('.e-name').value}));
    sysData.ojt = []; document.querySelectorAll('.ojt-row').forEach(r => sysData.ojt.push({job:r.querySelector('.o-job').value, name:r.querySelector('.o-name').value}));

    let ptList = [];
    ['dr','ns','pilot','mechanic','cs'].forEach(c => { if(sysData.tags[c]) sysData.tags[c].forEach(n=>ptList.push(n)); });
    sysData.ext.forEach(e => { if(e.affil||e.name) ptList.push(`${e.affil} ${e.name}`); }); 
    sysData.ojt.forEach(o => { if(o.job||o.name) ptList.push(`[OJT]${o.job} ${o.name}`); });

    let evalTxt = sysData.evals.map((e,i) => {
      let sc = e.scene==='その他'?e.sceneOther:e.scene;
      let txt = `【#${i+1} ${e.type}(${sc||'未選択'})】\n`;
      if(e.type==='状況評価') txt+=`状況: ${e.desc||'-'}\n`; else txt+=`A:${e.a||'-'} B:${e.b||'-'} C:${e.c||'-'} D:${e.d||'-'} E:${e.e||'-'} F:${e.f||'-'}\n`;
      return txt + `対応: ${e.response||'-'}\nGood: ${e.good||'-'}\nBad: ${e.bad||'-'}\n`;
    }).join("\n");

    let cg="", cb="";
    sysData.feedbacks.forEach(f => {
      let nm = f.name ? `(${f.name})` : '';
      if(f.good) cg += `【${f.prof}${nm}】\n${f.good}\n`;
      if(f.bad||f.next) cb += `【${f.prof}${nm}】\n[Bad] ${f.bad}\n[Next] ${f.next}\n`;
    });

    const tagsObj = {
      keyword: (sysData.reqType ? `[${sysData.reqType}] ` : "") + (sysData.tags['keyword']||[]).join(", "),
      scene: [...new Set(sysData.evals.map(e => e.scene==='その他'?e.sceneOther:e.scene).filter(Boolean))].join(", "),
      practice: (sysData.tags['practice']||[]).join(", "),
      disease: (sysData.tags['diagnosis']||[]).join(", "),
      treatment: (sysData.tags['treatment']||[]).join(", "),
      special: (sysData.tags['special']||[]).join(", "),
      risk: (sysData.tags['risk']||[]).join(", ")
    };

    const payload = {
      caseId: currentCase["要請番号"], recorder: rec, tags: tagsObj, summary: sysData.summary, evalText: evalTxt,
      good: cg.trim(), bad: cb.trim(), location: sysData.envLoc, method: sysData.envMethod, participants: ptList.join(", "),
      systemData: sysData
    };

    const btn = document.getElementById("btn-submit"); btn.disabled = true; btn.innerText = "送信中... 🚁";
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "submit_debriefing", password: PIN_CODE, data: payload }) });
      const json = await res.json();
      if (json.status === "success") { alert("保存しました！"); location.href = "portal.html"; } else alert("エラー");
    } catch(e) { alert("通信エラー"); } finally { btn.disabled = false; btn.innerText = "✅ アーカイブに保存"; }
  }
</script>
