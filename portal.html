<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>AW109 EMS Portal</title>
  <style>
    :root {
      --bg: #f2f2f7; --card: #ffffff; --ink: #1c1c1e; --sub: #8e8e93;
      --brand: #d32f2f; --brand-light: #ffebeb; --blue: #007aff; --med-blue: #e3f2fd;
      --line: rgba(60,60,67,0.12);
      --safe-top: env(safe-area-inset-top); --safe-bot: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; padding-top: calc(56px + var(--safe-top)); padding-bottom: calc(20px + var(--safe-bot)); }
    header { position: fixed; top: 0; left: 0; right: 0; height: calc(56px + var(--safe-top)); padding-top: var(--safe-top); padding-left: 16px; padding-right: 16px; background: rgba(242,242,247,0.92); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--line); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .title-box { text-align: center; font-weight: 800; font-size: 16px; }
    .version-tag { font-size: 10px; color: #fff; font-weight: bold; background: var(--blue); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    main { padding: 16px; max-width: 900px; margin: 0 auto; }
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9998; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .alert-box { background: #fff9db; border: 1px solid #ffd43b; border-radius: 12px; padding: 16px; margin-bottom: 16px; display: none; flex-direction: column; gap: 8px; }
    .alert-item { font-size: 14px; font-weight: bold; color: #b08800; cursor: pointer; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .portal-card { background: var(--card); border-radius: 16px; padding: 20px; text-decoration: none; color: var(--ink); display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-left: 6px solid var(--sub); }
    .icon { font-size: 32px; width: 48px; text-align: center; }
    .card-body { flex: 1; }
    .title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
    .desc { font-size: 12px; color: var(--sub); line-height: 1.4; }
    .card-section { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--line); }
    .section-label { font-size: 14px; font-weight: 800; color: var(--sub); margin-bottom: 16px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .news-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid var(--line); }
    .news-hdr { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
    .news-date { font-size: 11px; color: var(--sub); }
    .news-cat { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: var(--med-blue); color: var(--blue); }
    .news-title { font-size: 14px; font-weight: 700; }
    .news-content { font-size: 13px; color: var(--sub); white-space: pre-wrap; }
  </style>
</head>
<body>

<div id="global-loader" style="display:none;">
  <div class="spinner"></div>
  <div class="loader-text" id="loader-main-text">最新データを同期中...</div>
  <div id="loader-sub-text" style="font-size:12px; color:var(--sub); margin-top:4px;">接続中</div>
</div>

<header>
  <div class="title-box">AW109 EMS PORTAL <span class="version-tag">v12.9</span></div>
</header>

<main>
  <div id="alert-box" class="alert-box"></div>
  <div class="grid-container">
    <a href="index.html" class="portal-card" style="border-left-color: var(--brand);"><div class="icon">🚁</div><div class="card-body"><div class="title" style="color:var(--brand);">症例登録</div><div class="desc">処置・資機材の登録</div></div></a>
    <a href="search.html" class="portal-card" style="border-left-color: var(--blue);"><div class="icon">🔍</div><div class="card-body"><div class="title" style="color:var(--blue);">事案検索コンソール</div><div class="desc">過去データの検索・修正</div></div></a>
    <a href="checklist.html" class="portal-card" style="border-left-color: #ff9500;"><div class="icon">☑️</div><div class="card-body"><div class="title" style="color:#ff9500;">日常点検</div><div class="desc">ME機器、バック等の点検</div></div></a>
  </div>
  <div class="card-section">
    <div class="section-label">📢 最新のお知らせ</div>
    <div id="news-box" style="font-size:13px;">お知らせはありません。</div>
  </div>
</main>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  window.onload = () => { fetchInit(); };

  async function fetchInit() {
    document.getElementById("global-loader").style.display = "flex";
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_init", password: "5740", app_name: "ポータル" }) });
      const json = await res.json();
      if (json.status === "success") {
        if (json.news && json.news.length > 0) {
          document.getElementById("news-box").innerHTML = json.news.map(item => `
            <div class="news-item">
              <div class="news-hdr"><span class="news-cat">${item.category}</span> <span class="news-date">${item.date}</span></div>
              <div class="news-title"><b>${item.title}</b></div>
              <div class="news-content">${item.content}</div>
            </div>`).join("");
        }
      }
    } catch (e) {
      document.getElementById("news-box").innerHTML = `<span style="color:red; font-weight:bold;">⚠️ GAS連携エラー: スプレッドシート側の「DB_お知らせ」シートに有効なデータが存在するか、列構成を確認してください。</span>`;
    } finally { document.getElementById("global-loader").style.display = "none"; }
  }
</script>
</body>
</html>
