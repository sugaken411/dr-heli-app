<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>AW109 統計ダッシュボード</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    /* 🌟 システム完全統一カラー・変数 */
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --ink: #1c1c1e;
      --sub: #8e8e93;
      --brand: #d32f2f;
      --brand-light: #ffebeb;
      --blue: #007aff;
      --green: #34c759;
      --orange: #ff9500;
      --line: rgba(60,60,67,0.12);
      --safe-top: env(safe-area-inset-top);
      --safe-bot: env(safe-area-inset-bottom);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
    
    /* 🌟 統一固定ヘッダー */
    header { position: fixed; top: 0; left: 0; right: 0; height: calc(56px + var(--safe-top)); padding-top: var(--safe-top); padding-left: 16px; padding-right: 16px; background: rgba(242,242,247,0.92); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--line); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
    .hdr-group { display: flex; gap: 12px; }
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .title-box { text-align: center; font-weight: 800; font-size: 16px; letter-spacing: 0.5px; }
    
    main { margin-top: calc(56px + var(--safe-top)); padding: 16px; max-width: 1000px; margin-left: auto; margin-right: auto; padding-bottom: calc(40px + var(--safe-bot)); }

    /* ローディング画面 */
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9998; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* カード・UI部品 */
    .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .card-title { font-size: 14px; font-weight: 800; color: var(--sub); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); padding-bottom: 8px; text-transform: uppercase; }
    
    /* フィルターボタン */
    .filter-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .filter-btn { padding: 8px 16px; background: #e5e5ea; color: var(--ink); border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .filter-btn.active { background: var(--blue); color: #fff; }
    
    .date-inputs { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .date-input { padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; font-weight: bold; color: var(--ink); outline: none; flex: 1; min-width: 130px; }
    .csv-btn { padding: 10px 16px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; margin-left: auto; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

    /* KPIサマリー */
    .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
    @media (min-width: 768px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); } }
    .kpi-box { background: var(--bg); padding: 16px; border-radius: 12px; text-align: center; border: 1px solid var(--line); }
    .kpi-label { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 4px; }
    .kpi-value { font-size: 28px; font-weight: 900; color: var(--ink); line-height: 1.1; }
    .kpi-value.blue { color: var(--blue); }
    .kpi-value.red { color: var(--brand); }
    .kpi-value.green { color: var(--green); }
    .kpi-value.orange { color: var(--orange); }

    /* チャートコンテナ */
    .chart-container { position: relative; height: 250px; width: 100%; }
    .chart-container-large { position: relative; height: 300px; width: 100%; }

    /* リストテーブル */
    .ranking-list { list-style: none; margin: 0; padding: 0; }
    .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--line); }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-name { font-size: 14px; font-weight: 600; color: var(--ink); }
    .ranking-count { font-size: 14px; font-weight: 800; color: var(--blue); background: var(--med-blue); padding: 2px 10px; border-radius: 12px; }
    .ranking-count.green-badge { color: #2e7d32; background: #e8f5e9; }

    .grid-2col { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; }
    @media (min-width: 768px) { .grid-2col { grid-template-columns: repeat(2, 1fr); } }
    
    /* 印刷用スタイル */
    @media print {
      body { background: #fff; }
      body * { visibility: hidden; }
      #printable-area, #printable-area * { visibility: visible; }
      #printable-area { position: absolute; left: 0; top: 0; width: 100%; }
      header, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    }
  </style>
</head>
<body>

  <div id="global-loader">
    <div class="spinner"></div>
    <div style="margin-top:16px; font-weight:800; color:var(--ink);">データ集計中...</div>
  </div>

  <header class="no-print">
    <div class="hdr-group">
      <button class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
    </div>
    <div class="title-box">統計ダッシュボード</div>
    <div class="hdr-group">
      <button class="hdr-btn" onclick="window.print()">🖨️ 印刷</button>
    </div>
  </header>

  <main id="printable-area">
    <div class="card no-print">
      <div class="card-title">📅 集計期間の指定</div>
      <div class="filter-grid">
        <button class="filter-btn" id="btn-this-month" onclick="setDateFilter('thisMonth')">今月</button>
        <button class="filter-btn" id="btn-last-month" onclick="setDateFilter('lastMonth')">先月</button>
        <button class="filter-btn" id="btn-this-year" onclick="setDateFilter('thisYear')">今年</button>
        <button class="filter-btn" id="btn-all" onclick="setDateFilter('all')">全期間</button>
      </div>
      <div class="date-inputs">
        <input type="date" id="filter-start" class="date-input" onchange="applyFilters()">
        <span style="color:var(--sub); font-weight:bold;">〜</span>
        <input type="date" id="filter-end" class="date-input" onchange="applyFilters()">
        <button class="csv-btn" onclick="exportCSV()">📥 CSV出力</button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-box">
        <div class="kpi-label">総要請件数</div>
        <div class="kpi-value blue" id="kpi-total">0</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-label">実出動件数 (完了)</div>
        <div class="kpi-value green" id="kpi-actual">0</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-label">キャンセル件数</div>
        <div class="kpi-value red" id="kpi-cancel">0</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-label">カルテ未完了</div>
        <div class="kpi-value orange" id="kpi-incomplete">0</div>
      </div>
    </div>

    <div class="grid-2col">
      <div class="card">
        <div class="card-title">📈 出動件数の推移</div>
        <div class="chart-container-large">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">🚁 スキーム別割合</div>
        <div class="chart-container">
          <canvas id="schemeChart"></canvas>
        </div>
      </div>
    </div>

    <div class="grid-2col">
      <div class="card">
        <div class="card-title">🏥 要請元・出場先トップ10</div>
        <ul class="ranking-list" id="dest-list"></ul>
      </div>

      <div class="card">
        <div class="card-title">💉 主要処置・資機材の実績</div>
        <ul class="ranking-list" id="proc-list"></ul>
      </div>
    </div>
    
    <div class="grid-2col">
      <div class="card">
        <div class="card-title">👨‍⚕️ フライトDr 実績</div>
        <ul class="ranking-list" id="dr-list"></ul>
      </div>

      <div class="card">
        <div class="card-title">👩‍⚕️ フライトNs 実績</div>
        <ul class="ranking-list" id="ns-list"></ul>
      </div>
    </div>

  </main>

<script>
  // 🌟 メインシステムのGAS API URLに書き換えてください
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  const PIN_CODE = "5740";
  
  let allData = [];
  let filteredData = [];
  let chartInstances = {}; 

  window.onload = () => { fetchData(); };

  // 🌟 GASから全データを一括取得（既存のfetch_allアクションを利用）
  async function fetchData() {
    document.getElementById("global-loader").style.display = "flex";
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "fetch_all", password: PIN_CODE }),
        redirect: "follow"
      });
      const json = await res.json();
      
      if (json.status === "success") {
        allData = json.data;
        setDateFilter('thisMonth'); // 初期表示は今月
      } else {
        alert("データの取得に失敗しました。");
      }
    } catch (e) {
      alert("通信エラーが発生しました。電波状況を確認してください。");
    } finally {
      document.getElementById("global-loader").style.display = "none";
    }
  }

  // 🌟 日付フィルターのセット
  function setDateFilter(type) {
    const startInput = document.getElementById("filter-start");
    const endInput = document.getElementById("filter-end");
    const d = new Date();
    
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    
    if (type === 'thisMonth') {
      document.getElementById("btn-this-month").classList.add("active");
      startInput.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`;
      endInput.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate()}`;
    } else if (type === 'lastMonth') {
      document.getElementById("btn-last-month").classList.add("active");
      const lastMonth = new Date(d.getFullYear(), d.getMonth() - 1, 1);
      startInput.value = `${lastMonth.getFullYear()}-${String(lastMonth.getMonth() + 1).padStart(2, '0')}-01`;
      endInput.value = `${lastMonth.getFullYear()}-${String(lastMonth.getMonth() + 1).padStart(2, '0')}-${new Date(lastMonth.getFullYear(), lastMonth.getMonth() + 1, 0).getDate()}`;
    } else if (type === 'thisYear') {
      document.getElementById("btn-this-year").classList.add("active");
      startInput.value = `${d.getFullYear()}-01-01`;
      endInput.value = `${d.getFullYear()}-12-31`;
    } else if (type === 'all') {
      document.getElementById("btn-all").classList.add("active");
      startInput.value = "";
      endInput.value = "";
    }
    applyFilters();
  }

  // 🌟 データの絞り込みとダッシュボードの描画
  function applyFilters() {
    const startStr = document.getElementById("filter-start").value;
    const endStr = document.getElementById("filter-end").value;
    
    filteredData = allData.filter(row => {
      let dateVal = row["日付"] ? String(row["日付"]).replace(/\//g, "-") : "";
      if (startStr && dateVal < startStr) return false;
      if (endStr && dateVal > endStr) return false;
      return true;
    });
    
    renderDashboard();
  }

  function renderDashboard() {
    // 1. KPIの計算
    let total = filteredData.length;
    let cancel = 0;
    let incomplete = 0;
    
    filteredData.forEach(r => {
      const st = String(r["ステータス"] || "");
      if (st.includes("キャンセル")) cancel++;
      if (st.includes("未完了")) incomplete++;
    });
    
    let actual = total - cancel; 
    
    document.getElementById("kpi-total").innerText = total;
    document.getElementById("kpi-actual").innerText = actual;
    document.getElementById("kpi-cancel").innerText = cancel;
    document.getElementById("kpi-incomplete").innerText = incomplete;
    
    // 2. スキーム別集計
    let schemeCounts = {};
    filteredData.forEach(r => {
      const sc = String(r["スキーム選択"] || "未選択").trim();
      if (!schemeCounts[sc]) schemeCounts[sc] = 0;
      schemeCounts[sc]++;
    });
    drawSchemeChart(schemeCounts);
    
    // 3. 出動推移集計
    let trendCounts = {};
    filteredData.forEach(r => {
      let d = String(r["日付"] || "不明");
      let key = d.substring(0, 7); // 月別にグループ化 (YYYY-MM)
      if (!trendCounts[key]) trendCounts[key] = { total: 0, actual: 0 };
      trendCounts[key].total++;
      if (!String(r["ステータス"]).includes("キャンセル")) trendCounts[key].actual++;
    });
    drawTrendChart(trendCounts);
    
    // 4. ランキング計算
    renderList("dest-list", countKey(filteredData, "出場先"), 10);
    renderList("dr-list", countKey(filteredData, "フライトドクター"), 10);
    renderList("ns-list", countKey(filteredData, "フライトナース"), 10);
    
    // 5. 処置・資機材集計
    renderProcList();
  }

  function countKey(data, keyName) {
    let counts = {};
    data.forEach(r => {
      const val = String(r[keyName] || "不明").trim();
      if (val === "" || val === "不明") return;
      if (!counts[val]) counts[val] = 0;
      counts[val]++;
    });
    return counts;
  }

  function renderList(elementId, countsObj, limit) {
    const sorted = Object.entries(countsObj).sort((a, b) => b[1] - a[1]).slice(0, limit);
    const ul = document.getElementById(elementId);
    if (sorted.length === 0) {
      ul.innerHTML = "<li class='ranking-item'><span class='ranking-name' style='color:var(--sub);'>データなし</span></li>";
      return;
    }
    ul.innerHTML = sorted.map(item => `
      <li class="ranking-item">
        <span class="ranking-name">${item[0]}</span>
        <span class="ranking-count">${item[1]}件</span>
      </li>
    `).join("");
  }

  function renderProcList() {
    const targetProcs = ["気管挿管", "心エコー", "FAST", "胸腔ドレナージ", "EtCO2", "人工呼吸器管理料", "12誘導心電図"];
    let procCounts = {};
    targetProcs.forEach(p => procCounts[p] = 0);
    procCounts["CPR (胸骨圧迫)"] = 0;
    
    filteredData.forEach(r => {
      targetProcs.forEach(p => {
        if (String(r[p] || "").includes("◯")) procCounts[p]++;
      });
      if (String(r["圧迫1開始"] || "").trim() !== "") procCounts["CPR (胸骨圧迫)"]++;
    });
    
    const sorted = Object.entries(procCounts).sort((a, b) => b[1] - a[1]);
    document.getElementById("proc-list").innerHTML = sorted.map(item => `
      <li class="ranking-item">
        <span class="ranking-name">${item[0]}</span>
        <span class="ranking-count green-badge">${item[1]}件</span>
      </li>
    `).join("");
  }

  // --- Chart.js 描画 ---
  function drawSchemeChart(dataObj) {
    const ctx = document.getElementById('schemeChart').getContext('2d');
    if (chartInstances['scheme']) chartInstances['scheme'].destroy();
    
    const labels = Object.keys(dataObj);
    const data = Object.values(dataObj);
    
    chartInstances['scheme'] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: ['#007aff', '#34c759', '#ff9500', '#5856d6', '#ff2d55', '#8e8e93'],
          borderWidth: 2,
          borderColor: '#ffffff'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { font: { family: '-apple-system' } } } }
      }
    });
  }

  function drawTrendChart(dataObj) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    if (chartInstances['trend']) chartInstances['trend'].destroy();
    
    const sortedKeys = Object.keys(dataObj).sort();
    const labels = sortedKeys;
    const totalData = sortedKeys.map(k => dataObj[k].total);
    const actualData = sortedKeys.map(k => dataObj[k].actual);
    
    chartInstances['trend'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          { label: '実出動件数', data: actualData, backgroundColor: '#007aff', borderRadius: 4 },
          { label: '総要請件数 (キャンセル含)', data: totalData, backgroundColor: '#e5e5ea', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } },
        plugins: { legend: { position: 'top' } }
      }
    });
  }

  // 🌟 CSV出力機能
  function exportCSV() {
    if (filteredData.length === 0) return alert("データがありません。");
    const headers = Object.keys(filteredData[0]);
    let csvContent = headers.join(",") + "\n";
    filteredData.forEach(row => {
      csvContent += headers.map(h => `"${String(row[h] || "").replace(/"/g, '""')}"`).join(",") + "\n";
    });
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `AW109_Dashboard_${document.getElementById("filter-start").value || "All"}.csv`;
    link.click();
  }
</script>
</body>
</html>
