<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>月間集計ダッシュボード</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js" crossorigin="anonymous"></script>

    <style>
        :root { --bg:#f2f2f7; --card:#ffffff; --ink:#1c1c1e; --sub:#8e8e93; --blue:#007aff; --brand:#d32f2f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--ink); }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        #login-overlay { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
        #global-loader { position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:9998; flex-direction:column; align-items:center; justify-content:center; display:none; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid #af52de; border-radius: 50%; animation: spin 1s linear infinite; } 
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print {
            @page { size: landscape; margin: 10mm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: white; }
            .no-print { display: none !important; }
            .print-summary-card { border: 1px solid #ccc !important; box-shadow: none !important; margin-bottom: 8px !important; page-break-inside: avoid; }
            .print-footer { position: fixed; bottom: 0; right: 0; width: 100%; text-align: right; font-size: 8pt; color: #888; padding-top: 2px; border-top: 1px solid #eee; background: white; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
        
        const Icon = ({ path, className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );
        const Icons = {
            Chart: (props) => <Icon {...props} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>} />,
            FileSpreadsheet: (props) => <Icon {...props} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M10 9v8"/></>} />,
            Printer: (props) => <Icon {...props} path={<><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>} />,
            Lock: (props) => <Icon {...props} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />,
            BookOpen: (props) => <Icon {...props} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />,
            X: (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />
        };

        const CATEGORIES = {
            MISSION: { label: 'ヘリ活動' },
            CANCEL: { label: 'キャンセル' },
            INSPECTION: { label: '始業点検' },
            INSPECTION_END: { label: '終業点検' },
            ASSISTANT: { label: '補助者業務' },
            MANAGEMENT: { label: '管理業務' },
            GROUP: { label: 'グループ業務' },
            OTHER: { label: 'その他' }
        };

        const SummaryApp = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            
            const [isLoading, setIsLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState('');
            
            const [summaryData, setSummaryData] = useState([]);
            const [masters, setMasters] = useState({ dr: [], ns: [] });
            const [manuals, setManuals] = useState([]);
            const [showManual, setShowManual] = useState(false);
            
            const [sumMonth, setSumMonth] = useState(new Date().toISOString().substring(0, 7));
            const [sumDr, setSumDr] = useState("");
            const [sumNs, setSumNs] = useState("");
            const [keyword, setKeyword] = useState("");

            const handleLogin = async () => {
                if(!password) return;
                setLoginError('');
                setLoadingMsg('データを取得中...');
                setIsLoading(true);
                try {
                    const res = await fetch(GAS_API_URL, {
                        method: "POST",
                        headers: {"Content-Type": "text/plain;charset=utf-8"},
                        body: JSON.stringify({action: "fetch_init", password: password, app_name: "集計"})
                    });
                    const json = await res.json();
                    if (json.status === "success") {
                        setIsLoggedIn(true);
                        setMasters({ dr: json.masters.dr || [], ns: json.masters.ns || [] });
                        setManuals(json.manuals || []);
                        fetchAllReports(password);
                    } else {
                        setLoginError(json.message || 'パスワードが違います');
                        setIsLoading(false);
                    }
                } catch (e) {
                    setLoginError('通信エラーが発生しました');
                    setIsLoading(false);
                }
            };

            const handlePasswordChange = (e) => {
                let val = e.target.value;
                val = val.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[^0-9]/g, '');
                setPassword(val);
            };

            const fetchAllReports = async (pass) => {
                setLoadingMsg('全日誌データを集計中...');
                try {
                    const res = await fetch(GAS_API_URL, {
                        method: "POST",
                        headers: {"Content-Type": "text/plain;charset=utf-8"},
                        body: JSON.stringify({action: "fetch_all_reports", password: pass})
                    });
                    const json = await res.json();
                    if (json.status === "success" && json.data) {
                        setSummaryData(json.data);
                    }
                } catch (e) {
                    alert("集計データの取得に失敗しました。");
                } finally {
                    setIsLoading(false);
                }
            };

            const filteredSummary = useMemo(() => {
                return summaryData.filter(d => {
                    if (!d.date.startsWith(sumMonth) && !d.date.startsWith(sumMonth.replace('-','/'))) return false;
                    if (sumDr && d.dr !== sumDr) return false;
                    if (sumNs && d.ns !== sumNs) return false;
                    if (keyword) {
                        const searchTarget = (d.reason + " " + d.eventsStr).toLowerCase();
                        if (!searchTarget.includes(keyword.toLowerCase())) return false;
                    }
                    return true;
                }).sort((a,b) => new Date(b.date.replace(/\//g,'-')) - new Date(a.date.replace(/\//g,'-')));
            }, [summaryData, sumMonth, sumDr, sumNs, keyword]);

            const summaryStats = useMemo(() => {
                let totalMission = 0;
                let totalCancel = 0;
                let totalDays = filteredSummary.length;
                filteredSummary.forEach(row => {
                    try {
                        const evs = JSON.parse(row.eventsStr);
                        totalMission += evs.filter(e => e.category === 'mission').length;
                        totalCancel += evs.filter(e => e.category === 'cancel').length;
                    } catch(e) {}
                });
                return { days: totalDays, mission: totalMission, cancel: totalCancel };
            }, [filteredSummary]);

            const exportSummaryCSV = () => {
                if (filteredSummary.length === 0) return alert("出力するデータがありません");
                const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
                let csv = "日付,フライトドクター,フライトナース,待機理由/特記事項,実施件数,キャンセル件数,活動内容詳細\n";
                filteredSummary.forEach(row => {
                    let eventsArr = [];
                    try { eventsArr = JSON.parse(row.eventsStr); } catch(e){}
                    const mCount = eventsArr.filter(e => e.category === 'mission').length;
                    const cCount = eventsArr.filter(e => e.category === 'cancel').length;
                    const eNames = eventsArr.map(e => `[${CATEGORIES[e.category.toUpperCase()]?.label||'他'}] ${e.desc}`).join(" | ");
                    csv += `"${row.date}","${row.dr}","${row.ns}","${row.reason}",${mCount},${cCount},"${eNames.replace(/"/g, '""')}"\n`;
                });
                const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `AW109_Summary_${sumMonth.replace('-','')}.csv`; link.click();
            };

            const printDateStr = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });

            if (!isLoggedIn) {
                return (
                    <div id="login-overlay">
                        <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm text-center">
                            <h2 className="mt-0 text-slate-800 font-bold text-xl mb-2">月間集計ダッシュボード</h2>
                            <p className="text-slate-500 text-sm mb-6">アクセスコードを入力</p>
                            <input type="tel" inputMode="numeric" value={password} onChange={handlePasswordChange} onKeyDown={(e) => { if (e.key === 'Enter') handleLogin(); }} className="w-full mb-6 text-center text-2xl tracking-[0.5em] font-mono border-b-2 border-slate-300 focus:border-purple-500 outline-none pb-2" placeholder="****" />
                            <button onClick={handleLogin} disabled={isLoading} className="w-full py-3 bg-purple-600 text-white font-bold rounded-lg hover:bg-purple-700 disabled:opacity-50">
                                {isLoading ? '通信中...' : 'ログイン 🔓'}
                            </button>
                            {loginError && <p className="text-red-600 text-xs mt-3 font-bold">{loginError}</p>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-full mx-auto min-h-screen font-sans print:bg-white print:p-0">
                    {isLoading && (
                        <div id="global-loader" style={{display: 'flex'}}>
                            <div className="spinner mb-4"></div>
                            <div className="bg-slate-800 text-white font-bold px-6 py-3 rounded-xl shadow-lg text-sm">{loadingMsg}</div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 mb-4 p-4 no-print flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="flex items-center gap-2">
                            <Icons.Chart className="w-5 h-5 text-purple-600" />
                            <h1 className="text-lg font-bold text-slate-800 flex items-center gap-2">月間集計ダッシュボード <span className="text-[10px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full border border-purple-200">v1.0</span></h1>
                        </div>
                        <div className="flex flex-wrap gap-2 items-center">
                            <a href="portal.html" className="h-10 px-3 rounded border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 flex items-center gap-1 transition-colors text-xs font-bold"><Icons.Lock className="w-3.5 h-3.5"/> ポータルへ</a>
                            <button onClick={() => setShowManual(true)} className="h-10 px-3 rounded border border-purple-200 bg-purple-50 text-purple-600 hover:bg-purple-100 flex items-center gap-1 transition-colors text-xs font-bold"><Icons.BookOpen className="w-3.5 h-3.5"/> 取扱説明書</button>
                            <div className="h-6 w-px bg-slate-300 mx-1 hidden md:block"></div>
                            <button onClick={exportSummaryCSV} className="h-10 px-4 rounded bg-green-600 hover:bg-green-700 text-white flex items-center gap-1 transition-colors font-bold text-xs shadow-sm"><Icons.FileSpreadsheet className="w-3.5 h-3.5"/> CSV出力</button>
                            <button onClick={() => window.print()} className="h-10 px-3 rounded bg-slate-700 hover:bg-slate-800 text-white flex items-center gap-1 transition-colors font-bold text-xs"><Icons.Printer className="w-3.5 h-3.5"/> 印刷</button>
                        </div>
                    </div>

                    {/* Manual Modal */}
                    {showManual && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 no-print" onClick={() => setShowManual(false)}>
                            <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[80vh] overflow-y-auto p-6" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h2 className="text-lg font-bold flex items-center gap-2"><Icons.BookOpen className="w-5 h-5 text-purple-600"/> 取扱説明書</h2>
                                    <button onClick={() => setShowManual(false)} className="text-slate-400 hover:text-slate-600"><Icons.X className="w-5 h-5"/></button>
                                </div>
                                <div className="prose prose-sm text-slate-700">
                                    {manuals.length > 0 ? manuals.map((m, i) => <div key={i}><h3 className="font-bold text-purple-700 mb-2 border-l-4 border-purple-600 pl-2 mt-4">{m.title}</h3><p className="whitespace-pre-wrap">{m.text}</p></div>) : <p>取扱説明書はありません。</p>}
                                </div>
                                <div className="mt-6 text-right">
                                    <button onClick={() => setShowManual(false)} className="bg-slate-800 text-white font-bold px-8 py-2.5 rounded-lg hover:bg-slate-900">閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="print:block">
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6 print:border-none print:shadow-none print:p-0">
                            <h2 className="text-lg font-bold mb-4 hidden print:flex items-center gap-2 text-black">業務日報 月間集計レポート</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 no-print bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">対象月</label>
                                    <input type="month" value={sumMonth} onChange={e => setSumMonth(e.target.value)} className="w-full border border-slate-300 rounded-md p-2 text-sm font-bold outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Dr 絞り込み</label>
                                    <select value={sumDr} onChange={e => setSumDr(e.target.value)} className="w-full border border-slate-300 rounded-md p-2 text-sm font-bold outline-none bg-white">
                                        <option value="">全て</option>
                                        {masters.dr.map(d => <option key={d} value={d}>{d}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Ns 絞り込み</label>
                                    <select value={sumNs} onChange={e => setSumNs(e.target.value)} className="w-full border border-slate-300 rounded-md p-2 text-sm font-bold outline-none bg-white">
                                        <option value="">全て</option>
                                        {masters.ns.map(n => <option key={n} value={n}>{n}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">キーワード検索</label>
                                    <input type="text" value={keyword} onChange={e => setKeyword(e.target.value)} placeholder="給油、事案内容など" className="w-full border border-slate-300 rounded-md p-2 text-sm font-bold outline-none" />
                                </div>
                            </div>

                            <div className="hidden print:block mb-4 text-sm font-bold border-b border-black pb-2">
                                抽出条件: [対象月: {sumMonth}] [Dr: {sumDr || '全て'}] [Ns: {sumNs || '全て'}] {keyword ? `[検索: ${keyword}]` : ''}
                            </div>

                            <div className="grid grid-cols-3 gap-4 mb-6 print:mb-4">
                                <div className="bg-purple-50 border border-purple-200 p-4 rounded-lg text-center print-summary-card">
                                    <div className="text-xs font-bold text-purple-600 mb-1">登録日数</div>
                                    <div className="text-2xl font-black text-purple-900">{summaryStats.days} 日</div>
                                </div>
                                <div className="bg-red-50 border border-red-200 p-4 rounded-lg text-center print-summary-card">
                                    <div className="text-xs font-bold text-red-600 mb-1">合計実施件数</div>
                                    <div className="text-2xl font-black text-red-900">{summaryStats.mission} 件</div>
                                </div>
                                <div className="bg-slate-100 border border-slate-300 p-4 rounded-lg text-center print-summary-card">
                                    <div className="text-xs font-bold text-slate-600 mb-1">キャンセル件数</div>
                                    <div className="text-2xl font-black text-slate-800">{summaryStats.cancel} 件</div>
                                </div>
                            </div>
                            
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm print-text-xs border-collapse">
                                    <thead className="bg-slate-100 text-slate-600 text-xs border-y border-slate-300 print:border-y-2 print:border-black">
                                        <tr>
                                            <th className="py-3 px-4 font-bold border-r border-slate-200">日付</th>
                                            <th className="py-3 px-4 font-bold border-r border-slate-200">Dr</th>
                                            <th className="py-3 px-4 font-bold border-r border-slate-200">Ns</th>
                                            <th className="py-3 px-4 font-bold border-r border-slate-200 text-center">実施</th>
                                            <th className="py-3 px-4 font-bold border-r border-slate-200 text-center">Cxl</th>
                                            <th className="py-3 px-4 font-bold">待機理由 / 備考</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200 print:divide-slate-300">
                                        {filteredSummary.length === 0 ? <tr><td colSpan="6" className="text-center py-8 text-slate-500">該当するデータがありません</td></tr> : 
                                         filteredSummary.map((row, i) => {
                                            let evs = []; try { evs = JSON.parse(row.eventsStr); } catch(e){}
                                            const mCount = evs.filter(e => e.category === 'mission').length;
                                            const cCount = evs.filter(e => e.category === 'cancel').length;
                                            return (
                                                <tr key={i} className="hover:bg-slate-50">
                                                    <td className="py-2 px-4 font-mono font-bold border-r border-slate-100 print:border-slate-300">{row.date}</td>
                                                    <td className="py-2 px-4 border-r border-slate-100 print:border-slate-300 whitespace-nowrap">{row.dr}</td>
                                                    <td className="py-2 px-4 border-r border-slate-100 print:border-slate-300 whitespace-nowrap">{row.ns}</td>
                                                    <td className="py-2 px-4 text-center font-bold text-red-600 border-r border-slate-100 print:border-slate-300 print:text-black">{mCount > 0 ? mCount : '-'}</td>
                                                    <td className="py-2 px-4 text-center text-slate-500 border-r border-slate-100 print:border-slate-300">{cCount > 0 ? cCount : '-'}</td>
                                                    <td className="py-2 px-4 text-xs text-slate-600 print:text-black print:text-xs">
                                                        <div className="font-bold mb-1">{row.reason}</div>
                                                        <div className="text-[10px] text-slate-400 print:text-slate-600 line-clamp-2 print:line-clamp-none">
                                                            {evs.map(e => `[${CATEGORIES[e.category.toUpperCase()]?.label||'他'}] ${e.desc}`).join(" | ")}
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Print Footer */}
                    <div className="hidden print:block print-footer">
                        出力日時: {printDateStr} | AW109 EMS Pre-hospital Information Hub
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SummaryApp />);
    </script>
</body>
</html>
