<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>AW109 ME機器点検</title>
  <style>
    :root { --bg: #f2f2f7; --card: #ffffff; --ink: #1c1c1e; --sub: #8e8e93; --blue: #007aff; --brand: #d32f2f; --line: rgba(60,60,67,0.12); }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 0; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }
    
    header { position: sticky; top: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; z-index: 100; }
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    
    main { padding: 16px; max-width: 600px; margin: 0 auto; }
    
    .card { background: var(--card); border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; border: 1px solid var(--line); }
    .card-header { background: #f9f9f9; padding: 12px 16px; border-bottom: 1px solid var(--line); font-weight: 800; font-size: 14px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
    
    .chk-row { padding: 16px; border-bottom: 0.5px solid var(--line); display: flex; flex-direction: column; gap: 12px; }
    .chk-row:last-child { border-bottom: none; }
    .chk-title { font-size: 15px; font-weight: 700; color: var(--ink); }
    
    .toggle-group { display: flex; gap: 8px; }
    .tgl-btn { flex: 1; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; font-weight: 800; background: var(--bg); color: var(--sub); cursor: pointer; text-align: center; transition: 0.2s; }
    .tgl-btn.ok.active { background: #e8f5e9; color: #2e7d32; border-color: #4caf50; }
    .tgl-btn.ng.active { background: #ffebee; color: #c62828; border-color: #ef5350; }
    
    .text-input { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; background: var(--bg); outline: none; }
    .error-reason { display: none; margin-top: 8px; }
    
    .btn-all-ok { width: 100%; padding: 16px; background: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; border-radius: 12px; font-size: 16px; font-weight: 800; margin-bottom: 20px; cursor: pointer; box-shadow: 0 4px 12px rgba(76,175,80,0.2); transition: 0.2s; }
    .btn-all-ok:active { transform: scale(0.98); }
    .btn-submit { width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }
    
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="global-loader">
    <div class="spinner"></div>
    <div style="font-weight:800; color:var(--ink); font-size:16px; margin-bottom:8px;" id="loader-main">マスタ同期中...</div>
    <div style="font-weight:600; color:var(--sub); font-size:13px;" id="loader-sub">点検項目を生成しています</div>
  </div>

  <header>
    <button class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
    <div style="font-weight:900; font-size:16px;">ME機器点検</div>
    <div style="width:60px;"></div>
  </header>

  <main>
    <div class="card" style="padding: 16px;">
      <div style="display:flex; gap:12px; margin-bottom:12px;">
        <div style="flex:1;">
          <label style="font-size:11px; font-weight:bold; color:var(--sub);">日付</label>
          <input type="date" id="c-date" class="text-input" style="padding:10px;">
        </div>
        <div style="flex:1;">
          <label style="font-size:11px; font-weight:bold; color:var(--sub);">時間</label>
          <input type="time" id="c-time" class="text-input" style="padding:10px;">
        </div>
      </div>
      <div>
        <label style="font-size:11px; font-weight:bold; color:var(--sub);">点検者 (Ns)</label>
        <select id="c-staff" class="text-input" style="padding:10px;">
          <option value="">選択してください...</option>
        </select>
      </div>
    </div>

    <button class="btn-all-ok" onclick="setAllOk()">✅ すべて異常なし (一括チェック)</button>

    <div id="checklist-container"></div>

    <div class="card" style="margin-top: 24px; border:2px solid var(--blue);">
      <div class="card-header" style="background:#e3f2fd; color:#0d47a1;">📝 最終確認・署名</div>
      <div style="padding: 16px;">
        <label style="font-size:12px; font-weight:bold; color:var(--sub); display:block; margin-bottom:8px;">全体特記事項 (任意)</label>
        <textarea id="c-remarks" rows="3" class="text-input" placeholder="引き継ぎ事項などがあれば入力"></textarea>
        
        <div style="margin-top:16px; padding-top:16px; border-top:1px dashed #ccc; text-align:center;">
          <button class="btn-submit" id="btn-save" onclick="submitChecklist()">点検を完了・保存する</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
    const PIN_CODE = "5740";
    
    let checklistItems = [];
    let currentData = {}; 
    let errorDetails = {}; 

    window.onload = () => {
      const now = new Date();
      document.getElementById("c-date").value = now.toISOString().split('T')[0];
      document.getElementById("c-time").value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      fetchMaster();
    };

    let loaderTimer1, loaderTimer2;
    function showLoader(m1, m2) {
      document.getElementById("loader-main").innerText = m1; document.getElementById("loader-sub").innerText = m2;
      document.getElementById("global-loader").style.display = "flex";
      loaderTimer1 = setTimeout(() => { document.getElementById("loader-sub").innerText = "電波が弱い可能性があります。お待ちください..."; }, 4000);
      loaderTimer2 = setTimeout(() => { document.getElementById("loader-sub").innerHTML = "<span style='color:var(--brand);'>通信タイムアウト<br>フリーズしている場合はリロードしてください。</span>"; }, 12000);
    }
    function hideLoader() { clearTimeout(loaderTimer1); clearTimeout(loaderTimer2); document.getElementById("global-loader").style.display = "none"; }
    function sendErrorLog(errMsg) { try { fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "error_log", source: "ME点検(checklist_me.html)", errorMsg: errMsg, userAgent: navigator.userAgent }) }); } catch(e) {} }

    async function fetchMaster() {
      showLoader("マスタ読込中...", "点検項目を生成しています");
      try {
        const res = await fetch(GAS_API_URL, {
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "fetch_checklist", password: PIN_CODE, type: "ME" })
        });
        const json = await res.json();
        if (json.status === "success") {
          checklistItems = json.items;
          const sel = document.getElementById("c-staff");
          json.nsList.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
          renderChecklist();
        } else {
          throw new Error(json.message);
        }
      } catch(e) { 
        alert("マスタの読み込みに失敗しました。\n※スプレッドシートに「ME点検マスタ」シートが作成されているか確認してください。");
        sendErrorLog(e.toString());
      } finally { hideLoader(); }
    }

    function renderChecklist() {
      const container = document.getElementById("checklist-container");
      container.innerHTML = "";
      
      const grouped = {};
      checklistItems.forEach((item, i) => {
        if(!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push({ ...item, originalIndex: i });
      });

      for (const [cat, items] of Object.entries(grouped)) {
        let html = `<div class="card"><div class="card-header">🔌 ${cat}</div>`;
        
        items.forEach(it => {
          const idx = it.originalIndex;
          html += `<div class="chk-row">
            <div class="chk-title">${it.name} ${it.required ? '<span style="color:var(--brand);font-size:12px;margin-left:4px;">*必須</span>' : ''}</div>`;
            
          if (it.inputType === "◯/✕") {
            html += `
              <div class="toggle-group">
                <div class="tgl-btn ok" id="btn-ok-${idx}" onclick="setVal(${idx}, '◯')">◯ 異常なし</div>
                <div class="tgl-btn ng" id="btn-ng-${idx}" onclick="setVal(${idx}, '✕')">✕ 異常あり</div>
              </div>
              <div class="error-reason" id="err-box-${idx}">
                <input type="text" class="text-input" placeholder="異常の詳細・対応を入力..." id="err-txt-${idx}" onchange="errorDetails[${idx}]=this.value" style="border-color:var(--brand); background:var(--brand-light);">
              </div>`;
          } else {
            html += `<input type="text" class="text-input" placeholder="数値を入力..." onchange="setVal(${idx}, this.value)">`;
          }
          html += `</div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
      }
    }

    function setVal(idx, val) {
      currentData[idx] = val;
      if (checklistItems[idx].inputType === "◯/✕") {
        document.getElementById(`btn-ok-${idx}`).classList.toggle('active', val === '◯');
        document.getElementById(`btn-ng-${idx}`).classList.toggle('active', val === '✕');
        const errBox = document.getElementById(`err-box-${idx}`);
        if (val === '✕') {
          errBox.style.display = 'block';
          document.getElementById(`err-txt-${idx}`).focus();
        } else {
          errBox.style.display = 'none';
          document.getElementById(`err-txt-${idx}`).value = "";
          delete errorDetails[idx];
        }
      }
    }

    function setAllOk() {
      checklistItems.forEach((item, i) => {
        if(item.inputType === "◯/✕") setVal(i, '◯');
      });
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    async function submitChecklist() {
      const staff = document.getElementById("c-staff").value;
      if(!staff) return alert("点検者 (Ns) を選択してください。");

      let missing = [];
      checklistItems.forEach((item, i) => {
        if(item.required && !currentData[i]) missing.push(`[${item.category}] ${item.name}`);
      });
      if(missing.length > 0) return alert(`以下の必須項目が未入力です：\n\n${missing.join("\n")}`);

      let judgment = "異常なし";
      let errorList = [];
      checklistItems.forEach((item, i) => {
        if (currentData[i] === "✕") {
          judgment = "異常あり";
          errorList.push(`${item.category} - ${item.name} (${errorDetails[i] || '詳細未記入'})`);
        }
      });

      let rawJson = {};
      checklistItems.forEach((item, i) => {
        rawJson[`${item.category}_${item.name}`] = currentData[i] || "";
        if(errorDetails[i]) rawJson[`${item.category}_${item.name}_詳細`] = errorDetails[i];
      });
      rawJson["全体特記事項"] = document.getElementById("c-remarks").value;

      const payload = {
        date: document.getElementById("c-date").value,
        time: document.getElementById("c-time").value,
        staff: staff,
        judgment: judgment,
        errorItems: errorList.length > 0 ? errorList.join(" / ") : "なし",
        rawJson: rawJson
      };

      if(!confirm(`総合判定: ${judgment}\n点検データを保存しますか？`)) return;

      const btn = document.getElementById("btn-save");
      btn.innerText = "保存中..."; btn.disabled = true;
      showLoader("データ保存中...", "データベースに書き込んでいます");

      try {
        const res = await fetch(GAS_API_URL, {
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "submit_checklist", password: PIN_CODE, type: "ME", data: payload })
        });
        const json = await res.json();
        if (json.status === "success") {
          alert("点検を完了しました！\n" + (judgment === "異常あり" ? "※異常内容は管理者に自動でメール通知されました。" : ""));
          location.href = "portal.html";
        } else {
          throw new Error(json.message);
        }
      } catch(e) { 
        alert("通信エラーが発生しました。電波の良い場所で再度お試しください。"); 
        sendErrorLog(e.toString());
      } finally {
        btn.innerText = "点検を完了・保存する"; btn.disabled = false;
        hideLoader();
      }
    }
  </script>
</body>
</html>
