<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>教育・事案検索コンソール</title>
  <style>
    :root {
      --bg: #f2f2f7; --card: #ffffff; --ink: #1c1c1e; --sub: #8e8e93;
      --brand: #d32f2f; --blue: #007aff; --line: #c7c7cc;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--ink); padding-bottom: 40px; -webkit-font-smoothing: antialiased; }
    
    header { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--line); position: sticky; top: 0; z-index: 100; }
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: bold; cursor: pointer; }
    .version-tag { font-size: 10px; color: #fff; font-weight: bold; background: var(--blue); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    
    main { padding: 16px; max-width: 800px; margin: 0 auto; }
    .filter-card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #d1d1d6; }
    .search-input { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 16px; font-weight: 600; }
    
    .cross-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .cross-item { display: flex; flex-direction: column; gap: 4px; }
    .cross-item label { font-size: 11px; font-weight: bold; color: var(--sub); }
    input, select { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 6px; font-size: 14px; font-weight: 600; outline: none; }
    
    .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .chip { padding: 6px 12px; border: 1px solid var(--line); border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--bg); }
    .chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    
    .btn-search { width: 100%; padding: 14px; background: var(--ink); color: #fff; font-weight: bold; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; margin-top: 16px; }
    
    .result-card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #d1d1d6; border-left: 5px solid var(--blue); }
    .rc-context { font-size: 13px; line-height: 1.6; background: #f9f9f9; padding: 10px; border-radius: 6px; margin-top: 8px; border: 1px solid #e5e5ea; }
    .t-chip { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; background: #e3f2fd; color: #0d47a1; display: inline-block; margin-right: 4px; margin-top: 4px; }

    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
  </style>
</head>
<body>

<div id="global-loader">
  <div class="spinner"></div>
  <div style="font-size: 16px; font-weight: 800; color: var(--ink); margin-top: 12px;">教育用データ同期中...</div>
</div>

<header>
  <button type="button" class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
  <div style="font-weight:900; font-size:16px;">🧠 教育・事案検索 <span class="version-tag">v12.2</span></div>
  <button type="button" class="hdr-btn" onclick="fetchLatestData(false, true)">🔄 更新</button>
</header>

<main>
  <div class="sync-status" id="sync-status" style="font-size:10px; text-align:right; font-weight:bold; color:var(--sub); margin-bottom:8px;">データ状態: 確認中...</div>
  
  <div class="filter-card">
    <input type="text" id="q-free" class="search-input" placeholder="🔍 フリーワード (概要や振り返り内容から検索)">
    
    <div class="cross-grid">
      <div class="cross-item"><label>要請番号</label><input type="tel" id="q-id" placeholder="ID検索" oninput="toHalfWidth(this)"></div>
      <div class="cross-item"><label>月で探す</label><input type="month" id="q-month"></div>
    </div>

    <div class="cross-grid">
      <div class="cross-item"><label>フライトドクター</label><select id="q-dr"><option value="">全て</option></select></div>
      <div class="cross-item"><label>フライトナース</label><select id="q-ns"><option value="">全て</option></select></div>
    </div>

    <div style="font-size:12px; font-weight:bold; color:var(--blue); margin-top:12px; margin-bottom:6px;">📌 疾患・場面タグ指定</div>
    <div class="chip-grid" id="ui-tags-disease"></div>
    <div class="chip-grid" id="ui-tags-scene"></div>
    
    <button type="button" class="btn-search" onclick="executeSearch()">この条件で検索する 🔍</button>
  </div>

  <div id="result-count" style="font-weight:bold; font-size:14px; margin-bottom:12px; color:var(--sub);">検索結果: 0件</div>
  <div id="results-area"></div>
</main>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  const PIN_CODE = "5740";
  const CACHE_KEY = "aw109_debrief_cache_v12";
  const CACHE_EXPIRE_MS = 6 * 60 * 60 * 1000;

  let mergedData = []; 

  function toHalfWidth(ele) { let val = ele.value; val = val.replace(/[０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); }); ele.value = val; }
  function clearTags() { document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active')); executeSearch(); }

  window.onload = async () => {
    const cachedStr = localStorage.getItem(CACHE_KEY);
    if (cachedStr) {
      try {
        const cacheObj = JSON.parse(cachedStr);
        if (Date.now() - cacheObj.timestampMs < CACHE_EXPIRE_MS) {
          document.getElementById("sync-status").innerText = `データ状態: キャッシュ展開完了 (${cacheObj.timestamp})`;
          buildUIFromData(cacheObj.data, cacheObj.masters);
          return;
        }
      } catch(e) {}
    }
    fetchLatestData(false, false);
  };

  async function fetchLatestData(isBackground, isManualUpdate) {
    document.getElementById("global-loader").style.display = "flex";
    try {
      const resInit = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_init", password: PIN_CODE, app_name: "教育検索" }), redirect: "follow" });
      const jsonInit = await resInit.json();
      
      const resJian = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_all", password: PIN_CODE }), redirect: "follow" });
      const jianData = (await resJian.json()).data;

      const resDeb = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_debriefings", password: PIN_CODE }), redirect: "follow" });
      const debData = (await resDeb.json()).data;

      let newData = [];
      debData.forEach(d => {
        // 🌟 紐付けキーを「要請番号」で完全結合
        const targetId = d["要請番号"];
        const jian = jianData.find(j => String(j["要請番号"]) === String(targetId));
        if(jian) {
          let tags = [d["キーワード(要請)"], d["活動場面"], d["実務項目"], d["疾患"], d["現場診断"]].map(t => t ? String(t).split(",") : []).flat().map(t => t.trim()).filter(Boolean);
          newData.push({
            id: targetId, date: jian["日付"], dest: jian["出場先"], scheme: jian["スキーム選択"],
            dr: jian["フライトドクター"], ns: jian["フライトナース"], summary: d["概要"] || "", tags: [...new Set(tags)]
          });
        }
      });
      
      const cacheObj = { timestamp: new Date().toLocaleTimeString(), timestampMs: Date.now(), data: newData, masters: jsonInit.masters };
      localStorage.setItem(CACHE_KEY, JSON.stringify(cacheObj));
      
      buildUIFromData(newData, jsonInit.masters);
      document.getElementById("sync-status").innerText = `データ状態: 同期完了 (${cacheObj.timestamp})`;
    } catch (e) { 
      document.getElementById("sync-status").innerText = `通信エラー`;
    } finally { document.getElementById("global-loader").style.display = "none"; }
  }

  function buildUIFromData(data, masters) {
    mergedData = data;
    if(masters) {
      document.getElementById("q-dr").innerHTML = `<option value="">全て</option>` + masters.dr.map(n => `<option value="${n}">${n}</option>`).join("");
      document.getElementById("q-ns").innerHTML = `<option value="">全て</option>` + masters.ns.map(n => `<option value="${n}">${n}</option>`).join("");
    }
    executeSearch();
  }

  function executeSearch() {
    const freeW = document.getElementById("q-free").value.trim().toLowerCase(); 
    const qId = document.getElementById("q-id").value.trim(); 
    const dMonth = document.getElementById("q-month").value;
    const dr = document.getElementById("q-dr").value; 
    const ns = document.getElementById("q-ns").value;

    let results = mergedData.filter(m => {
      if (qId && !String(m.id).includes(qId)) return false;
      if (dMonth && !String(m.date).includes(dMonth)) return false;
      if (dr && m.dr !== dr) return false; 
      if (ns && m.ns !== ns) return false;
      if (freeW && !m.summary.toLowerCase().includes(freeW)) return false;
      return true;
    });
    
    document.getElementById("result-count").innerText = `検索結果: ${results.length}件`;
    document.getElementById("results-area").innerHTML = results.map(r => `
      <div class="result-card">
        <div class="rc-header"><b>No.${r.id}</b> (${r.date}) <span class="badge">${r.scheme || '未選択'}</span></div>
        <div style="font-size:12px; color:var(--sub); margin-bottom:6px;">Dr: ${r.dr || '-'} ｜ Ns: ${r.ns || '-'} ｜ 出場先: ${r.dest || '-'}</div>
        <div class="rc-context">${r.summary.replace(/\n/g, '<br>')}</div>
        <div style="margin-top:6px;">${r.tags.map(t => `<span class="t-chip">#${t}</span>`).join('')}</div>
        <a href="debriefing.html?editId=${r.id}" class="btn-edit-case">✏️ デブリーフィングを編集・追記する</a>
      </div>
    `).join("");
  }
</script>
</body>
</html>
