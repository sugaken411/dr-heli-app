<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AW109 症例登録</title>
  <style>
    :root {
      --bg: #f2f2f7; --brand: #d32f2f; --ink: #1c1c1e; --sub: #8e8e93;
      --blue: #007aff; --line: rgba(60,60,67,0.12); --card: #ffffff;
      --brand-light: #ffebeb; --med-blue: #e3f2fd; --med-blue-text: #1565c0;
      --safe-top: env(safe-area-inset-top); --safe-bot: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
    
    header { position: fixed; top: 0; left: 0; right: 0; height: calc(56px + var(--safe-top)); padding-top: var(--safe-top); padding-left: 16px; padding-right: 16px; background: rgba(242,242,247,0.92); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--line); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(56px + var(--safe-bot)); padding-bottom: var(--safe-bot); background: rgba(255,255,255,0.94); backdrop-filter: blur(20px); border-top: 0.5px solid var(--line); display: flex; z-index: 100; }
    main { margin-top: calc(56px + var(--safe-top)); margin-bottom: calc(60px + var(--safe-bot)); padding: 16px 16px 24px; }
    
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    
    input, select, button, textarea { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
    button { background: var(--blue); color: #fff; border: none; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
    button:hover { opacity: 0.8; }
    .btn-clear { background: none; border: none; color: var(--brand); font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-add-action { background: var(--blue); color: #fff; border: none; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    
    .cross-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .cross-item { display: flex; flex-direction: column; gap: 4px; }
    .cross-item label { font-size: 12px; font-weight: bold; color: var(--sub); }
    .cross-item input, .cross-item select { width: 100%; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 20px; z-index: 9000; }
    .modal.show { display: flex; }
    .modal-box { background: #fff; width: 100%; max-width: 650px; max-height: 85vh; overflow-y: auto; border-radius: 12px; padding: 20px; position: relative; }
    .modal-close { display: block; width: 100%; padding: 12px; margin-top: 16px; background: #e5e5ea; color: var(--ink); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 4px; color: var(--sub); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; }

    .scheme-picker { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; background: var(--bg); padding: 8px; border-radius: 8px; margin-bottom: 12px; }
    .scheme-btn { padding: 10px 4px; border: none; border-radius: 8px; background: #fff; font-size: 12px; font-weight: 700; color: var(--sub); cursor: pointer; border: 1px solid #ccc; transition: 0.2s; }
    .scheme-btn.active { background: var(--card); color: var(--brand); border-color: var(--brand); box-shadow: 0 2px 4px rgba(211,47,47,0.2); }

    .edit-section-title { background: #e3f2fd; color: #0d47a1; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-top: 20px; margin-bottom: 12px; border: 1px solid #bbdefb; }

    .dyn-row-container { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #e5e5ea; }
    .dyn-grid-time { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
    .dyn-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .dyn-grid-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .dyn-row-container input, .dyn-row-container select { font-size: 13px; padding: 8px; width: 100%; }
    .dyn-label { font-size: 10px; font-weight: bold; color: var(--sub); display: block; margin-bottom: 2px; }

    .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .chip { border: 1px solid var(--line); border-radius: 20px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink); background: var(--bg); transition: 0.15s; user-select: none; }
    .chip.on { background: var(--blue); border-color: var(--blue); color: #fff; }

    .proc-line { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
    .proc-line:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .proc-lbl { font-size: 14px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .proc-lbl input[type="checkbox"] { width: 18px; height: 18px; }
    .proc-count { display: none; align-items: center; gap: 6px; }
    .proc-count input { width: 60px; text-align: center; }
    .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .radio-lbl { display: inline-block; padding: 6px 10px; background: #fff; border: 1px solid var(--line); border-radius: 6px; font-size: 12px; font-weight: bold; color: var(--sub); cursor: pointer; transition: 0.2s; user-select: none; }
    input[type="radio"] { display: none; }
    input[type="radio"]:checked + .radio-lbl { background: var(--blue); color: #fff; border-color: var(--blue); }

    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: none; background: none; color: var(--sub); font-size: 11px; font-weight: 700; cursor: pointer; }
    .tab-btn.active { color: var(--brand); }
    .tab-icon { font-size: 22px; line-height: 1; margin-bottom: 2px; }
    .tab-content { display: none; animation: fadeIn 0.2s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-text { font-size: 16px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
    .loader-subtext { font-size: 13px; font-weight: 600; color: var(--sub); text-align: center; max-width: 80%; }
  </style>
</head>
<body>

  <div id="global-loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-main-text">通信中...</div>
    <div class="loader-subtext" id="loader-sub-text">データベースに接続しています</div>
  </div>

  <header>
    <div style="display:flex; gap:12px; align-items:center;">
      <button type="button" class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
    </div>
    <div style="font-weight:900;">AW109 症例登録 <span style="font-size:11px; background:var(--brand); color:#fff; padding:3px 6px; border-radius:4px;">v14.0</span></div>
    <div style="display:flex; gap:12px; align-items:center;">
      <button type="button" class="hdr-btn" onclick="openModal('modal-qa')">❓ Q&A</button>
    </div>
  </header>

  <main>
    <div id="tab-input" class="tab-content active">
      <div class="card">
        <div class="cross-grid">
          <div class="cross-item"><label>要請番号 (未入力で仮ID)</label><input type="tel" id="v-id" placeholder="入力..." oninput="toHalfWidth(this)"></div>
          <div class="cross-item"><label>日付</label><input type="date" id="v-date"></div>
        </div>
        <div style="background:#f9f9f9; padding: 10px; border-radius:8px; display:flex; gap:16px; font-size:13px; font-weight:700; margin-bottom:12px;">
          <label style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="chk-edaban" onchange="toggleBox('box-edaban', this.checked)">枝番あり</label>
          <label style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="chk-er" onchange="toggleBox('box-er', this.checked)">緊急外来搬送</label>
        </div>
        <div id="box-edaban" style="display:none; padding:12px; border-radius:8px; margin-bottom:12px; background:#fffde7;"><div style="display:flex; align-items:center; gap:8px;"><span style="font-size:12px; font-weight:bold; color:#f57f17;">枝番:</span><input type="number" inputmode="numeric" id="v-edaban" placeholder="例: 1" style="width:80px; text-align:center;"></div></div>
        <div id="box-er" style="display:none; padding:12px; border-radius:8px; margin-bottom:12px; background:#ffebee;"><div style="display:flex; align-items:center; gap:8px;"><span style="font-size:12px; font-weight:bold; color:#c62828;">搬入先:</span><input type="text" id="v-er-hosp" list="dl-dest" placeholder="緊急外来の病院名..."></div></div>
        <div class="cross-grid">
          <div class="cross-item"><label>出場先</label><input type="text" id="v-dest" list="dl-dest" placeholder="選択/入力..."><datalist id="dl-dest"></datalist></div>
          <div class="cross-item"><label>フライトDr</label><select id="v-dr"><option value="">選択...</option></select></div>
          <div class="cross-item"><label>フライトNs</label><select id="v-ns"><option value="">選択...</option></select></div>
        </div>
      </div>

      <div class="card">
        <div class="edit-section-title" style="margin-top:0;">📞 要請区分・特殊ケース・診断</div>
        <div class="form-group">
          <label>要請区分 <span style="color:var(--brand); font-size:10px;">(必須)</span></label>
          <div class="scheme-picker" style="grid-template-columns: repeat(2, 1fr);">
            <button type="button" class="scheme-btn" id="req-keyword" onclick="setReqType('KEY WORD')">KEY WORD</button>
            <button type="button" class="scheme-btn" id="req-amb" onclick="setReqType('救急隊現着後')">救急隊現着後</button>
            <button type="button" class="scheme-btn" id="req-dcall" onclick="setReqType('D-call Net')">D-call Net</button>
            <button type="button" class="scheme-btn" id="req-fac" onclick="setReqType('施設間')">施設間</button>
          </div>
        </div>
        <div class="form-group" style="background:#f9f9f9; padding:12px; border-radius:8px; margin-bottom:12px;">
          <label style="margin-bottom:8px;">🚨 特殊ケースフラグ</label>
          <div style="display:flex; gap:16px;">
            <label class="proc-lbl"><input type="checkbox" id="chk-pediatric"> 小児</label>
            <label class="proc-lbl"><input type="checkbox" id="chk-maternal"> 母性</label>
            <label class="proc-lbl"><input type="checkbox" id="chk-mass"> 多数傷病</label>
          </div>
        </div>
        <div class="form-group">
          <label>🚁 最終スキーム選択 <span style="color:var(--brand); font-size:10px;">(必須)</span></label>
          <div class="scheme-picker" style="grid-template-columns: repeat(3, 1fr);">
            <button type="button" class="scheme-btn" id="sch-u" onclick="setScheme('Uターン')">Uターン</button>
            <button type="button" class="scheme-btn" id="sch-j" onclick="setScheme('Jターン')">Jターン</button>
            <button type="button" class="scheme-btn" id="sch-fac" onclick="setScheme('施設間')">施設間</button>
            <button type="button" class="scheme-btn" id="sch-i-ride" onclick="setScheme('Iターン乗込')">Iターン乗込</button>
            <button type="button" class="scheme-btn" id="sch-i-amb" onclick="setScheme('Iターン救急隊')">Iターン救急隊</button>
            <button type="button" class="scheme-btn" id="sch-cancel" onclick="setScheme('キャンセル')">キャンセル</button>
          </div>
          <div id="box-cancel-detail" style="display:none; background:#fff3e0; padding:12px; border-radius:8px; border:1px solid #ffe0b2;">
            <label style="color:#e65100;">※キャンセルの理由を選択</label>
            <div class="radio-group">
              <label><input type="radio" name="cancel-reason" value="上空"> <span class="radio-lbl">上空</span></label>
              <label><input type="radio" name="cancel-reason" value="現場"> <span class="radio-lbl">現場</span></label>
              <label><input type="radio" name="cancel-reason" value="天候不良"> <span class="radio-lbl">天候不良</span></label>
              <label><input type="radio" name="cancel-reason" value="その他"> <span class="radio-lbl">その他</span></label>
            </div>
          </div>
        </div>
        <div class="form-group"><label>現場診断</label><input type="text" id="v-diag" list="dl-diag" placeholder="診断名を選択または入力..."><datalist id="dl-diag"></datalist></div>
        <div class="form-group"><label>📋 事案概要 (覚知内容など・任意)</label><textarea id="v-summary-req" rows="2" placeholder="通報内容や事案の簡単な概要を記入してください..."></textarea></div>
      </div>

      <div class="card" id="card-timeline">
        <div class="edit-section-title" style="margin-top:0;">⏱️ タイムライン</div>
        <div class="cross-grid">
          <div class="cross-item"><label>要請</label><input type="time" id="t-req"></div>
          <div class="cross-item"><label>初期離陸</label><input type="time" id="t-dep1"></div>
          <div class="cross-item"><label>最終着陸</label><input type="time" id="t-arr1"></div>
        </div>
        <div class="cross-grid" id="box-med-time">
          <div class="cross-item"><label>接触</label><input type="time" id="t-contact" onchange="calcMonitor()"></div>
          <div class="cross-item" id="box-hosp-time"><label>病着</label><input type="time" id="t-hosp" onchange="calcMonitor()"></div>
          <div class="cross-item"><label>終了</label><input type="time" id="t-end" onchange="calcMonitor()"></div>
        </div>
      </div>

      <div class="card" id="card-calc">
        <div class="edit-section-title" style="margin-top:0;">💰 算定フラグ</div>
        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;">
          <div class="chip" id="p-oshin" onclick="toggleCalc('oshin')" style="text-align:center;">往診料<br><span id="l-oshin" style="font-size:16px;">—</span></div>
          <div class="chip" id="p-hansou" onclick="toggleCalc('hansou')" style="text-align:center;">搬送料<br><span id="l-hansou" style="font-size:16px;">—</span></div>
          <div class="chip" id="p-long" onclick="toggleCalc('long')" style="text-align:center;">長時間<br><span id="l-long" style="font-size:16px;">—</span></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
          <div class="chip" id="p-monitor" onclick="toggleCalc('monitor')" style="text-align:center;">モニター<br><span id="l-monitor" style="font-size:16px; color:var(--blue);">--:--</span></div>
          <div class="chip" id="p-spo2" onclick="toggleCalc('spo2')" style="text-align:center;">SpO2<br><span id="l-spo2" style="font-size:16px;">—</span></div>
        </div>
      </div>

      <div class="card">
        <div class="edit-section-title" style="margin-top:0;">💉 確保ライン</div>
        <div class="proc-line"><label class="proc-lbl"><input type="checkbox" onchange="toggleProcCount(this)" id="chk-20G">末梢静脈路(20G)</label><div class="proc-count" id="cnt-20G"><input type="number" inputmode="numeric" value="1" min="1" id="val-20G">本</div></div>
        <div class="proc-line"><label class="proc-lbl"><input type="checkbox" onchange="toggleProcCount(this)" id="chk-22G">末梢静脈路(22G)</label><div class="proc-count" id="cnt-22G"><input type="number" inputmode="numeric" value="1" min="1" id="val-22G">本</div></div>
        <div class="proc-line"><label class="proc-lbl"><input type="checkbox" onchange="toggleProcCount(this)" id="chk-24G">末梢静脈路(24G)</label><div class="proc-count" id="cnt-24G"><input type="number" inputmode="numeric" value="1" min="1" id="val-24G">本</div></div>
        <div class="proc-line"><label class="proc-lbl"><input type="checkbox" onchange="toggleProcCount(this)" id="chk-18G">末梢静脈路(18G)</label><div class="proc-count" id="cnt-18G"><input type="number" inputmode="numeric" value="1" min="1" id="val-18G">本</div></div>
        <div class="proc-line"><label class="proc-lbl"><input type="checkbox" onchange="toggleProcCount(this)" id="chk-ez">骨髄路(EZ-IO等)</label><div class="proc-count" id="cnt-ez"><input type="number" inputmode="numeric" value="1" min="1" id="val-ez">本</div></div>
        <div class="proc-line"><label class="proc-lbl"><input type="checkbox" onchange="toggleProcCount(this)" id="chk-big">骨髄路(BIG等)</label><div class="proc-count" id="cnt-big"><input type="number" inputmode="numeric" value="1" min="1" id="val-big">本</div></div>
        <div class="proc-line" style="flex-direction:column; align-items:flex-start;">
          <div style="display:flex; justify-content:space-between; width:100%;">
            <label class="proc-lbl"><input type="checkbox" onchange="toggleBox('box-venu-det', this.checked); toggleBox('cnt-venu', this.checked)" id="chk-venu">ベニューラ</label>
            <div class="proc-count" id="cnt-venu" style="display:none;"><input type="number" inputmode="numeric" value="1" min="1" id="val-venu">本</div>
          </div>
          <div id="box-venu-det" style="display:none; margin-top:8px; width:100%;">
            <div class="radio-group" style="padding-left: 28px;">
              <label><input type="radio" name="venu-type" value="V1"> <span class="radio-lbl" style="padding:4px 8px; font-size:11px;">V1</span></label>
              <label><input type="radio" name="venu-type" value="V2"> <span class="radio-lbl" style="padding:4px 8px; font-size:11px;">V2</span></label>
              <label><input type="radio" name="venu-type" value="V3"> <span class="radio-lbl" style="padding:4px 8px; font-size:11px;">V3</span></label>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="edit-section-title" style="margin-top:0;">👑 エコー検査</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; padding-bottom:8px;">
          <label class="proc-lbl"><input type="checkbox" class="chk-echo" value="FAST">FAST</label>
          <label class="proc-lbl"><input type="checkbox" class="chk-echo" value="心エコー">心エコー</label>
          <label class="proc-lbl"><input type="checkbox" class="chk-echo" value="大血管評価">大血管</label>
          <label class="proc-lbl"><input type="checkbox" class="chk-echo" value="消化器系エコー">消化器系</label>
          <label class="proc-lbl"><input type="checkbox" class="chk-echo" value="婦人女性生殖器系エコー">女性生殖器系</label>
          <label class="proc-lbl"><input type="checkbox" class="chk-echo" value="泌尿器系エコー">泌尿器系</label>
          <label class="proc-lbl"><input type="checkbox" class="chk-echo" value="下肢静脈エコー">下肢静脈</label>
          <div style="grid-column: span 2; border: 1px solid #eee; padding:8px; border-radius:6px; background:#f9f9f9; margin-top:4px;">
            <label class="proc-lbl"><input type="checkbox" id="chk-echo-carotid" onchange="toggleBox('box-echo-carotid', this.checked)">頸動脈エコー</label>
            <div id="box-echo-carotid" style="display:none; margin-top:8px; padding-left:28px;">
               <div class="radio-group">
                 <label><input type="radio" name="carotid-pulse" value="パルスあり"> <span class="radio-lbl" style="padding:4px 8px; font-size:11px;">パルスあり</span></label>
                 <label><input type="radio" name="carotid-pulse" value="パルスなし"> <span class="radio-lbl" style="padding:4px 8px; font-size:11px;">パルスなし</span></label>
               </div>
            </div>
          </div>
          <div style="grid-column: span 2;"><input type="text" id="v-echo-other" placeholder="その他エコー (フリーテキスト)" style="width:100%;"></div>
        </div>
      </div>

      <div class="card">
        <div class="edit-section-title" style="margin-top:0;">🩺 処置・高度医療</div>
        <div style="display:flex; flex-direction:column; gap:8px;">
          <div style="border: 1px solid var(--blue); border-radius: 8px; padding: 12px; background: #f0f8ff;">
            <label class="proc-lbl" style="color:#0d47a1;"><input type="checkbox" id="chk-bg" onchange="toggleBox('box-bg-det', this.checked)">血液ガス分析</label>
            <div id="box-bg-det" style="display:none; margin-top:8px; padding-top:8px; border-top:1px dashed #90caf9;">
              <div class="radio-group">
                <label><input type="radio" name="bg-type" value="静脈血採血" checked onchange="toggleBox('box-bg-art', false)"> <span class="radio-lbl">静脈血</span></label>
                <label><input type="radio" name="bg-type" value="動脈血採血" onchange="toggleBox('box-bg-art', true)"> <span class="radio-lbl">動脈血</span></label>
              </div>

  <div class="modal" id="modal-qa" onclick="if(event.target===this)closeModal('modal-qa')">

      <h3 style="margin-top:0;">❓ Q&A ＆ 要望BOX</h3>

      <div style="background:var(--bg); padding:12px; border-radius:8px;">
        <div style="font-size:13px; font-weight:bold; margin-bottom:8px;">💡 システム改善の要望を送る</div>
        <input type="text" id="qa-name" placeholder="お名前 (任意)" style="width:100%; border:1px solid #ccc; border-radius:6px; padding:8px; margin-bottom:8px;">
        <input type="email" id="qa-email" placeholder="返信先メールアドレス (任意)" style="width:100%; border:1px solid #ccc; border-radius:6px; padding:8px; margin-bottom:8px;">
        <textarea id="qa-input" rows="3" placeholder="項目の追加依頼や不具合報告など..." style="width:100%; border:1px solid #ccc; border-radius:6px; padding:8px; margin-bottom:8px;"></textarea>
        <button type="button" onclick="submitQA(event)" style="width:100%; padding:10px; border-radius:6px;">送信する ✉️</button>
      </div>
      <button type="button" class="modal-close" onclick="closeModal('modal-qa')">閉じる</button>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  const PIN_CODE = "5740";

  window.onerror = function(message, source, lineno, colno, error) {
    const errDetail = `Type: GlobalError\nMsg: ${message}\nLine: ${lineno}:${colno}\nStack: ${error ? error.stack : 'N/A'}`;
    sendErrorLog(errDetail); 
    return false;
  };
  window.addEventListener('unhandledrejection', function(event) {
    const reason = event.reason ? (event.reason.stack || event.reason) : 'N/A';
    if(!String(reason).includes("Load failed")) sendErrorLog(`Type: PromiseRejection\nReason: ${reason}`);
  });

  let state = { reqType: "", scheme: "", calc: { oshin: 0, hansou: 0, long: 0, monitor: 0, spo2: 0, etco2: 0, resp: 0 }, calcVals: { oshin: ["","往診料"], hansou: ["","搬送料","搬送料(新生児)"], long: ["","あり"], monitor:["","自動計算"], spo2:["","あり"], etco2:["","あり"], resp:["","あり"] } };
  const CACHE_KEY = "aw109_master_cache_v14";
  const CACHE_EXPIRE_MS = 6 * 60 * 60 * 1000;

  window.onload = () => {
    const now = new Date(); const jst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
    document.getElementById("v-date").value = `${jst.getFullYear()}-${String(jst.getMonth()+1).padStart(2,'0')}-${String(jst.getDate()).padStart(2,'0')}`;
    const cachedStr = localStorage.getItem(CACHE_KEY);
    if (cachedStr) {
      try {
        const cacheObj = JSON.parse(cachedStr);
        if (Date.now() - cacheObj.timestampMs < CACHE_EXPIRE_MS) { applyMasters(cacheObj.masters); return; }
      } catch(e) {}
    }
    fetchLatestData(false, false);
  };

  function applyMasters(m) {
    const pop = (id, arr) => { const el = document.getElementById(id); if (el) { el.innerHTML = ""; arr.forEach(a => { const opt = document.createElement("option"); opt.value = a; opt.innerText = a; el.appendChild(opt); }); } };
    pop("v-dr", ["", ...m.dr]); pop("v-ns", ["", ...m.ns]); pop("dl-dest", m.dest); pop("dl-diag", m.diagnosis); pop("dl-key", m.keyword);
    const lastDr = localStorage.getItem("aw109_last_dr"); const lastNs = localStorage.getItem("aw109_last_ns");
    if(lastDr) document.getElementById("v-dr").value = lastDr; if(lastNs) document.getElementById("v-ns").value = lastNs;
    const mbox = document.getElementById("mail-options-box"); 
    if (mbox) { mbox.innerHTML = ""; m.mailOptions.forEach(opt => { mbox.innerHTML += `<label style="display:block; font-size:13px; color:var(--ink); font-weight:600;"><input type="checkbox" class="mail-opt-chk" value="${opt.email}" style="margin-right:8px;">${opt.name}</label>`; }); }
  }

  async function fetchLatestData(isBackground, isManualUpdate) {
    if(!isBackground) showLoader("マスタデータ同期中...", "システムを初期化しています");
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_init", password: PIN_CODE, app_name: "現場" }), redirect: "follow" });
      const json = await res.json();
      if (json.status === "success") {
        const m = json.masters; const now = Date.now();
        localStorage.setItem(CACHE_KEY, JSON.stringify({ timestampMs: now, masters: m }));
        applyMasters(m);
        if(isManualUpdate) alert("最新のマスタデータを取得しました。");
      }
    } catch(e) { sendErrorLog(e.toString()); if(!isBackground) alert("通信エラーが発生しました。"); } finally { if(!isBackground) hideLoader(); }
  }

  function saveLastStaff(type, val) { localStorage.setItem(`aw109_last_${type}`, val); }

  let loaderTimer1, loaderTimer2;
  function showLoader(m1, m2) {
    const loader = document.getElementById("global-loader");
    if(loader) {
      document.getElementById("loader-main-text").innerText = m1; document.getElementById("loader-sub-text").innerText = m2; loader.style.display = "flex";
      loaderTimer1 = setTimeout(() => { document.getElementById("loader-sub-text").innerText = "電波が弱い可能性があります。そのままお待ちください..."; }, 5000);
      loaderTimer2 = setTimeout(() => { document.getElementById("loader-sub-text").innerHTML = "<span style='color:var(--brand);'>通信タイムアウト<br>フリーズしている場合はリロードしてください。</span>"; }, 15000);
    }
  }
  function hideLoader() { clearTimeout(loaderTimer1); clearTimeout(loaderTimer2); const loader = document.getElementById("global-loader"); if(loader) loader.style.display = "none"; }
  function openModal(id) { document.getElementById(id).classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }

  function sendErrorLog(errMsg) {
    if(String(errMsg).includes("Load failed")) return;
    try { fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "error_log", source: "症例登録(v14.0)", errorMsg: errMsg, userAgent: navigator.userAgent }), redirect: "follow" }); } catch(e) {}
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active'); document.getElementById(`tb-${tab}`).classList.add('active'); window.scrollTo(0, 0);
  }

  function toggleBox(id, isShow) { document.getElementById(id).style.display = isShow ? "block" : "none"; }
  function toHalfWidth(ele) { let val = ele.value; val = val.replace(/[０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); }); ele.value = val; }
  function toggleProcCount(cb) { const cntBox = cb.parentElement.nextElementSibling; cntBox.style.display = cb.checked ? "flex" : "none"; }

  function handleLifeSupport() {
    const isIntub = document.getElementById("chk-intub").checked; const isNppv = document.getElementById("chk-nppv").checked; const isShock = document.getElementById("chk-shock").checked;
    document.getElementById("chk-ls-vent").checked = (isIntub || isNppv); document.getElementById("chk-etco2").checked = isIntub;
    if(isIntub||isNppv) setCalc('resp', 1); else setCalc('resp', 0); if(isIntub) setCalc('etco2', 1); else setCalc('etco2', 0);
  }

  function setReqType(val) {
    state.reqType = val; document.querySelectorAll('[id^="req-"]').forEach(el => el.classList.remove('active'));
    const idMap = { 'KEY WORD': 'req-keyword', '救急隊現着後': 'req-amb', 'D-call Net': 'req-dcall', '施設間': 'req-fac' }; document.getElementById(idMap[val]).classList.add('active');
    if(val === '施設間') setScheme('施設間');
  }

  function setScheme(val) {
    state.scheme = val; document.querySelectorAll('[id^="sch-"]').forEach(el => el.classList.remove('active'));
    const idMap = { 'Uターン': 'sch-u', 'Jターン': 'sch-j', '施設間': 'sch-fac', 'Iターン乗込': 'sch-i-ride', 'Iターン救急隊': 'sch-i-amb', 'キャンセル': 'sch-cancel' };
    if(idMap[val]) document.getElementById(idMap[val]).classList.add('active');
    const isCan = (val === 'キャンセル'); document.getElementById('box-cancel-detail').style.display = isCan ? "block" : "none";
    document.getElementById('card-timeline').style.display = isCan ? "none" : "block"; document.getElementById('card-calc').style.display = isCan ? "none" : "block";
    const isIamb = (val === 'Iターン救急隊'); const tHosp = document.getElementById("t-hosp"); const boxHosp = document.getElementById("box-hosp-time");
    if(isCan || isIamb) { tHosp.value = ""; tHosp.disabled = true; boxHosp.style.opacity = "0.3"; } else { tHosp.disabled = false; boxHosp.style.opacity = "1"; }
    if(val === 'Uターン' || val === 'Jターン' || val === '施設間') { setCalc('oshin', 1); setCalc('hansou', 1); } else if(val === 'Iターン乗込' || val === 'Iターン救急隊') { setCalc('oshin', 1); setCalc('hansou', 0); } else if(isCan) { setCalc('oshin', 0); setCalc('hansou', 0); setCalc('long', 0); setCalc('etco2', 0); setCalc('resp', 0); }
  }

  function setCalc(key, idx) {
    if(!document.getElementById(`p-${key}`)) return;
    state.calc[key] = idx; const val = state.calcVals[key][idx]; const el = document.getElementById(`p-${key}`); const lbl = document.getElementById(`l-${key}`);
    if(val === "") { el.classList.remove("on"); lbl.innerText = "—"; } else { el.classList.add("on"); lbl.innerText = val; }
  }
  
  function toggleCalc(key, forceIdx = -1) { if(key === 'monitor') return; let n = forceIdx !== -1 ? forceIdx : state.calc[key] + 1; if(n >= state.calcVals[key].length) n = 0; setCalc(key, n); }
  function clearTime(type) { if(type === 'avi') { document.getElementById("t-req").value=""; document.getElementById("t-dep1").value=""; document.getElementById("t-arr1").value=""; } if(type === 'med') { document.getElementById("t-contact").value=""; document.getElementById("t-hosp").value=""; document.getElementById("t-end").value=""; document.getElementById("l-monitor").innerText="--:--"; } }

  function calcMonitor() {
    const c = document.getElementById("t-contact").value; let e = document.getElementById("t-hosp").value || document.getElementById("t-end").value;
    if (c && e) {
      let dc = new Date(`1970-01-01T${c}:00`); let de = new Date(`1970-01-01T${e}:00`);
      if (de < dc) de.setDate(de.getDate() + 1);
      let diffMin = Math.floor((de - dc) / 60000);
      if (diffMin > 0) {
        let h = Math.floor(diffMin / 60); let m = diffMin % 60;
        document.getElementById("l-monitor").innerText = (h > 0 ? h + "時間" : "") + m + "分";
        document.getElementById("p-monitor").classList.add("on"); state.calc.monitor = 1; setCalc('spo2', 1);
        if (diffMin >= 30) setCalc('long', 1); else setCalc('long', 0);
      }
    }
  }

  function addDyn(type) {
    const box = document.getElementById(`dyn-${type}`); const id = Date.now();
    let defStart = document.getElementById("t-contact").value || "";
    const prevRows = box.querySelectorAll('.dyn-row-container');
    if(prevRows.length > 0) { const lastEnd = prevRows[prevRows.length-1].querySelector('.v-end').value; if(lastEnd) defStart = lastEnd; }

    let html = `<div class="dyn-row-container" id="dyn-${id}">
                 <div class="dyn-grid-time">
                   <div><span class="dyn-label">開始</span><input type="time" class="v-start" value="${defStart}" onchange="if('${type}'==='cpr')calcCPR()"></div>
                   <div style="color:var(--sub); font-weight:bold; text-align:center;">〜</div>
                   <div><span class="dyn-label">終了</span><input type="time" class="v-end" onchange="if('${type}'==='cpr')calcCPR()"></div>
                 </div>`;
             
    if(type === 'o2') {
      html += `<div class="dyn-grid-2col"><div><span class="dyn-label">流量(L/min)</span><input type="number" inputmode="decimal" class="v-val"></div><div><span class="dyn-label">O2(%)</span><input type="number" inputmode="numeric" class="v-val2" value="100"></div></div>
               <div><span class="dyn-label">デバイス</span><select class="v-type"><option value="経鼻">経鼻</option><option value="マスク">マスク</option><option value="リザーバー">リザーバー</option><option value="BVM">BVM</option><option value="その他">その他</option></select></div>`;
    } else if(type === 'vent') {
      html += `<div class="dyn-grid-2col"><div><span class="dyn-label">FiO2(%)</span><input type="number" inputmode="numeric" class="v-val" value="100"></div><div><span class="dyn-label">流量/設定</span><input type="number" inputmode="decimal" class="v-val2"></div></div>
               <div class="dyn-grid-3col"><div><span class="dyn-label">モード</span><input type="text" class="v-type"></div><div><span class="dyn-label">設定RR</span><input type="number" inputmode="numeric" class="v-val3"></div><div><span class="dyn-label">設定Vt</span><input type="number" inputmode="numeric" class="v-val4"></div></div>
               <div><span class="dyn-label">実測値メモ(Ppeak等)</span><input type="text" class="v-val5"></div>`;
    }
    html += `<div style="text-align:right; margin-top:8px;"><button type="button" class="btn-clear" style="color:var(--brand); border-color:var(--brand); font-size:12px; padding:4px 10px;" onclick="document.getElementById('dyn-${id}').remove(); if('${type}'==='cpr')calcCPR();">削除</button></div></div>`;
    box.insertAdjacentHTML('beforeend', html);
  }
  function clearDyn(id) { document.getElementById(id).innerHTML = ""; }
  
  function calcCPR() {
    let total = 0;
    document.querySelectorAll('#dyn-cpr .dyn-row-container').forEach(r => {
      const s = r.querySelector('.v-start').value; const e = r.querySelector('.v-end').value;
      if(s && e) { let d1 = new Date(`1970-01-01T${s}`); let d2 = new Date(`1970-01-01T${e}`); if(d2 < d1) d2.setDate(d2.getDate()+1); total += Math.floor((d2 - d1)/60000); }
    });
    document.getElementById('lbl-cpr-total').innerText = total;
  }

  async function submitQA(event) {
    const qName = document.getElementById("qa-name").value.trim(); const qEmail = document.getElementById("qa-email").value.trim(); const qText = document.getElementById("qa-input").value.trim(); 
    if(!qText) return alert("質問内容を入力してください。");
    const finalQuestion = `【送信者】${qName || "未入力"}\n【連絡先】${qEmail || "未入力"}\n\n${qText}`;
    showLoader("送信中...", "");
    try {
      await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "submit_question", password: PIN_CODE, question: finalQuestion, source: "現場アプリ" }), redirect: "follow" });
      alert("要望・報告を送信しました。"); document.getElementById("qa-input").value = ""; closeModal('modal-qa');
    } catch(e) { sendErrorLog(e.toString()); alert("送信に失敗しました。"); } finally { hideLoader(); }
  }

  function getCollectData() {
    let rawId = document.getElementById("v-id").value.trim();
    if (!rawId) { const d = new Date(); const jst = new Date(d.getTime() + (d.getTimezoneOffset() + 540) * 60000); rawId = "仮" + String(jst.getMonth()+1).padStart(2,'0') + String(jst.getDate()).padStart(2,'0') + String(jst.getHours()).padStart(2,'0') + String(jst.getMinutes()).padStart(2,'0'); }
    let finalId = rawId; if(document.getElementById("chk-edaban").checked && document.getElementById("v-edaban").value) finalId = `${rawId}-0${document.getElementById("v-edaban").value}`;
    let finalScheme = state.scheme || ""; if(finalScheme === 'キャンセル') { const reason = document.querySelector('input[name="cancel-reason"]:checked')?.value || "未選択"; finalScheme = `キャンセル(${reason})`; }

    let payload = {
      "要請番号": finalId, "日付": document.getElementById("v-date").value, "出場先": document.getElementById("v-dest").value,
      "フライトドクター": document.getElementById("v-dr").value, "フライトナース": document.getElementById("v-ns").value, "スキーム選択": finalScheme,
      "要請区分": state.reqType, "小児フラグ": document.getElementById("chk-pediatric").checked ? "◯" : "", "母性フラグ": document.getElementById("chk-maternal").checked ? "◯" : "", "多数傷病フラグ": document.getElementById("chk-mass").checked ? "◯" : "",
      "要請時刻・施設間搬送依頼時刻": document.getElementById("t-req").value, "初期離陸時間": document.getElementById("t-dep1").value, "最終着陸時間": document.getElementById("t-arr1").value,
      "接触": document.getElementById("t-contact").value, "病着": document.getElementById("t-hosp").value, "終了": document.getElementById("t-end").value,
      "往診料": state.calcVals.oshin[state.calc.oshin] || "", "搬送料": state.calcVals.hansou[state.calc.hansou] || "", "長時間加算": state.calcVals.long[state.calc.long] || "",
      "モニター算定時間": state.calc.monitor > 0 ? document.getElementById("l-monitor").innerText : "", "経皮的酸素飽和度": state.calcVals.spo2[state.calc.spo2] || "",
      "EtCO2算定": document.getElementById("chk-etco2").checked ? "あり" : "", "人工呼吸器管理料": document.getElementById("chk-ls-vent").checked ? "あり" : "", 
      "現場診断": document.getElementById("v-diag").value, "事案概要": document.getElementById("v-summary-req").value.trim()
    };

    const lineKeys = [{ id: "20G", name: "20G" }, { id: "22G", name: "22G" }, { id: "24G", name: "24G" }, { id: "18G", name: "18G" }, { id: "ez", name: "骨髄針" }, { id: "big", name: "BIG等" }];
    lineKeys.forEach(obj => { if(document.getElementById(`chk-${obj.id}`).checked) payload[obj.name] = "◯ " + (document.getElementById(`val-${obj.id}`).value || "1") + "本"; });

    if(document.getElementById("chk-venu").checked) { const vType = document.querySelector('input[name="venu-type"]:checked')?.value || ""; payload["ベニューラ"] = "◯ " + (vType ? vType + " " : "") + (document.getElementById("val-venu").value || "1") + "本"; }
    
    if(document.getElementById("chk-bg")?.checked) { const bgType = document.querySelector('input[name="bg-type"]:checked')?.value; payload["血ガス"] = bgType === "動脈血採血" ? "動脈血採血" : "静脈血採血"; }
    if(document.getElementById("chk-intub")?.checked) payload["気管挿管"] = `◯ (ID${document.getElementById("intub-size").value}mm, ${document.getElementById("intub-pos").value}cm, ${document.getElementById("intub-cuff").checked ? "カフ吸引あり" : "なし"})`;
    if(document.getElementById("chk-nppv")?.checked) payload["NPPV"] = `◯ (${document.getElementById("nppv-mask").value})`;
    if(document.getElementById("chk-shock")?.checked) payload["除細動パッド"] = document.getElementById("chk-shock-pad").checked ? "◯" : "";
    if(document.getElementById("chk-pacing")?.checked) payload["経皮ペーシング"] = "◯";
    if(document.getElementById("chk-thorax")?.checked) { const t20 = document.getElementById("thorax-20").value; const t28 = document.getElementById("thorax-28").value; payload["胸腔ドレナージ"] = `◯ (20Fr:${t20}, 28Fr:${t28})`; }
    if(document.getElementById("chk-pericardial")?.checked) payload["心嚢穿刺・心嚢ドレナージ"] = document.querySelector('input[name="pericardial-type"]:checked')?.value;
    if(document.getElementById("chk-stomach")?.checked) payload["胃管挿入"] = `◯ (${document.getElementById("stomach-size").value}Fr)`;

    Array.from(document.querySelectorAll('.chk-echo:checked')).forEach(cb => payload[cb.value] = "◯");
    if(document.getElementById("chk-echo-carotid")?.checked) payload["頸動脈エコー"] = document.querySelector('input[name="carotid-pulse"]:checked')?.value || "◯";
    if(document.getElementById("v-echo-other")?.value) payload["その他エコー"] = document.getElementById("v-echo-other").value;
    Array.from(document.querySelectorAll('.chk-other:checked')).forEach(cb => payload[cb.value] = "◯");

    let dynText = "";
    ["酸素", "呼吸器", "圧迫"].forEach(type => {
      let idx = 1;
      document.querySelectorAll(`#dyn-${type} .dyn-row-container`).forEach(row => {
        if(idx <= 5) {
          payload[`${type}${idx}開始`] = row.querySelector('.v-start').value; payload[`${type}${idx}終了`] = row.querySelector('.v-end').value;
          if(type === '酸素' || type === '呼吸器') { payload[`${type}${idx}FiO2`] = row.querySelector('.v-val2').value; payload[`${type}${idx}流量`] = row.querySelector('.v-val').value; }
          idx++;
        }
      });
    });
    
    let biko = document.getElementById("v-biko").value || "";
    if(document.getElementById("chk-er").checked) biko = `【緊急外来搬送先: ${document.getElementById("v-er-hosp").value}】\n` + biko;
    payload["備考"] = biko.trim();
    payload["追加送信先"] = document.getElementById("custom-email").value;
    return payload;
  }

  function buildPreview() {
    try {
      document.getElementById("preview-error").style.display = "none"; const d = getCollectData();
      let html = `<b>要請No:</b> ${d["要請番号"]||"未入力"}<br><b>日付:</b> ${d["日付"]}<br><b>出場先:</b> ${d["出場先"]||"未入力"}<br><b>Dr/Ns:</b> ${d["フライトドクター"]||"-"} / ${d["フライトナース"]||"-"}<br><b>区分:</b> ${d["要請区分"]||"未選択"} <b>スキーム:</b> ${d["スキーム選択"]||"未選択"}<br><br>`;
      html += `<b>✈️ 航空:</b> 要請[${d["要請時刻・施設間搬送依頼時刻"]||"-"}] 離陸[${d["初期離陸時間"]||"-"}] 着陸[${d["最終着陸時間"]||"-"}]<br>`;
      const isNoHosp = (d["スキーム選択"] === 'Iターン救急隊' || (d["スキーム選択"] && d["スキーム選択"].includes('キャンセル')));
      html += `<b>🏥 医療:</b> 接触[${d["接触"]||"-"}] 病着[${isNoHosp ? '対象外' : (d["病着"]||"-")}] 終了[${d["終了"]||"-"}]<br><br>`;
      html += `<b>💰 算定:</b> 往診[${d["往診料"]||"-"}] 搬送料[${d["搬送料"]||"-"}] 長時間[${d["長時間加算"]||"-"}]<br>`;
      html += `<b>🩺 診断:</b> ${d["現場診断"]||"-"}<br><b>📋 概要:</b> ${d["事案概要"]||"-"}<br>`;
      document.getElementById("preview-box").innerHTML = html;
    } catch(e) { document.getElementById("preview-error").style.display = "block"; document.getElementById("preview-error").innerText = "プレビュー生成失敗。"; sendErrorLog("buildPreview error: " + e.message); }
  }

  async function submitData() {
    if (!state.scheme) return alert("最終スキーム選択は必須入力項目です。");
    const btn = document.getElementById("btn-submit"); btn.disabled = true; btn.innerText = "送信中... 🚁";
    showLoader("症例データ送信中...", "事案データベースへレコードを登録しています");
    try {
      const payload = getCollectData();
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "submit", password: PIN_CODE, data: payload }), redirect: "follow" });
      const json = await res.json();
      if (json.status === "success") { alert("事案の新規登録が正常に完了しました。"); location.reload(); } else { throw new Error(json.message || "サーバー側で登録が拒否されました"); }
    } catch(e) { sendErrorLog(`Submit Data Error: ${e.message}`); alert(`送信エラーが発生しました。\n[エラー詳細]: ${e.message}`); } finally { btn.disabled = false; btn.innerText = "🚀 この内容で送信する"; hideLoader(); }
  }
</script>
