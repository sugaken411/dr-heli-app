<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AW109 EMS Record</title>
  <style>
    :root {
      --ink: #1c1c1e; --sub: #8e8e93; --bg: #f4f5f7; --card: #ffffff;
      --brand: #d32f2f; --brand-light: #ffebeb; --blue: #007aff; --line: rgba(0,0,0,0.08);
      --radius-lg: 16px; --radius-md: 10px; --safe-bot: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--ink); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* App Shell */
    header { height: 56px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); font-weight: 700; color: var(--ink); z-index: 10; }
    main { flex: 1; overflow-y: auto; padding: 16px 16px 40px; }
    .card { background: var(--card); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .card-title { font-size: 14px; font-weight: 700; color: var(--brand); margin-bottom: 12px; border-bottom: 1px solid var(--brand-light); padding-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }

    /* Input Fields */
    .input-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .input-row:last-child { border-bottom: none; }
    .input-label { font-size: 15px; font-weight: 600; }
    select, input[type="number"], input[type="date"] { text-align: right; font-size: 16px; border: none; background: transparent; color: var(--blue); outline: none; flex: 1; margin-left: 10px; }
    
    /* Scheme Buttons */
    .scheme-grid { display: grid; gap: 8px; margin-top: 8px; }
    .scheme-row-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .scheme-row-bot { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 0 10%; }
    .btn-scheme { padding: 12px 4px; border-radius: var(--radius-md); border: 1px solid var(--line); background: var(--bg); font-size: 13px; font-weight: 600; color: var(--sub); transition: 0.2s; }
    .btn-scheme.on { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* Timeline */
    .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
    .time-box { background: var(--bg); border-radius: var(--radius-md); padding: 14px 8px; text-align: center; font-size: 20px; font-weight: 700; color: var(--sub); cursor: pointer; }
    .time-box.set { background: #e3f2fd; color: var(--blue); border: 1px solid #90caf9; }
    .time-label { font-size: 11px; text-align: center; color: var(--sub); font-weight: 600; margin-bottom: 4px; }
    
    /* Accordion & Chips */
    .acc-header { padding: 14px; background: var(--bg); border-radius: var(--radius-md); font-weight: 600; font-size: 15px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; }
    .acc-body { display: none; padding: 10px; background: #fff; border: 1px dashed #ccc; border-radius: var(--radius-md); margin-bottom: 12px; }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 10px 14px; border-radius: 20px; border: 1px solid var(--line); background: var(--bg); font-size: 13px; font-weight: 600; color: var(--sub); cursor: pointer; }
    .chip.on { background: var(--brand-light); border-color: var(--brand); color: var(--brand); }

    /* Buttons */
    .btn-clear { background: #f2f2f7; color: var(--red); border: none; font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
    .btn-submit { width: 100%; background: var(--brand); color: #fff; font-size: 18px; font-weight: 700; padding: 18px; border-radius: var(--radius-md); border: none; margin-top: 20px; }
    
    /* Tab Bar */
    .tab-bar { height: calc(56px + var(--safe-bot)); padding-bottom: var(--safe-bot); background: #fff; border-top: 1px solid var(--line); display: flex; z-index: 10; }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--sub); font-weight: 600; background: none; border: none; }
    .tab-btn.on { color: var(--brand); }
    .tab-content { display: none; }
    .tab-content.on { display: block; }

    /* Dial Picker Overlay */
    .dial-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: flex-end; z-index: 10000; }
    .dial-box { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding-bottom: var(--safe-bot); }
    .dial-header { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--line); font-weight: 600; }
    .dial-wheels { display: flex; justify-content: center; height: 200px; overflow: hidden; position: relative; }
    .dial-wheel { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; text-align: center; scrollbar-width: none; }
    .dial-wheel::-webkit-scrollbar { display: none; }
    .dial-opt { height: 40px; line-height: 40px; font-size: 20px; color: var(--sub); scroll-snap-align: center; }
    .dial-sel { position: absolute; top: 50%; left: 10%; right: 10%; height: 40px; margin-top: -20px; background: rgba(0,0,0,0.05); border-radius: 8px; pointer-events: none; }
  </style>
</head>
<body>

<header id="hTitle">要請・処置入力</header>

<main id="mainScroll">
  <div id="tab-1" class="tab-content on">
    
    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="input-row">
        <span class="input-label">要請番号</span>
        <input type="number" id="v-id" inputmode="numeric" placeholder="例: 19771">
      </div>
      <div class="input-row" style="justify-content: flex-start; gap:10px;">
        <label style="font-size:14px; font-weight:bold; display:flex; align-items:center; gap:4px;">
          <input type="checkbox" id="chk-edaban" onchange="toggleEdaban()"> 枝番あり
        </label>
        <input type="number" id="v-edaban" inputmode="numeric" placeholder="枝番" style="display:none; width:80px; text-align:left; background:#f0f0f0; padding:4px 8px; border-radius:4px;">
      </div>
      <div class="input-row"><span class="input-label">日付</span><input type="date" id="v-date"></div>
      <div class="input-row"><span class="input-label">出場先</span><select id="v-dest"></select></div>
      <div class="input-row"><span class="input-label">ドクター</span><select id="v-dr"></select></div>
      <div class="input-row"><span class="input-label">ナース</span><select id="v-ns"></select></div>
    </div>

    <div class="card">
      <div class="card-title">スキーム</div>
      <div class="scheme-grid" id="scheme-box">
        <div class="scheme-row-top">
          <button class="btn-scheme" onclick="setScheme('Uターン')">Uターン</button>
          <button class="btn-scheme" onclick="setScheme('Jターン')">Jターン</button>
          <button class="btn-scheme" onclick="setScheme('施設間')">施設間</button>
        </div>
        <div class="scheme-row-bot">
          <button class="btn-scheme" onclick="setScheme('Iターン乗り込み')">Iターン乗り込み</button>
          <button class="btn-scheme" onclick="setScheme('Iターン救急隊のみ')">Iターン救急隊のみ</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">メインタイムライン <button class="btn-clear" onclick="clearTimeline()">クリア</button></div>
      <div class="time-grid">
        <div><div class="time-label">接触</div><div class="time-box" id="t-接触" onclick="openDial('time', '接触')">--:--</div></div>
        <div><div class="time-label">病着</div><div class="time-box" id="t-病着" onclick="openDial('time', '病着')">--:--</div></div>
        <div><div class="time-label">終了</div><div class="time-box" id="t-終了" onclick="openDial('time', '終了')">--:--</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">処置・資機材入力</div>
      
      <div class="acc-header" onclick="toggleAcc('acc-echo')">📡 エコー <span>▼</span></div>
      <div class="acc-body" id="acc-echo">
        <div class="chip-wrap" id="box-echo"></div>
      </div>

      <div class="acc-header" onclick="toggleAcc('acc-other')">🩺 その他処置 <span>▼</span></div>
      <div class="acc-body" id="acc-other">
        <div class="chip-wrap" id="box-other"></div>
      </div>

      <div class="acc-header" onclick="toggleAcc('acc-line')">💉 確保ライン <span>▼</span></div>
      <div class="acc-body" id="acc-line">
        <div class="chip-wrap" id="box-line"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">移動用酸素 <button class="btn-clear" onclick="addDyn('酸素')">＋追加</button></div>
      <div id="dyn-酸素"></div>
    </div>
    <div class="card">
      <div class="card-title">胸骨圧迫 <button class="btn-clear" onclick="addDyn('圧迫')">＋追加</button></div>
      <div id="dyn-圧迫"></div>
    </div>
    <div class="card">
      <div class="card-title">人工呼吸器 <button class="btn-clear" onclick="addDyn('呼吸器')">＋追加</button></div>
      <div id="dyn-呼吸器"></div>
    </div>
  </div>

  <div id="tab-2" class="tab-content">
    <div class="card">
      <div class="card-title">送信プレビュー</div>
      <div id="preview-box" style="font-size:13px; line-height:1.6; white-space:pre-wrap; background:#f9f9f9; padding:10px; border-radius:8px;"></div>
      <button class="btn-submit" onclick="submitData()">メール共有 ＆ データベース送信 ✉️</button>
    </div>
  </div>

  <div id="tab-3" class="tab-content">
    <div class="card">
      <div class="card-title">事案検索コックピット</div>
      <p style="font-size:12px; color:var(--sub);">※ 事案の検索と同期はここで行います。</p>
      <button class="btn-clear" style="width:100%; padding:12px; font-size:14px; margin-top:10px;">データベースと同期 (未実装)</button>
    </div>
  </div>

</main>

<nav class="tab-bar">
  <button class="tab-btn on" id="tb-1" onclick="switchTab(1, '要請・処置入力')"><span style="font-size:20px;margin-bottom:2px;">📝</span>入力</button>
  <button class="tab-btn" id="tb-2" onclick="switchTab(2, '送信プレビュー'); renderPreview();"><span style="font-size:20px;margin-bottom:2px;">✉️</span>送信</button>
  <button class="tab-btn" id="tb-3" onclick="switchTab(3, '事案検索')"><span style="font-size:20px;margin-bottom:2px;">🔍</span>検索</button>
</nav>

<div class="dial-overlay" id="dialView" onclick="if(event.target===this)closeDial(false)">
  <div class="dial-box">
    <div class="dial-header"><span style="color:var(--sub);" onclick="closeDial(false)">キャンセル</span><span id="dialTitle">選択</span><span style="color:var(--brand);" onclick="closeDial(true)">完了</span></div>
    <div class="dial-wheels" id="dialWheels"></div>
  </div>
</div>

<script>
  // -- マスタ --
  const MASTERS = {
    dest: ["鹿児島市","姶良市","阿久根市","霧島市","(他略)"],
    dr: ["吉原","野口","山根木","平田","(他略)"],
    ns: ["伊東","梅下","壽賀野","柳田","(他略)"]
  };
  const CHIPS = {
    echo: ["心エコー","FAST","大血管評価","頸動脈パルス","胸部エコー"],
    other: ["12誘導心電図","血糖測定","気管挿管","EtCO2","人工呼吸器管理料"],
    line: ["20G","18G","22G","24G","ベニューラ","骨髄針"]
  };

  const st = { scheme: "", times: {}, vals: {}, chips: {}, dyn: { 酸素:0, 圧迫:0, 呼吸器:0 } };

  window.onload = () => {
    const d = new Date(); document.getElementById("v-date").value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    fillSel("v-dest", MASTERS.dest); fillSel("v-dr", MASTERS.dr); fillSel("v-ns", MASTERS.ns);
    buildChips(CHIPS.echo, "box-echo"); buildChips(CHIPS.other, "box-other"); buildChips(CHIPS.line, "box-line");
    addDyn('酸素'); addDyn('圧迫'); addDyn('呼吸器');
  };

  function fillSel(id, arr) { document.getElementById(id).innerHTML = `<option value="">選択...</option>` + arr.map(v=>`<option>${v}</option>`).join(""); }
  
  function switchTab(idx, title) {
    [1,2,3].forEach(i=>{ document.getElementById('tab-'+i).classList.toggle('on', i===idx); document.getElementById('tb-'+i).classList.toggle('on', i===idx); });
    document.getElementById("hTitle").textContent = title;
  }

  function toggleEdaban() {
    const chk = document.getElementById("chk-edaban").checked;
    document.getElementById("v-edaban").style.display = chk ? "block" : "none";
  }

  function toggleAcc(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
  }

  function buildChips(arr, boxId) {
    document.getElementById(boxId).innerHTML = arr.map(k=> `<div class="chip" id="c-${k}" onclick="tChip('${k}')">${k}</div>`).join("");
  }
  function tChip(k) {
    st.chips[k] = !st.chips[k];
    document.getElementById(`c-${k}`).classList.toggle('on', st.chips[k]);
  }

  function setScheme(s) {
    st.scheme = s;
    document.querySelectorAll(".btn-scheme").forEach(b => b.classList.toggle('on', b.textContent === s));
  }

  function clearTimeline() {
    ["接触","病着","終了"].forEach(k => {
      st.times[k] = "";
      document.getElementById(`t-${k}`).textContent = "--:--";
      document.getElementById(`t-${k}`).classList.remove("set");
    });
  }

  function addDyn(type) {
    if(st.dyn[type] >= 5) return;
    st.dyn[type]++; const i = st.dyn[type];
    let h = `<div style="border-bottom:1px dashed #ccc; padding-bottom:10px; margin-bottom:10px;"><div class="time-grid">`;
    h += `<div><div class="time-label">${type}${i}開始</div><div class="time-box" id="t-【${type}${i}】開始" onclick="openDial('time', '【${type}${i}】開始')">--:--</div></div>`;
    h += `<div><div class="time-label">${type}${i}終了</div><div class="time-box" id="t-【${type}${i}】終了" onclick="openDial('time', '【${type}${i}】終了')">--:--</div></div>`;
    
    if(type==="酸素" || type==="呼吸器") {
      h += `<div><div class="time-label">流量(L)</div><div class="time-box" style="font-size:16px; padding:16px 4px;" id="v-${type}${i}流量" onclick="openDial('flow', '${type}${i}流量')">選択</div>`;
      h += `<div class="time-label" style="margin-top:6px;">FiO2(%)</div><div class="time-box" style="font-size:16px; padding:8px 4px;" id="v-${type}${i}FiO2" onclick="openDial('fio2', '${type}${i}FiO2')">21%</div></div>`;
      st.vals[`${type}${i}FiO2`] = "21"; // default
    }
    h += `</div></div>`;
    document.getElementById(`dyn-${type}`).insertAdjacentHTML('beforeend', h);
  }

  // ── 多目的ドラムロールピッカー ──
  let dialMode = "", dialKey = "";
  function openDial(mode, key) {
    dialMode = mode; dialKey = key;
    document.getElementById("dialTitle").textContent = key.replace(/[【】]/g,'');
    const wh = document.getElementById("dialWheels");
    
    const mk = (n, start=0, sfx="") => `<div class="dial-sel"></div><div class="dial-wheel" id="dW1" onscroll="hls('dW1')"><div style="height:80px"></div>` + Array.from({length:n},(_,i)=>`<div class="dial-opt">${String(i+start).padStart(mode==='time'?2:1,'0')}${sfx}</div>`).join("") + `<div style="height:80px"></div></div>`;
    
    if(mode === 'time') {
      wh.innerHTML = mk(24) + `<div style="line-height:200px;font-weight:bold;font-size:24px;">:</div>` + mk(60).replace('dW1','dW2').replace('dW1','dW2');
      let v = st.times[key]; if(!v) { const d=new Date(); v=`${d.getHours()}:${d.getMinutes()}`; }
      document.getElementById("dW1").scrollTop = parseInt(v.split(":")[0])*40;
      document.getElementById("dW2").scrollTop = parseInt(v.split(":")[1])*40;
    } 
    else if(mode === 'flow') {
      wh.innerHTML = mk(20, 1, " L"); // 1〜20L
      document.getElementById("dW1").scrollTop = (parseInt(st.vals[key]||1)-1)*40;
    }
    else if(mode === 'fio2') {
      wh.innerHTML = mk(80, 21, "%"); // 21〜100%
      document.getElementById("dW1").scrollTop = (parseInt(st.vals[key]||21)-21)*40;
    }
    
    document.getElementById("dialView").style.display="flex"; 
    hls('dW1'); if(mode==='time') hls('dW2');
  }

  function hls(id) {
    const w = document.getElementById(id); if(!w) return;
    const idx = Math.round(w.scrollTop/40);
    w.querySelectorAll('.dial-opt').forEach((el,i)=>{ el.style.fontWeight=i===idx?"800":"400"; el.style.color=i===idx?"var(--ink)":"var(--sub)"; });
  }

  function closeDial(ok) {
    if(ok) {
      if(dialMode === 'time') {
        const h = String(Math.round(document.getElementById("dW1").scrollTop/40)).padStart(2,'0');
        const m = String(Math.round(document.getElementById("dW2").scrollTop/40)).padStart(2,'0');
        st.times[dialKey] = `${h}:${m}`;
        document.getElementById(`t-${dialKey}`).textContent = `${h}:${m}`;
        document.getElementById(`t-${dialKey}`).classList.add("set");
      } else {
        const v = Math.round(document.getElementById("dW1").scrollTop/40) + (dialMode==='flow'?1:21);
        st.vals[dialKey] = v;
        document.getElementById(`v-${dialKey}`).textContent = v + (dialMode==='flow'?"L":"%");
        document.getElementById(`v-${dialKey}`).classList.add("set");
      }
    }
    document.getElementById("dialView").style.display="none";
  }

  function renderPreview() {
    const id = document.getElementById("v-id").value;
    const eda = document.getElementById("chk-edaban").checked ? "-" + document.getElementById("v-edaban").value : "";
    let s = `要請番号: ${id}${eda}\nスキーム: ${st.scheme}\n接触: ${st.times['接触']||'--'}\n病着: ${st.times['病着']||'--'}\n終了: ${st.times['終了']||'--'}\n`;
    document.getElementById("preview-box").textContent = s;
  }

  function submitData() { alert("【テスト送信】\nGAS側コードの更新が必要です。"); }
</script>
</body>
</html>
