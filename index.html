<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AW109 EMS Record</title>
  <style>
    /* ── AW109 Sleek White & Red Theme ── */
    :root {
      --ink: #1c1c1e; --sub: #8e8e93; --bg: #f4f5f7; --card: #ffffff;
      --brand: #d32f2f; /* EMS Red */ --brand-light: #ffebeb;
      --blue: #007aff; --green: #34c759; --line: rgba(0,0,0,0.08);
      --radius-lg: 16px; --radius-md: 10px;
      --safe-bot: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--ink); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* ロック画面 (AW109 Silhouette) */
    #lockView { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s; }
    .aw109-logo { font-size: 24px; font-weight: 800; color: var(--brand); letter-spacing: 2px; margin-bottom: 40px; }
    .pin-dots { display: flex; gap: 16px; margin-bottom: 30px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--sub); transition: 0.2s; }
    .pin-dot.filled { background: var(--brand); border-color: var(--brand); }
    .numpad { display: grid; grid-template-columns: repeat(3, 72px); gap: 15px; }
    .numpad-btn { width: 72px; height: 72px; border-radius: 50%; border: none; background: #f0f0f0; font-size: 24px; font-weight: 500; cursor: pointer; color: var(--ink); }
    .numpad-btn:active { background: #e0e0e0; transform: scale(0.95); }

    /* App Shell */
    header { height: 56px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); font-weight: 700; color: var(--ink); }
    main { flex: 1; overflow-y: auto; padding: 16px 16px 40px; }
    
    .card { background: var(--card); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .card-title { font-size: 13px; font-weight: 700; color: var(--brand); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--brand-light); padding-bottom: 6px; }

    /* Input Fields */
    .input-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .input-row:last-child { border-bottom: none; }
    .input-label { font-size: 16px; font-weight: 500; }
    select, input[type="text"], input[type="number"], input[type="date"] { text-align: right; font-size: 16px; border: none; background: transparent; color: var(--blue); outline: none; width: 60%; }
    
    /* Scheme Buttons (Top 3, Bottom 2) */
    .scheme-grid { display: grid; gap: 8px; margin-top: 8px; }
    .scheme-row-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .scheme-row-bot { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 0 10%; }
    .btn-scheme { padding: 12px 4px; border-radius: var(--radius-md); border: 1px solid var(--line); background: var(--bg); font-size: 13px; font-weight: 600; color: var(--sub); transition: 0.2s; }
    .btn-scheme.on { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 4px 10px rgba(211,47,47,0.3); }

    /* Chips & Accordion */
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 10px 14px; border-radius: 20px; border: 1px solid var(--line); background: var(--bg); font-size: 14px; font-weight: 600; color: var(--sub); cursor: pointer; transition: 0.2s; }
    .chip.on { background: var(--brand-light); border-color: var(--brand); color: var(--brand); }
    
    .sub-panel { background: #fafafa; border-radius: var(--radius-md); padding: 12px; margin-top: 8px; border: 1px dashed #ccc; display: none; width: 100%; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(-5px);} to{opacity:1; transform:translateY(0);} }
    .radio-group { display: flex; gap: 10px; }
    .radio-btn { flex: 1; text-align: center; padding: 8px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 13px; font-weight: 600; color: var(--sub); }
    .radio-btn.on { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* Timeline & Dynamics */
    .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
    .time-box { background: var(--bg); border-radius: var(--radius-md); padding: 14px 8px; text-align: center; font-size: 20px; font-weight: 700; color: var(--sub); cursor: pointer; }
    .time-box.set { background: #e3f2fd; color: var(--blue); border: 1px solid #90caf9; }
    .time-label { font-size: 11px; text-align: center; color: var(--sub); font-weight: 600; margin-bottom: 4px; }
    .dyn-row { border-bottom: 1px dashed var(--line); padding-bottom: 12px; margin-bottom: 12px; }

    /* Submit & Badges */
    .btn-submit { width: 100%; background: var(--brand); color: #fff; font-size: 18px; font-weight: 700; padding: 18px; border-radius: var(--radius-md); border: none; box-shadow: 0 4px 12px rgba(211,47,47,0.3); margin-top: 20px; }
    .btn-submit:active { transform: scale(0.98); }
    
    .sync-badge { background: #ffcc00; color: #000; padding: 8px; text-align: center; font-size: 12px; font-weight: bold; display: none; }

    /* Tab Bar */
    .tab-bar { height: calc(56px + var(--safe-bot)); padding-bottom: var(--safe-bot); background: #fff; border-top: 1px solid var(--line); display: flex; }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--sub); font-weight: 600; background: none; border: none; }
    .tab-btn.on { color: var(--brand); }
    .tab-content { display: none; }
    .tab-content.on { display: block; }

    /* Dial Picker */
    .dial-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: flex-end; z-index: 10000; }
    .dial-box { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding-bottom: var(--safe-bot); }
    .dial-header { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--line); font-weight: 600; }
    .dial-wheels { display: flex; justify-content: center; height: 200px; overflow: hidden; position: relative; }
    .dial-wheel { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; text-align: center; scrollbar-width: none; }
    .dial-wheel::-webkit-scrollbar { display: none; }
    .dial-opt { height: 40px; line-height: 40px; font-size: 20px; color: var(--sub); scroll-snap-align: center; }
    .dial-sel { position: absolute; top: 50%; left: 10%; right: 10%; height: 40px; margin-top: -20px; background: rgba(0,0,0,0.05); border-radius: 8px; pointer-events: none; }
  </style>
</head>
<body>

    <button class="numpad-btn" onclick="pin(7)">7</button><button class="numpad-btn" onclick="pin(8)">8</button><button class="numpad-btn" onclick="pin(9)">9</button>
