<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AW109 事案検索コンソール</title>
  <style>
    :root { --bg:#f2f2f7; --card:#ffffff; --ink:#1c1c1e; --sub:#8e8e93; --blue:#007aff; --brand:#d32f2f; --line: rgba(60,60,67,0.12); }
    body { font-family:-apple-system,sans-serif; background:var(--bg); color:var(--ink); margin:0; padding:0; height:100vh; display:flex; flex-direction:column; }
    header { background:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ccc; flex-shrink:0; }
    .hdr-btn { background:none; border:none; color:var(--blue); font-weight:bold; cursor:pointer; font-size:14px; }
    .timer-badge { background:#e5e5ea; padding:4px 10px; border-radius:12px; font-family:monospace; font-weight:bold; font-size:14px; color:var(--ink); }
    main { padding:20px; flex:1; overflow-y:auto; }
    .card { background:#fff; border-radius:12px; padding:20px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    input, select, button { padding:10px; border-radius:6px; border:1px solid #ccc; font-size:14px; box-sizing:border-box; }
    button { background:var(--blue); color:#fff; border:none; cursor:pointer; font-weight:bold; transition:opacity 0.2s; } button:hover { opacity:0.8; }
    .filter-btn { background:#e5e5ea; color:var(--ink); margin-right:8px; margin-bottom:8px; }
    .res-item { background:#fff; border:1px solid #ccc; border-radius:8px; padding:16px; margin-bottom:12px; cursor:pointer; transition:border-color 0.2s; } .res-item:hover { border-color:var(--blue); }
    .badge { padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; padding:20px; z-index:9000; } .modal.show { display:flex; }
    .modal-box { background:#fff; width:100%; max-width:600px; max-height:85vh; overflow-y:auto; border-radius:12px; padding:20px; position:relative; }
    .modal-close { display:block; width:100%; padding:12px; margin-top:16px; background:#e5e5ea; color:var(--ink); border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
    .form-group { margin-bottom:12px; } .form-group label { display:block; font-weight:bold; font-size:12px; margin-bottom:4px; color:var(--sub); } .form-group input, .form-group textarea, .form-group select { width:100%; }
    #login-overlay { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
    #global-loader { position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:9998; display:flex; flex-direction:column; align-items:center; justify-content:center; display:none; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @media print { body * { visibility: hidden; } .modal-box, .modal-box * { visibility: visible; } .modal-box { position: absolute; left: 0; top: 0; width: 100%; max-height:none; overflow:visible; box-shadow:none; } .no-print { display: none !important; } }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="card" style="width:100%; max-width:320px; text-align:center;">
      <h2 style="margin-top:0; color:var(--ink);">事案検索コンソール</h2>
      <p style="color:var(--sub); font-size:14px; margin-bottom:20px;">アクセスコードを入力</p>
      <input type="password" inputmode="numeric" pattern="[0-9]*" id="login-pin" style="width:100%; margin-bottom:20px; text-align:center; font-size:24px; letter-spacing:8px;" placeholder="****">
      <button onclick="checkLogin()" style="width:100%; padding:14px; font-size:16px;">ログイン 🔓</button>
      <p id="login-err" style="color:var(--brand); font-size:12px; margin-top:12px; display:none;">パスワードが違います</p>
    </div>
  </div>

  <div id="global-loader"><div class="spinner"></div><div style="margin-top:16px; font-weight:bold; color:var(--ink);">システム準備中...</div></div>

  <header>
    <div style="display:flex; gap:12px; align-items:center;">
      <button class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
      <button class="hdr-btn" onclick="openModal('modal-manual')">📖 取説</button>
      <button class="hdr-btn" onclick="openModal('modal-qa')">❓ Q&A送信</button>
    </div>
    <div style="font-weight:900;">検索コンソール <span style="font-size:11px; background:var(--blue); color:#fff; padding:3px 6px; border-radius:4px;">v9.1</span></div>
    <div style="display:flex; gap:12px; align-items:center;">
      <span class="timer-badge" id="lock-timer" title="オートロックまで">10:00</span>
      <button class="hdr-btn" onclick="location.reload()" style="color:var(--brand);">🔒 ロック</button>
    </div>
  </header>

  <main>
    <div class="card no-print">
      <h3 style="margin-top:0;">🔍 事案の検索</h3>
      <div style="margin-bottom:16px;">
        <button class="filter-btn" onclick="quickFilter('未完了')">⚠️ 未完了のみ</button>
        <button class="filter-btn" onclick="quickFilter('本日')">🚁 今日の出動</button>
        <button class="filter-btn" onclick="quickFilter('')">🔄 全てクリア</button>
      </div>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:12px; margin-bottom:16px;">
        <div><label style="font-size:12px; color:var(--sub); font-weight:bold;">要請番号</label><input type="text" id="q-id" placeholder="IDを入力" style="width:100%;"></div>
        <div><label style="font-size:12px; color:var(--sub); font-weight:bold;">ステータス</label>
          <select id="q-status" style="width:100%;">
            <option value="">全て</option>
            <option value="未完了">⚠️ 未完了</option>
            <option value="すべての完了">✅ 完了 (すべて)</option>
            <option value="完了 (本人)">👤 完了 (本人入力)</option>
            <option value="完了 (代行)">💻 完了 (代行入力)</option>
          </select>
        </div>
        <div><label style="font-size:12px; color:var(--sub); font-weight:bold;">出場先</label><select id="q-dest" style="width:100%;"><option value="">読込中...</option></select></div>
        <div><label style="font-size:12px; color:var(--sub); font-weight:bold;">フライトDr</label><select id="q-dr" style="width:100%;"><option value="">読込中...</option></select></div>
        <div><label style="font-size:12px; color:var(--sub); font-weight:bold;">フライトNs</label><select id="q-ns" style="width:100%;"><option value="">読込中...</option></select></div>
      </div>
      <div style="display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;">
        <div style="flex:1; min-width:250px;"><label style="font-size:12px; color:var(--sub); font-weight:bold;">期間</label><div style="display:flex; align-items:center; gap:8px;"><input type="date" id="q-date-start" style="flex:1;"> <span style="color:var(--sub);">〜</span> <input type="date" id="q-date-end" style="flex:1;"></div></div>
        <button onclick="fetchData()" style="padding:12px 24px; min-width:120px;">検索実行 🔍</button>
      </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;" class="no-print">
      <div id="result-count" style="font-weight:bold; color:var(--ink);">検索結果: 0 件</div>
      <button onclick="exportCSV()" style="background:#34a853;">📊 CSV出力</button>
    </div>
    <div id="results" class="no-print"><p style="text-align:center; color:var(--sub); padding:40px; background:#fff; border-radius:12px;">条件を指定して「検索実行」を押してください。</p></div>
  </main>

  <div class="modal" id="detail-modal" onclick="if(event.target===this)closeModal('detail-modal')">
    <div class="modal-box">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ccc; padding-bottom:12px; margin-bottom:16px;">
        <h3 style="margin:0;">事案詳細・修正</h3>
        <button class="no-print" onclick="window.print()" style="background:#e5e5ea; color:var(--ink); padding:8px 16px;">🖨️ 印刷</button>
      </div>
      <div style="background:#e3f2fd; padding:12px; border-radius:8px; margin-bottom:16px; font-size:14px; border:1px solid #bbdefb;"><b style="color:#0d47a1;">📦 消費資機材</b><div id="supply-list" style="margin-top:6px; color:#1565c0; line-height:1.5;"></div></div>
      <input type="hidden" id="edit-old-id">
      
      <div style="display:flex; gap:12px;"><div class="form-group" style="flex:1;"><label>要請番号</label><input type="text" id="edit-id"></div><div class="form-group" style="flex:1;"><label>日付</label><input type="date" id="edit-date"></div></div>
      <div style="display:flex; gap:12px;"><div class="form-group" style="flex:1;"><label>出場先</label><select id="edit-dest"></select></div><div class="form-group" style="flex:1;"><label>スキーム</label><select id="edit-scheme"><option value="Uターン">Uターン</option><option value="Jターン">Jターン</option><option value="施設間">施設間</option><option value="Iターン乗り込み">Iターン乗り込み</option><option value="Iターン救急隊のみ">Iターン救急隊のみ</option></select></div></div>
      <div style="display:flex; gap:12px;"><div class="form-group" style="flex:1;"><label>Dr</label><select id="edit-dr"></select></div><div class="form-group" style="flex:1;"><label>Ns</label><select id="edit-ns"></select></div></div>
      <div style="display:flex; gap:12px;"><div class="form-group" style="flex:1;"><label>接触時間</label><input type="time" id="edit-contact"></div><div class="form-group" style="flex:1;"><label>病着時間</label><input type="time" id="edit-arrival"></div><div class="form-group" style="flex:1;"><label>終了時間</label><input type="time" id="edit-end"></div></div>
      <div class="form-group" style="margin-top:12px;"><label>更新履歴</label><textarea id="edit-history" rows="4" readonly style="width:100%; background:var(--bg); border:none; padding:8px; border-radius:6px; color
