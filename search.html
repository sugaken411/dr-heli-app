<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AW109 事案検索コンソール</title>
  <style>
    :root {
      --bg: #f2f2f7; --brand: #d32f2f; --ink: #1c1c1e; --sub: #8e8e93;
      --blue: #007aff; --line: rgba(60,60,67,0.12); --card: #ffffff;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
    
    header { background: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
    .hdr-btn { background: none; border: none; color: var(--blue); font-weight: bold; cursor: pointer; font-size: 14px; padding: 4px 8px; }
    .timer-badge { background: #e5e5ea; padding: 4px 10px; border-radius: 12px; font-family: monospace; font-weight: bold; font-size: 14px; color: var(--ink); }
    
    main { padding: 16px; flex: 1; overflow-y: auto; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    
    input, select, button, textarea { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
    button { background: var(--blue); color: #fff; border: none; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
    button:hover { opacity: 0.8; }
    .filter-btn { background: #e5e5ea; color: var(--ink); margin-right: 8px; margin-bottom: 8px; }
    
    .res-item { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.2s; }
    .res-item:hover { border-color: var(--blue); }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    
    .cross-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .cross-item { display: flex; flex-direction: column; gap: 4px; }
    .cross-item label { font-size: 12px; font-weight: bold; color: var(--sub); }
    .cross-item input, .cross-item select { width: 100%; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 16px; z-index: 9000; }
    .modal.show { display: flex; }
    .modal-box { background: #fff; width: 100%; max-width: 650px; max-height: 85vh; overflow-y: auto; border-radius: 12px; padding: 20px; position: relative; }
    .modal-close { display: block; width: 100%; padding: 12px; margin-top: 16px; background: #e5e5ea; color: var(--ink); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

    #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-text { font-size: 16px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
    .loader-subtext { font-size: 13px; font-weight: 600; color: var(--sub); text-align: center; max-width: 80%; }
  </style>
</head>
<body>

  <datalist id="q-id-list"></datalist>

  <div id="login-overlay">
    <div class="card" style="width:100%; max-width:320px; text-align:center;">
      <h2 style="margin-top:0; color:var(--ink);">事案検索コンソール</h2>
      <p style="color:var(--sub); font-size:14px; margin-bottom:20px;">アクセスコードを入力</p>
      <input type="password" inputmode="numeric" pattern="[0-9]*" id="login-pin" style="width:100%; margin-bottom:20px; text-align:center; font-size:24px; letter-spacing:8px;" placeholder="****">
      <button type="button" onclick="checkLogin()" style="width:100%; padding:14px; font-size:16px;">ログイン 🔓</button>
      <p id="login-err" style="color:var(--brand); font-size:12px; margin-top:12px; display:none;">パスワードが違います</p>
    </div>
  </div>

  <div id="global-loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-main-text">通信中...</div>
    <div class="loader-subtext" id="loader-sub-text">データベースに接続しています</div>
  </div>

  <header>
    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
      <button type="button" class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
      <button type="button" class="hdr-btn no-print" onclick="fetchLatestData(false, true)">🔄 更新</button>
      <button type="button" class="hdr-btn" onclick="openModal('modal-qa')">❓ Q&A</button>
    </div>
    <div style="font-weight:900;">検索コンソール <span style="font-size:11px; background:var(--blue); color:#fff; padding:3px 6px; border-radius:4px;">v14.2</span></div>
    <div style="display:flex; gap:12px; align-items:center;">
      <span class="timer-badge" id="lock-timer" title="オートロックまで">10:00</span>
      <button type="button" class="hdr-btn" onclick="location.reload()" style="color:var(--brand);">🔒 ロック</button>
    </div>
  </header>
  <div id="master-sync-info" style="text-align:right; font-size:10px; color:var(--sub); padding:4px 16px 0 0; background:var(--bg);"></div>

  <main>
    <div class="card no-print">
      <h3 style="margin-top:0;">🔍 事案の検索</h3>
      <div style="margin-bottom:16px;">
        <button type="button" class="filter-btn" onclick="quickFilter('未完了')">⚠️ 未完了のみ</button>
        <button type="button" class="filter-btn" onclick="quickFilter('本日')">🚁 今日の出動</button>
        <button type="button" class="filter-btn" onclick="quickFilter('')">🔄 全てクリア</button>
      </div>
      <div class="cross-grid">
        <div class="cross-item"><label>要請番号</label><input type="text" id="q-id" list="q-id-list" placeholder="IDを入力・選択"></div>
        <div class="cross-item">
          <label>ステータス</label>
          <select id="q-status">
            <option value="">全件</option><option value="未完了">⚠️ 未完了</option><option value="すべての完了">✅ 完了 (すべて)</option><option value="完了 (本人)">👤 完了 (本人入力)</option><option value="完了 (代行)">💻 完了 (代行入力)</option>
          </select>
        </div>
        <div class="cross-item"><label>出場先</label><select id="q-dest"><option value="">読込中...</option></select></div>
        <div class="cross-item"><label>フライトDr</label><select id="q-dr"><option value="">読込中...</option></select></div>
        <div class="cross-item"><label>フライトNs</label><select id="q-ns"><option value="">読込中...</option></select></div>
      </div>
      <div class="cross-grid" style="align-items:flex-end;">
        <div class="cross-item"><label>月で探す (◯年◯月)</label><input type="month" id="q-month" onchange="clearDateRange()"></div>
        <div class="cross-item" style="grid-column: span 2;">
          <label>期間で探す</label>
          <div style="display:flex; align-items:center; gap:8px;"><input type="date" id="q-date-start" style="flex:1;" onchange="clearMonth()"> <span style="color:var(--sub);">〜</span> <input type="date" id="q-date-end" style="flex:1;" onchange="clearMonth()"></div>
        </div>
        <div class="cross-item"><button type="button" onclick="fetchData()" style="padding:12px; height:100%;">検索実行 🔍</button></div>
      </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;" class="no-print">
      <div id="result-count" style="font-weight:bold; color:var(--ink);">検索結果: 0 件</div>
      <button type="button" onclick="exportCSV()" style="background:#34a853; padding:8px 12px; font-size:13px;">📊 CSV出力</button>
    </div>
    
    <div id="results" class="no-print">
      <p style="text-align:center; color:var(--sub); padding:40px; background:#fff; border-radius:12px;">条件を指定して「検索実行」を押してください。</p>
    </div>
  </main>
  
  <div class="modal" id="modal-qa" onclick="if(event.target===this)closeModal('modal-qa')">
    <div class="modal-box">
      <h3 style="margin-top:0;">❓ Q&A ＆ 要望BOX</h3>
      <div id="qa-list" style="font-size:13px; line-height:1.5; color:var(--sub); margin-bottom:16px; max-height:40vh; overflow-y:auto; border-bottom:1px solid #ccc; padding-bottom:12px;">読込中...</div>
      <div style="background:var(--bg); padding:12px; border-radius:8px;">
        <div style="font-size:13px; font-weight:bold; margin-bottom:8px;">💡 システム改善の要望を送る</div>
        <input type="text" id="qa-name" placeholder="お名前 (任意)" style="width:100%; border:1px solid #ccc; border-radius:6px; padding:8px; margin-bottom:8px;">
        <input type="email" id="qa-email" placeholder="返信先メールアドレス (任意)" style="width:100%; border:1px solid #ccc; border-radius:6px; padding:8px; margin-bottom:8px;">
        <textarea id="qa-input" rows="3" placeholder="項目の追加依頼や不具合報告など..." style="width:100%; border:1px solid #ccc; border-radius:6px; padding:8px; margin-bottom:8px;"></textarea>
        <button type="button" onclick="submitQA(event)" style="width:100%; padding:10px; border-radius:6px;">送信する ✉️</button>
      </div>
      <button type="button" class="modal-close" onclick="closeModal('modal-qa')">閉じる</button>
    </div>
  </div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  const PIN_CODE = "5740";

  window.onerror = function(message, source, lineno, colno, error) {
    const errDetail = `Type: GlobalError\nMsg: ${message}\nLine: ${lineno}:${colno}\nStack: ${error ? error.stack : 'N/A'}`;
    sendErrorLog(errDetail); 
    return false;
  };
  window.addEventListener('unhandledrejection', function(event) {
    const reason = event.reason ? (event.reason.stack || event.reason) : 'N/A';
    if(!String(reason).includes("Load failed")) sendErrorLog(`Type: PromiseRejection\nReason: ${reason}`);
  });

  let activePin = ""; 
  let allData = []; 
  let filteredData = [];
  
  let lockTime = 600; 
  let timerInterval;
  
  let loaderTimer1, loaderTimer2;
  function showLoader(m1="通信中...", m2="データベースに接続しています") {
    const loader = document.getElementById("global-loader");
    if(loader) {
      document.getElementById("loader-main-text").innerText = m1; document.getElementById("loader-sub-text").innerText = m2; loader.style.display = "flex";
      loaderTimer1 = setTimeout(() => { document.getElementById("loader-sub-text").innerText = "電波が弱く同期に時間がかかっています。そのままお待ちください..."; }, 5000);
      loaderTimer2 = setTimeout(() => { document.getElementById("loader-sub-text").innerHTML = "<span style='color:var(--brand);'>通信タイムアウト<br>フリーズしている場合はリロードしてください。</span>"; }, 15000);
    }
  }
  function hideLoader() { clearTimeout(loaderTimer1); clearTimeout(loaderTimer2); const loader = document.getElementById("global-loader"); if (loader) loader.style.display = "none"; }
  function sendErrorLog(errMsg) { 
    if(String(errMsg).includes("Load failed")) return;
    try { fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "error_log", source: "事案検索(v14.2)", errorMsg: errMsg, userAgent: navigator.userAgent }), redirect: "follow" }); } catch(e) {} 
  }

  function resetTimer() { lockTime = 600; updateTimerDisplay(); }
  function updateTimerDisplay() { const m = String(Math.floor(lockTime / 60)).padStart(2, '0'); const s = String(lockTime % 60).padStart(2, '0'); document.getElementById("lock-timer").textContent = `${m}:${s}`; }
  function startTimer() { updateTimerDisplay(); timerInterval = setInterval(() => { lockTime--; updateTimerDisplay(); if(lockTime <= 0) location.reload(); }, 1000); ['mousemove', 'keydown', 'touchstart', 'scroll'].forEach(evt => window.addEventListener(evt, resetTimer)); }
  function toHalfWidth(ele) { let val = ele.value; val = val.replace(/[０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); }); ele.value = val; }

  function checkLogin() {
    const input = document.getElementById("login-pin").value;
    if(input === "5740") {
      activePin = input; document.getElementById("login-overlay").style.display = "none"; startTimer(); initSearchApp(); 
    } else { document.getElementById("login-err").style.display = "block"; document.getElementById("login-pin").value = ""; }
  }

  function openModal(id) { const modal = document.getElementById(id); if (modal) { modal.classList.add('show'); resetTimer(); } }
  function closeModal(id) { const modal = document.getElementById(id); if (modal) { modal.classList.remove('show'); resetTimer(); } }

  function quickFilter(type) {
    ["q-id", "q-date-start", "q-date-end", "q-month", "q-status", "q-dest", "q-dr", "q-ns"].forEach(id => document.getElementById(id).value = "");
    if (type === '未完了') { document.getElementById("q-status").value = "未完了"; } 
    else if (type === '本日') { const d = new Date(); const today = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; document.getElementById("q-date-start").value = today; document.getElementById("q-date-end").value = today; }
    fetchData();
  }
  function clearDateRange() { document.getElementById("q-date-start").value = ""; document.getElementById("q-date-end").value = ""; }
  function clearMonth() { document.getElementById("q-month").value = ""; }

  const CACHE_KEY = "aw109_search_master_v14_2";
  const CACHE_EXPIRE_MS = 6 * 60 * 60 * 1000;

  async function initSearchApp() {
    const cachedStr = localStorage.getItem(CACHE_KEY);
    if(cachedStr) {
      try {
        const cacheObj = JSON.parse(cachedStr);
        if (Date.now() - cacheObj.timestampMs < CACHE_EXPIRE_MS) { 
          applySearchMasters(cacheObj.data); 
          const d = new Date(cacheObj.timestampMs);
          document.getElementById("master-sync-info").innerText = `マスタ最終同期: ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
          return; 
        }
      } catch(e) {}
    }
    await fetchLatestData(false, false);
  }

  function applySearchMasters(jsonRes) {
    if (jsonRes.masters) {
      const pop = (id, arr) => { const el = document.getElementById(id); if (el) { el.innerHTML = ""; arr.forEach(a => { const opt = document.createElement("option"); opt.value = a; opt.innerText = a; el.appendChild(opt); }); } };
      const destOpts = '<option value="">全出場先</option>' + jsonRes.masters.dest.map(v => `<option value="${v}">${v}</option>`).join("");
      document.getElementById("q-dest").innerHTML = destOpts; 
      document.getElementById("q-dr").innerHTML = '<option value="">全Dr</option>' + jsonRes.masters.dr.map(v => `<option value="${v}">${v}</option>`).join("");
      document.getElementById("q-ns").innerHTML = '<option value="">全Ns</option>' + jsonRes.masters.ns.map(v => `<option value="${v}">${v}</option>`).join("");
    }
    if (jsonRes.qa) { document.getElementById("qa-list").innerHTML = jsonRes.qa.filter(q => q.status === "◯").map(item => `<p style="margin-bottom:8px;"><b>Q. ${item.q}</b><br><span style="color:var(--ink);">A. ${item.a}</span></p><hr style="margin:12px 0; border:none; border-top:1px solid #ccc;">`).join("") || '<p>公開Q&Aはありません。</p>'; }
    const urlParams = new URLSearchParams(window.location.search); if (urlParams.get('auto_filter') === 'uncompleted') { document.getElementById('q-status').value = '未完了'; fetchData(); }
  }

  async function fetchLatestData(isBackground, isManualUpdate) {
    if(!isBackground) showLoader("マスタデータ同期中...", "システムを初期化しています");
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_init", password: activePin, app_name: "検索" }), redirect: "follow" });
      const jsonRes = await res.json();
      if (jsonRes.status === "success") {
        const now = Date.now(); localStorage.setItem(CACHE_KEY, JSON.stringify({ timestampMs: now, data: jsonRes })); applySearchMasters(jsonRes);
        const d = new Date(now); document.getElementById("master-sync-info").innerText = `マスタ最終同期: ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        if(isManualUpdate) alert("最新のマスタデータを取得しました。");
      } else { throw new Error(jsonRes.message); }
    } catch(e) { sendErrorLog(e.toString()); if(!isBackground) alert("通信エラーが発生しました。"); } finally { if(!isBackground) hideLoader(); }
  }

  async function fetchData() {
    document.getElementById("results").innerHTML = '<p style="text-align:center; padding:40px;">検索中...🔍</p>';
    showLoader("データ検索中...", "事案データベースに接続しています");
    const qId = document.getElementById("q-id").value.trim(); const dStart = document.getElementById("q-date-start").value; const dEnd = document.getElementById("q-date-end").value; const dMonth = document.getElementById("q-month").value;
    const stVal = document.getElementById("q-status").value; const destVal = document.getElementById("q-dest").value; const drVal = document.getElementById("q-dr").value; const nsVal = document.getElementById("q-ns").value;
    
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_all", password: activePin }), redirect: "follow" });
      const json = await res.json();
      if(json.status === "success") {
        allData = json.data;
        const idListArea = document.getElementById("q-id-list"); if (idListArea) { idListArea.innerHTML = ""; allData.slice(-30).reverse().forEach(r => { if(r["要請番号"]) idListArea.innerHTML += `<option value="${r["要請番号"]}">`; }); }
        filteredData = allData.filter(r => {
          let m = true;
          if (qId && !String(r["要請番号"] || "").includes(qId)) m = false;
          if (destVal && !String(r["出場先"] || "").includes(destVal)) m = false;
          if (drVal && !String(r["フライトドクター"] || "").includes(drVal)) m = false;
          if (nsVal && !String(r["フライトナース"] || "").includes(nsVal)) m = false;
          if (stVal) {
            const rowSt = String(r["ステータス"] || "");
            if (stVal === "未完了" && !rowSt.includes("未完了")) m = false; else if (stVal === "すべての完了" && (!rowSt.includes("完了") || rowSt.includes("未完了"))) m = false; else if (stVal === "完了 (本人)" && !rowSt.includes("本人")) m = false; else if (stVal === "完了 (代行)" && !rowSt.includes("代行")) m = false;
          }
          let rawDate = r["日付"]; let normalizedDate = "";
          if (rawDate) {
            let rawDateStr = String(rawDate).split(" ")[0]; let dateParts = rawDateStr.split(/[\/\-]/);
            if (dateParts.length === 3) { normalizedDate = `${dateParts[0]}-${dateParts[1].padStart(2, '0')}-${dateParts[2].padStart(2, '0')}`; } else { normalizedDate = rawDateStr.replace(/\//g, "-"); }
          }
          if (dMonth) { if (!normalizedDate.startsWith(dMonth)) m = false; } else if (dStart || dEnd) { if (dStart && normalizedDate < dStart) m = false; if (dEnd && normalizedDate > dEnd) m = false; }
          return m;
        });
        
        document.getElementById("result-count").innerText = `検索結果: ${filteredData.length} 件`;
        if (filteredData.length === 0) { document.getElementById("results").innerHTML = '<p style="text-align:center; padding:40px;">データが見つかりません。</p>'; hideLoader(); return; }
        
        document.getElementById("results").innerHTML = filteredData.map(r => {
          const isDone = (r["ステータス"] || "").includes("完了") && !(r["ステータス"] || "").includes("未完了");
          const isKari = String(r["要請番号"] || "").includes("(仮)"); const idColor = isKari ? "color:var(--brand);" : "color:var(--ink);";
          const safeTime = (t) => { if(!t) return "--:--"; let s = String(t); if(s.includes("T")) return s.split("T")[1].substring(0,5); return s.substring(0,5); };
          
          return `
          <div class="res-item" onclick='openDetail(${JSON.stringify(r).replace(/'/g, "&apos;")})'>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <b style="font-size:15px; ${idColor}">No.${r["要請番号"]} <span style="color:var(--sub); font-size:12px; font-weight:normal;">(${r["日付"]||"日付不明"})</span></b>
              <span class="badge" style="background:${isDone?'#d1fae5':'#ffebeb'}; color:${isDone?'#065f46':'#d32f2f'}">${r["ステータス"]||"未完了"}</span>
            </div>
            <div style="font-size:12px; color:var(--ink); margin-bottom:4px; display:flex; justify-content:space-between;">
              <span><b>${r["要請区分"]||"未選択"}</b> (${r["スキーム選択"]||"未選択"})</span>
              <span>[要請 ${safeTime(r["要請時刻・施設間搬送依頼時刻"])}] 出場先: ${r["出場先"]||"-"}</span>
            </div>
            <div style="font-size:12px; color:var(--sub); margin-bottom:4px;"><b>Dr:</b> ${r["フライトドクター"]||"-"} ｜ <b>Ns:</b> ${r["フライトナース"]||"-"}</div>
            <div style="font-size:12px; color:var(--sub);"><b>接触［${safeTime(r["接触"])}］</b> ｜ <b>病着:</b> ${safeTime(r["病着"])} ｜ <b>終了:</b> ${safeTime(r["終了"])}</div>
          </div>`;
        }).join("");
      } else { throw new Error(json.message); }
    } catch(e) { sendErrorLog(e.toString()); document.getElementById("results").innerHTML = `<p style="text-align:center; color:red;">通信エラーが発生しました。</p>`; } finally { hideLoader(); }
  }

  // 🌟 アーキテクチャ改修: 巨大編集モーダルをパージし、入力画面(index.html)へパラメータ付きでルーティング
  function openDetail(row) {
    showLoader("画面遷移中...", "編集画面へ移動しています");
    // 不変のシステム一意ID(sysId)が存在する場合はそれを優先、なければ要請番号でフォールバック
    let targetId = row["要請番号"];
    if(row["システムデータ"]) {
      try { const sData = JSON.parse(row["システムデータ"]); if(sData.sysId) targetId = sData.sysId; } catch(e) {}
    }
    location.href = 'index.html?editId=' + encodeURIComponent(targetId);
  }

  function exportCSV() {
    if(filteredData.length === 0) return alert("データがありません。");
    const headers = Object.keys(filteredData[0]); let csvContent = "\uFEFF" + headers.join(",") + "\n";
    filteredData.forEach(row => { csvContent += headers.map(h => `"${String(row[h] || "").replace(/"/g, '""')}"`).join(",") + "\n"; });
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `AW109_Data_${new Date().getTime()}.csv`; a.click();
  }

  async function submitQA(event) {
    const qName = document.getElementById("qa-name").value.trim(); const qEmail = document.getElementById("qa-email").value.trim(); const qText = document.getElementById("qa-input").value.trim(); 
    if(!qText) return alert("質問内容を入力してください。");
    const finalQuestion = `【送信者】${qName || "未入力"}\n【連絡先】${qEmail || "未入力"}\n\n${qText}`;
    showLoader("送信中...", "");
    try {
      const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "submit_question", password: activePin, question: finalQuestion, source: "検索コンソール" }), redirect: "follow" });
      const jsonRes = await res.json();
      if(jsonRes.status === "success") { alert("送信しました。管理者に通知されました。"); document.getElementById("qa-input").value = ""; closeModal('modal-qa'); } else { throw new Error(jsonRes.message); }
    } catch(e) { sendErrorLog(e.toString()); alert("通信エラーが発生しました。"); } finally { hideLoader(); }
  }
</script>
