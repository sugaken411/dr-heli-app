<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AW109 事案検索コンソール</title>
  <style>
    :root {
      --bg: #f2f2f7; --brand: #d32f2f; --ink: #1c1c1e; --sub: #8e8e93;
      --blue: #007aff; --line: rgba(60,60,67,0.12); --card: #ffffff;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
    header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; flex-shrink: 0; }
    .hdr-btn { background: none; border: none; color: var(--blue); font-weight: bold; cursor: pointer; font-size: 14px; }
    .timer-badge { background: #e5e5ea; padding: 4px 10px; border-radius: 12px; font-family: monospace; font-weight: bold; font-size: 14px; color: var(--ink); }
    main { padding: 20px; flex: 1; overflow-y: auto; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    input, select, button, textarea { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
    button { background: var(--blue); color: #fff; border: none; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
    button:hover { opacity: 0.8; }
    .filter-btn { background: #e5e5ea; color: var(--ink); margin-right: 8px; margin-bottom: 8px; }
    .res-item { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.2s; }
    .res-item:hover { border-color: var(--blue); }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .cross-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .cross-item { display: flex; flex-direction: column; gap: 4px; }
    .cross-item label { font-size: 12px; font-weight: bold; color: var(--sub); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 20px; z-index: 9000; }
    .modal.show { display: flex; }
    .modal-box { background: #fff; width: 100%; max-width: 650px; max-height: 85vh; overflow-y: auto; border-radius: 12px; padding: 20px; position: relative; }
    .modal-close { display: block; width: 100%; padding: 12px; margin-top: 16px; background: #e5e5ea; color: var(--ink); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 4px; color: var(--sub); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; }
    .scheme-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; background: var(--bg); padding: 8px; border-radius: 8px; margin-bottom: 12px; }
    .scheme-btn { background: #fff; color: var(--sub); border: 1px solid #ccc; padding: 8px 4px; font-size: 12px; border-radius: 6px; transition: 0.2s; }
    .scheme-btn.active { background: var(--card); color: var(--brand); border-color: var(--brand); box-shadow: 0 2px 4px rgba(211,47,47,0.2); }
    .edit-section-title { background: #e3f2fd; color: #0d47a1; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-top: 20px; margin-bottom: 12px; border: 1px solid #bbdefb; }
    .dyn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
    .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .chip { border: 1px solid var(--line); border-radius: 20px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink); background: var(--bg); }
    .chip.on { background: var(--blue); border-color: var(--blue); color: #fff; }
    .proc-line { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
    .proc-lbl { font-size: 14px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .proc-count { display: none; align-items: center; gap: 6px; }
    .proc-count input { width: 60px; text-align: center; }
    .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .radio-lbl { display: inline-block; padding: 8px 12px; background: #fff; border: 1px solid var(--line); border-radius: 8px; font-size: 13px; font-weight: bold; color: var(--sub); cursor: pointer; user-select: none; }
    input[type="radio"] { display: none; }
    input[type="radio"]:checked + .radio-lbl { background: var(--blue); color: #fff; border-color: var(--blue); }
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
  </style>
</head>
<body>

  <datalist id="q-id-list"></datalist>

  <div id="login-overlay">
    <div class="card" style="width:100%; max-width:320px; text-align:center;">
      <h2>事案検索コンソール</h2>
      <input type="password" inputmode="numeric" id="login-pin" style="width:100%; margin-bottom:20px; text-align:center; font-size:24px;" placeholder="****">
      <button type="button" onclick="checkLogin()" style="width:100%; padding:14px;">ログイン 🔓</button>
      <p id="login-err" style="color:var(--brand); display:none; margin-top:12px;">コードが違います</p>
    </div>
  </div>

  <div id="global-loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-main-text">通信中...</div>
    <div class="loader-subtext" id="loader-sub-text">データベースに接続しています</div>
  </div>

  <header>
    <div style="display:flex; gap:12px; align-items:center;">
      <button type="button" class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
      <button type="button" class="hdr-btn no-print" onclick="fetchLatestData(false, true)">🔄 更新</button>
    </div>
    <div style="font-weight:900;">検索コンソール <span style="font-size:11px; background:var(--blue); color:#fff; padding:3px 6px; border-radius:4px;">v12.5</span></div>
    <div style="display:flex; gap:12px; align-items:center;">
      <span class="timer-badge" id="lock-timer">10:00</span>
    </div>
  </header>

  <main>
    <div class="card no-print">
      <h3>🔍 事案の検索</h3>
      <div style="margin-bottom:16px;">
        <button type="button" class="filter-btn" onclick="quickFilter('未完了')">⚠️ 未完了のみ</button>
        <button type="button" class="filter-btn" onclick="quickFilter('本日')">🚁 今日の出動</button>
        <button type="button" class="filter-btn" onclick="quickFilter('')">🔄 クリア</button>
      </div>
      <div class="cross-grid">
        <div class="cross-item"><label>要請番号</label><input type="text" id="q-id" list="q-id-list"></div>
        <div class="cross-item">
          <label>ステータス</label>
          <select id="q-status">
            <option value="">全件</option>
            <option value="未完了">⚠️ 未完了</option>
            <option value="すべての完了">✅ 完了</option>
          </select>
        </div>
        <div class="cross-item"><label>出場先</label><select id="q-dest"></select></div>
        <div class="cross-item"><label>フライトDr</label><select id="q-dr"></select></div>
        <div class="cross-item"><label>フライトNs</label><select id="q-ns"></select></div>
      </div>
      <div class="cross-grid" style="align-items:flex-end;">
        <div class="cross-item"><label>月で探す</label><input type="month" id="q-month" onchange="clearDateRange()"></div>
        <div class="cross-item" style="grid-column: span 2;">
          <div style="display:flex; gap:4px;"><input type="date" id="q-date-start" onchange="clearMonth()">〜<input type="date" id="q-date-end" onchange="clearMonth()"></div>
        </div>
        <div class="cross-item"><button type="button" onclick="fetchData()">検索実行 🔍</button></div>
      </div>
    </div>
    <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><div id="result-count" style="font-weight:bold;">検索結果: 0 件</div><button type="button" onclick="exportCSV()" style="background:#34a853;">📊 CSV出力</button></div>
    <div id="results"></div>
  </main>

  <div class="modal" id="detail-modal" onclick="if(event.target===this)closeModal('detail-modal')">
    <div class="modal-box">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ccc; padding-bottom:12px; margin-bottom:16px;">
        <h3 style="margin:0;">事案詳細・修正</h3>
        <button type="button" onclick="closeModal('detail-modal')">✖ 戻る</button>
      </div>
      <input type="hidden" id="edit-old-id">
      <div class="edit-section-title">📅 基本情報</div>
      <div style="display:flex; gap:12px;">
        <div class="form-group"><label>要請番号</label><input type="text" id="edit-id" oninput="toHalfWidth(this)"></div>
        <div class="form-group"><label>日付</label><input type="date" id="edit-date"></div>
      </div>
      <div class="form-group"><label>出場先</label><select id="edit-dest"></select></div>
      <div class="form-group" style="background:#f9f9f9; padding:12px; border-radius:8px;"><label>📋 事案概要 (任意)</label><textarea id="edit-summary-req" rows="2"></textarea></div>

      <div class="edit-section-title" id="edit-scheme-section">📞 スキーム・診断</div>
      <div class="form-group">
        <div class="scheme-picker" id="edit-scheme-picker">
          <button type="button" class="scheme-btn" onclick="setEditScheme(this,'Uターン')">Uターン</button>
          <button type="button" class="scheme-btn" onclick="setEditScheme(this,'Jターン')">Jターン</button>
          <button type="button" class="scheme-btn" onclick="setEditScheme(this,'施設間')">施設間</button>
          <button type="button" class="scheme-btn" onclick="setEditScheme(this,'Iターン乗り込み')">Iターン乗込</button>
          <button type="button" class="scheme-btn" onclick="setEditScheme(this,'Iターン救急隊のみ')">Iターン救急隊</button>
          <button type="button" class="scheme-btn" onclick="setEditScheme(this,'キャンセル')">キャンセル</button>
        </div>
        <input type="hidden" id="edit-scheme">
      </div>
      <div class="form-group" style="background:#f9f9f9; padding:12px;"><label>現場診断</label><div class="chip-grid" id="edit-chip-diagnosis-selected"></div></div>
      
      <div class="edit-section-title">👨‍⚕️ スタッフ & タイム</div>
      <div style="display:flex; gap:12px;"><div class="form-group"><label>フライトDr</label><select id="edit-dr"></select></div><div class="form-group"><label>フライトNs</label><select id="edit-ns"></select></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">
        <input type="time" id="edit-request"><input type="time" id="edit-takeoff"><input type="time" id="edit-landing">
        <input type="time" id="edit-contact"><input type="time" id="edit-arrival"><input type="time" id="edit-end">
      </div>

      <div class="edit-section-title">📦 処置（青枠アコーディオン完全連動）</div>
      <div id="unified-procs-container" style="display:none; background:#f9f9f9; padding:12px; border-radius:8px;">
        <div class="proc-line"><label class="proc-lbl"><input type="checkbox" onchange="toggleBox('cnt-20G', this.checked)" id="chk-20G">末梢静脈路(20G)</label><div class="proc-count" id="cnt-20G"><input type="number" value="1" id="val-20G">本</div></div>
        <div class="proc-line"><label class="proc-lbl"><input type="checkbox" onchange="toggleBox('cnt-22G', this.checked)" id="chk-22G">末梢静脈路(22G)</label><div class="proc-count" id="cnt-22G"><input type="number" value="1" id="val-22G">本</div></div>
        <div style="border:1px solid var(--blue); padding:10px; background:#f0f8ff; margin-bottom:8px;">
          <label class="proc-lbl"><input type="checkbox" id="chk-intub" onchange="toggleBox('box-intub-det', this.checked)">気管挿管</label>
          <div id="box-intub-det" style="display:none; margin-top:6px;"><input type="number" id="intub-size" placeholder="サイズ" style="width:80px;"> mm</div>
        </div>
      </div>
      <div id="legacy-procs-container" style="display:none;"><textarea id="edit-procs-legacy" rows="2"></textarea></div>

      <div class="form-group" style="margin-top:12px;"><label>備考</label><textarea id="edit-biko" rows="3"></textarea></div>
      <div class="form-group"><label>更新履歴</label><textarea id="edit-history" rows="2" readonly style="background:#eee;"></textarea></div>

      <div style="background:#fff9db; padding:12px; border-radius:8px; margin-top:16px;">
        <div id="complete-box">
          <label><input type="radio" name="comp-who" value="本人" checked onchange="toggleComp()"> 本人</label>
          <label><input type="radio" name="comp-who" value="代行" onchange="toggleComp()"> 代行</label>
          <input type="text" id="comp-name" placeholder="代行者名" style="display:none; margin-top:4px;">
          <button type="button" style="background:#34c759; width:100%; margin-top:8px;" onclick="markComplete()">カルテ完了状態にする</button>
        </div>
        <div style="display:flex; gap:8px; margin-top:12px;">
          <button type="button" style="background:var(--brand);" onclick="deleteRecord()">🗑️ 削除</button>
          <button type="button" style="flex:1;" onclick="saveRecord()">💾 上書き保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
    window.onerror = function(m, s, l, c, e) { sendErrorLog(`Err: ${m} Line: ${l}`); return false; };

    function toggleComp() { const isDaiko = document.querySelector('input[name="comp-who"]:checked').value === "代行"; document.getElementById("comp-name").style.display = isDaiko ? "block" : "none"; }
    function toggleEditWho() {}
    function formatKatakana(input) {}
    function toggleBox(id, isShow) { document.getElementById(id).style.display = isShow ? "block" : "none"; }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function clearDateRange() { document.getElementById("q-date-start").value = ""; document.getElementById("q-date-end").value = ""; }
    function clearMonth() { document.getElementById("q-month").value = ""; }

    function quickFilter(type) {
      ["q-id", "q-date-start", "q-date-end", "q-month", "q-status", "q-dest", "q-dr", "q-ns"].forEach(id => document.getElementById(id).value = "");
      if (type === '未完了') document.getElementById("q-status").value = "未完了";
      fetchData();
    }

    function checkLogin() { if(document.getElementById("login-pin").value === "5740") { activePin = "5740"; document.getElementById("login-overlay").style.display = "none"; initSearchApp(); } }

    async function initSearchApp() {
      showLoader();
      try {
        const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_init", password: activePin, app_name: "検索" }) });
        const json = await res.json();
        if(json.status === "success") {
          masters = json.masters;
          const popSelect = (id, arr) => { document.getElementById(id).innerHTML = `<option value="">全て</option>` + arr.map(v => `<option value="${v}">${v}</option>`).join(""); };
          popSelect("q-dest", masters.dest); popSelect("q-dr", masters.dr); popSelect("q-ns", masters.ns);
          document.getElementById("edit-dest").innerHTML = masters.dest.map(v => `<option value="${v}">${v}</option>`).join("");
          document.getElementById("edit-dr").innerHTML = masters.dr.map(v => `<option value="${v}">${v}</option>`).join("");
          document.getElementById("edit-ns").innerHTML = masters.ns.map(v => `<option value="${v}">${v}</option>`).join("");
        }
      } catch(e) {} finally { hideLoader(); }
    }

    async function fetchData() {
      showLoader();
      try {
        const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_all", password: activePin }) });
        const json = await res.json();
        if(json.status === "success") {
          allData = json.data;
          const qId = document.getElementById("q-id").value;
          const filtered = allData.filter(r => !qId || String(r["要請番号"]).includes(qId));
          document.getElementById("result-count").innerText = `検索結果: ${filtered.length} 件`;
          document.getElementById("results").innerHTML = filtered.map(r => `
            <div class="res-item" onclick='openDetail(${JSON.stringify(r)})'>
              <b>No.${r["要請番号"]}</b> (${r["日付"]}) [${r["ステータス"]}]<br>
              <span style="font-size:12px; color:var(--sub);">出場先: ${r["出場先"]} ｜ Dr: ${r["フライトドクター"]}</span>
            </div>`).join("");
        }
      } catch(e) {} finally { hideLoader(); }
    }

    function openDetail(row) {
      document.getElementById("edit-old-id").value = row["要請番号"];
      document.getElementById("edit-id").value = row["要請番号"];
      document.getElementById("edit-date").value = String(row["日付"]).replace(/\//g, "-");
      document.getElementById("edit-dest").value = row["出場先"] || "";
      document.getElementById("edit-dr").value = row["フライトドクター"] || "";
      document.getElementById("edit-ns").value = row["フライトナース"] || "";
      document.getElementById("edit-scheme").value = row["スキーム選択"] || "";

      let bikoStr = row["備考"] || "";
      let summaryReq = "";
      if (bikoStr.includes("【事案概要】")) {
        let match = bikoStr.match(/【事案概要】\n([\s\S]*?)\n\n/);
        if (match) { summaryReq = match[1]; bikoStr = bikoStr.replace(/【事案概要】\n[\s\S]*?\n\n/, ""); }
      }
      document.getElementById("edit-summary-req").value = summaryReq;
      document.getElementById("edit-biko").value = bikoStr;

      document.getElementById("unified-procs-container").style.display = "block";
      openModal("detail-modal");
      toggleComp();
    }

    async function saveRecord() {
      const oldId = document.getElementById("edit-old-id").value;
      let bikoVal = document.getElementById("edit-biko").value;
      let sumVal = document.getElementById("edit-summary-req").value.trim();
      if(sumVal) bikoVal = `【事案概要】\n${sumVal}\n\n` + bikoVal;

      let payload = {
        "要請番号": document.getElementById("edit-id").value,
        "日付": document.getElementById("edit-date").value,
        "出場先": document.getElementById("edit-dest").value,
        "フライトドクター": document.getElementById("edit-dr").value,
        "フライトナース": document.getElementById("edit-ns").value,
        "スキーム選択": document.getElementById("edit-scheme").value,
        "備考": bikoVal
      };
      showLoader();
      try {
        const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "update_record", password: activePin, old_id: oldId, editor: "Ns", data: payload }) });
        const json = await res.json();
        if(json.status === "success") { alert("保存しました"); closeModal("detail-modal"); fetchData(); }
      } catch(e) {} finally { hideLoader(); }
    }

    function showLoader() { document.getElementById("global-loader").style.display = "flex"; }
    function hideLoader() { document.getElementById("global-loader").style.display = "none"; }
    function sendErrorLog(m) { fetch(GAS_API_URL, { method:"POST", body:JSON.stringify({action:"error_log", errorMsg:m}) }); }
    function toHalfWidth(el) {}
  </script>
</body>
</html>
