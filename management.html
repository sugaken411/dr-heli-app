<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>統括・業務管理コンソール</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #f2f2f7; --ink: #1c1c1e; --sub: #8e8e93; --blue: #007aff; --brand: #d32f2f; --line: rgba(60,60,67,0.12); }
    body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--ink); margin: 0; padding: 0; padding-top: env(safe-area-inset-top); }
    
    header { position: sticky; top: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; z-index: 100; }
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
    .cal-header { text-align: center; font-size: 12px; font-weight: 800; color: var(--sub); padding: 8px 0; }
    .cal-cell { background: #fff; min-height: 100px; border-radius: 8px; padding: 6px; border: 1px solid var(--line); display: flex; flex-direction: column; cursor: pointer; transition: 0.15s; }
    .cal-cell:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(0,122,255,0.15); }
    .cal-cell.empty { background: transparent; border: none; cursor: default; }
    .cal-date { font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 4px; }
    .cal-staff { font-size: 10px; color: var(--sub); font-weight: bold; line-height: 1.2; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-badge { font-size: 10px; font-weight: bold; padding: 2px 4px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; color: #fff; margin-bottom: 2px; }
    .cal-reason { font-size: 10px; color: var(--brand); font-weight: bold; background: #ffebeb; padding: 2px 4px; border-radius: 4px; display: inline-block; margin-top: auto; }
  </style>
</head>
<body class="pb-20">

  <div id="global-loader">
    <div class="spinner"></div>
    <div class="font-bold text-slate-800 text-lg mb-2" id="loader-main-text">データ同期中...</div>
    <div class="font-semibold text-slate-500 text-sm text-center max-w-[80%]" id="loader-sub-text">日報データベースを読み込んでいます</div>
  </div>

  <header>
    <button class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
    <div class="font-black text-base">統括・業務管理 <span class="bg-slate-800 text-white text-[10px] px-1.5 py-0.5 rounded ml-1">v1.0</span></div>
    <div class="w-16"></div>
  </header>

  <main class="max-w-5xl mx-auto p-4">
    
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 items-center justify-between">
      <div class="flex items-center gap-4">
        <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center font-bold text-slate-600">◀</button>
        <input type="month" id="month-picker" class="font-black text-xl text-slate-800 bg-transparent outline-none cursor-pointer" onchange="fetchData()">
        <button onclick="changeMonth(1)" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center font-bold text-slate-600">▶</button>
      </div>
      
      <div class="flex bg-slate-100 p-1 rounded-lg">
        <button id="btn-view-cal" onclick="switchView('cal')" class="px-4 py-1.5 rounded-md text-sm font-bold bg-white text-blue-600 shadow-sm transition">📅 カレンダー</button>
        <button id="btn-view-list" onclick="switchView('list')" class="px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition">📋 リスト</button>
      </div>
    </div>

    <div id="view-cal">
      <div class="cal-grid mb-1">
        <div class="cal-header text-red-500">日</div><div class="cal-header">月</div><div class="cal-header">火</div><div class="cal-header">水</div><div class="cal-header">木</div><div class="cal-header">金</div><div class="cal-header text-blue-500">土</div>
      </div>
      <div id="cal-body" class="cal-grid"></div>
    </div>

    <div id="view-list" class="hidden">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left whitespace-nowrap text-sm">
            <thead class="bg-slate-50 text-slate-500 text-xs border-b border-slate-200">
              <tr><th class="px-4 py-3">日付</th><th class="px-4 py-3">担当Dr / Ns</th><th class="px-4 py-3 text-center">出動</th><th class="px-4 py-3 text-center">Cxl</th><th class="px-4 py-3 min-w-[150px]">待機事由・特記</th><th class="px-4 py-3 text-center">操作</th></tr>
            </thead>
            <tbody id="list-body" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
    const PIN_CODE = "5740";
    
    let allReports = [];
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;

    let loaderTimer1, loaderTimer2;
    function showLoader() {
      document.getElementById("global-loader").style.display = "flex";
      loaderTimer1 = setTimeout(() => { document.getElementById("loader-sub-text").innerText = "データ量が多いため少し時間がかかっています..."; }, 5000);
      loaderTimer2 = setTimeout(() => { document.getElementById("loader-sub-text").innerHTML = "<span style='color:var(--brand);'>通信タイムアウト<br>フリーズしている場合はリロードしてください。</span>"; }, 15000);
    }
    function hideLoader() { clearTimeout(loaderTimer1); clearTimeout(loaderTimer2); document.getElementById("global-loader").style.display = "none"; }
    function sendErrorLog(errMsg) { try { fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "error_log", source: "業務管理(management.html)", errorMsg: errMsg, userAgent: navigator.userAgent }) }); } catch(e) {} }

    window.onload = () => {
      document.getElementById("month-picker").value = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      fetchData();
    };

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; } 
      else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
      document.getElementById("month-picker").value = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      fetchData();
    }

    function switchView(view) {
      document.getElementById('view-cal').classList.toggle('hidden', view !== 'cal');
      document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
      
      const btnCal = document.getElementById('btn-view-cal'); const btnList = document.getElementById('btn-view-list');
      if(view === 'cal') {
        btnCal.className = "px-4 py-1.5 rounded-md text-sm font-bold bg-white text-blue-600 shadow-sm transition";
        btnList.className = "px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition";
      } else {
        btnList.className = "px-4 py-1.5 rounded-md text-sm font-bold bg-white text-blue-600 shadow-sm transition";
        btnCal.className = "px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition";
      }
    }

    async function fetchData() {
      const pickerVal = document.getElementById("month-picker").value;
      if(!pickerVal) return;
      [currentYear, currentMonth] = pickerVal.split('-').map(Number);
      
      showLoader();
      try {
        const res = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetch_all_reports", password: PIN_CODE }) });
        const json = await res.json();
        
        if (json.status === "success") {
          allReports = json.data;
          renderViews();
        } else { throw new Error(json.message); }
      } catch (e) {
        alert("データ同期に失敗しました。");
        sendErrorLog(e.toString());
      } finally {
        hideLoader();
      }
    }

    function renderViews() {
      const targetPrefix = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      
      // 1. 指定月のデータマップ作成 (key: YYYY-MM-DD)
      let monthData = {};
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      for(let d=1; d<=daysInMonth; d++) {
        monthData[`${targetPrefix}-${String(d).padStart(2,'0')}`] = { date: d, dr: "", ns: "", reason: "", mission: 0, cancel: 0, exists: false };
      }

      allReports.forEach(r => {
        if(r.date.startsWith(targetPrefix)) {
          let mCount = 0; let cCount = 0;
          if(Array.isArray(r.events)) {
            r.events.forEach(ev => { if(ev.cat === 'mission') mCount++; else if(ev.cat === 'cancel') cCount++; });
          }
          if(monthData[r.date]) {
            monthData[r.date] = { date: parseInt(r.date.split('-')[2]), dr: r.doctor, ns: r.recorder, reason: r.reason, mission: mCount, cancel: cCount, exists: true };
          }
        }
      });

      // --- カレンダー描画 ---
      const calBody = document.getElementById("cal-body"); calBody.innerHTML = "";
      const firstDayIndex = new Date(currentYear, currentMonth - 1, 1).getDay();
      
      for(let i=0; i<firstDayIndex; i++) { calBody.innerHTML += `<div class="cal-cell empty"></div>`; }
      
      for(let d=1; d<=daysInMonth; d++) {
        const fullDate = `${targetPrefix}-${String(d).padStart(2,'0')}`;
        const dat = monthData[fullDate];
        const isSun = new Date(currentYear, currentMonth - 1, d).getDay() === 0;
        const isSat = new Date(currentYear, currentMonth - 1, d).getDay() === 6;
        let dateColor = isSun ? "text-red-500" : (isSat ? "text-blue-500" : "text-slate-800");

        let content = `<div class="cal-date ${dateColor}">${d}</div>`;
        if(dat.exists) {
          content += `<div class="cal-staff">Dr: ${dat.dr || '-'}<br>Ns: ${dat.ns || '-'}</div>`;
          if(dat.mission > 0) content += `<div class="cal-badge bg-blue-500">🚁 ${dat.mission}</div>`;
          if(dat.cancel > 0) content += `<div class="cal-badge bg-slate-500">⚠️ ${dat.cancel}</div>`;
          if(dat.reason) {
            const reasons = dat.reason.split(',').filter(r => r.includes('風')||r.includes('天候')||r.includes('トラブル')||r.includes('待機'));
            if(reasons.length > 0) content += `<div class="cal-reason truncate w-full">${reasons[0]}</div>`;
          }
        }
        calBody.innerHTML += `<div class="cal-cell" onclick="location.href='report.html?date=${fullDate}'">${content}</div>`;
      }

      // --- リスト描画 ---
      const listBody = document.getElementById("list-body"); listBody.innerHTML = "";
      Object.keys(monthData).sort().forEach(dateKey => {
        const dat = monthData[dateKey];
        const weekStr = ["日","月","火","水","木","金","土"][new Date(dateKey.replace(/-/g, '/')).getDay()];
        
        if(dat.exists) {
          listBody.innerHTML += `
            <tr class="hover:bg-blue-50">
              <td class="px-4 py-3 font-mono font-bold text-slate-700">${dateKey} (${weekStr})</td>
              <td class="px-4 py-3 text-slate-600"><span class="font-bold text-slate-800">${dat.dr || '-'}</span> / ${dat.ns || '-'}</td>
              <td class="px-4 py-3 text-center"><span class="bg-blue-100 text-blue-700 font-bold px-2 py-1 rounded">${dat.mission}</span></td>
              <td class="px-4 py-3 text-center"><span class="bg-slate-100 text-slate-600 font-bold px-2 py-1 rounded">${dat.cancel}</span></td>
              <td class="px-4 py-3 text-slate-600 truncate max-w-[200px]">${dat.reason || '-'}</td>
              <td class="px-4 py-3 text-center"><a href="report.html?date=${dateKey}" class="text-blue-600 font-bold text-xs bg-blue-50 px-3 py-1.5 rounded-lg hover:bg-blue-100">詳細・日誌</a></td>
            </tr>
          `;
        }
      });
      if(listBody.innerHTML === "") listBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-500 font-bold">データがありません</td></tr>`;
    }
  </script>
</body>
</html>
