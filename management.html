<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>統括・業務管理コンソール</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #f2f2f7; --ink: #1c1c1e; --sub: #8e8e93; --blue: #007aff; --brand: #d32f2f; --line: rgba(60,60,67,0.12); }
    body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--ink); margin: 0; padding: 0; padding-top: env(safe-area-inset-top); }
    
    header { position: sticky; top: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; z-index: 100; }
    .hdr-btn { color: var(--blue); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    
    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
    .cal-header { text-align: center; font-size: 12px; font-weight: 800; color: var(--sub); padding: 8px 0; }
    .cal-cell { background: #fff; min-height: 100px; border-radius: 8px; padding: 6px; border: 1px solid var(--line); display: flex; flex-direction: column; cursor: pointer; transition: 0.15s; }
    .cal-cell:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(0,122,255,0.15); }
    .cal-cell.empty { background: transparent; border: none; cursor: default; }
    .cal-date { font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 4px; }
    .cal-staff { font-size: 10px; color: var(--sub); font-weight: bold; line-height: 1.2; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-badge { font-size: 10px; font-weight: bold; padding: 2px 4px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; color: #fff; margin-bottom: 2px; }
    .cal-reason { font-size: 10px; color: var(--brand); font-weight: bold; background: #ffebeb; padding: 2px 4px; border-radius: 4px; display: inline-block; margin-top: auto; }
    
    /* 🖨️ 印刷用スタイル */
    @media print {
      body { background: #fff; margin: 0; padding: 0; -webkit-print-color-adjust: exact; }
      header, .no-print { display: none !important; }
      main { max-width: 100%; padding: 0; margin-top: 10px; }
      .cal-cell { border: 1px solid #ccc; break-inside: avoid; min-height: 80px; }
      .bg-white { border: none !important; box-shadow: none !important; }
      .break-after { page-break-after: always; }
      #view-list { display: block !important; } 
    }
  </style>
</head>
<body class="pb-20">

  <div id="global-loader" style="display:none;">
    <div class="spinner"></div>
    <div class="font-bold text-slate-800 text-lg mb-2" id="loader-main-text">データ同期中...</div>
    <div class="font-semibold text-slate-500 text-sm text-center max-w-[80%]" id="loader-sub-text">日報データベースを読み込んでいます</div>
  </div>

  <header class="no-print">
    <button type="button" class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
    <div class="font-black text-base flex items-center gap-2">
      統括・業務管理 <span class="bg-slate-800 text-white text-[10px] px-1.5 py-0.5 rounded">v1.4</span>
      <span id="sync-timestamp" class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100 hidden"></span>
    </div>
    <button type="button" class="hdr-btn" onclick="window.print()">🖨️ 印刷</button>
  </header>

  <main class="max-w-5xl mx-auto p-4">
    
    <!-- 🖨️ 印刷用タイトル -->
    <div class="hidden print:block text-2xl font-bold text-center mb-6 border-b-2 border-slate-800 pb-2">
      <span id="print-month-title"></span> 業務実績報告
    </div>

    <!-- コントロールパネル -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 items-center justify-between no-print">
      <div class="flex items-center gap-4">
        <button type="button" onclick="changeMonth(-1)" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center font-bold text-slate-600">◀</button>
        <input type="month" id="month-picker" class="font-black text-xl text-slate-800 bg-transparent outline-none cursor-pointer" onchange="fetchData()">
        <button type="button" onclick="changeMonth(1)" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center font-bold text-slate-600">▶</button>
      </div>
      
      <div class="flex bg-slate-100 p-1 rounded-lg">
        <button type="button" id="btn-view-cal" onclick="switchView('cal')" class="px-4 py-1.5 rounded-md text-sm font-bold bg-white text-blue-600 shadow-sm transition">📅 カレンダー</button>
        <button type="button" id="btn-view-list" onclick="switchView('list')" class="px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition">📋 リスト</button>
      </div>
    </div>

    <!-- 業務活動時間の内訳 -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 mb-6 p-5 break-after">
      <h3 class="text-sm font-bold text-slate-700 mb-4 border-b border-slate-200 pb-2">⏱️ 業務活動時間（分数）の内訳</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
        <div class="relative h-48 w-full">
          <canvas id="activityChart"></canvas>
        </div>
        <div>
          <div id="activity-stats" class="grid grid-cols-2 gap-2 text-sm font-bold text-slate-600"></div>
        </div>
      </div>
    </div>

    <!-- カレンダービュー -->
    <div id="view-cal" class="break-after">
      <div class="cal-grid mb-1">
        <div class="cal-header text-red-500">日</div><div class="cal-header">月</div><div class="cal-header">火</div><div class="cal-header">水</div><div class="cal-header">木</div><div class="cal-header">金</div><div class="cal-header text-blue-500">土</div>
      </div>
      <div id="cal-body" class="cal-grid"></div>
    </div>

    <!-- リストビュー -->
    <div id="view-list" class="hidden print:block print:mt-10">
      <div class="hidden print:block text-lg font-bold text-slate-800 mb-4">■ 日々の特記事項・出動リスト</div>
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left whitespace-nowrap text-sm">
            <thead class="bg-slate-50 text-slate-500 text-xs border-b border-slate-200">
              <tr><th class="px-4 py-3">日付</th><th class="px-4 py-3">担当Dr / Ns</th><th class="px-4 py-3 text-center">出動</th><th class="px-4 py-3 text-center">Cxl</th><th class="px-4 py-3 min-w-[150px]">待機事由・特記</th><th class="px-4 py-3 text-center no-print">操作</th></tr>
            </thead>
            <tbody id="list-body" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
    const PIN_CODE = "5740";

    // 🌟 超高感度エラー監視機能 (Failed to fetch 等のネットワーク切断エラーの抑止完全対応)
    window.onerror = function(message, source, lineno, colno, error) {
      const errDetail = `Type: GlobalError\nMsg: ${message}\nLine: ${lineno}:${colno}\nStack: ${error ? error.stack : 'N/A'}`;
      sendErrorLog(errDetail); 
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      const reason = event.reason ? (event.reason.stack || event.reason) : 'N/A';
      if(String(reason).includes("Load failed") || String(reason).includes("Failed to fetch")) {
        console.warn("ネットワーク切断を検知したため、エラーログ送信をキャンセルしました。");
        return;
      }
      sendErrorLog(`Type: PromiseRejection\nReason: ${reason}`);
    });
    
    let allReports = [];
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;
    let chartInstance = null;

    const CAT_INFO = {
      mission: { label: 'ヘリ活動', color: '#2563eb' }, 
      cancel: { label: 'キャンセル', color: '#9ca3af' }, 
      inspection: { label: '始業点検', color: '#fb923c' }, 
      inspection_end: { label: '終業点検', color: '#ea580c' }, 
      assistant: { label: '補助者', color: '#fb7185' }, 
      management: { label: '管理業務', color: '#64748b' }, 
      group: { label: 'グループ', color: '#14b8a6' }, 
      other: { label: 'その他', color: '#a855f7' } 
    };

    let loaderTimer1, loaderTimer2;
    function showLoader() {
      document.getElementById("global-loader").style.display = "flex";
      loaderTimer1 = setTimeout(() => { document.getElementById("loader-sub-text").innerText = "データ量が多いため少し時間がかかっています..."; }, 5000);
      loaderTimer2 = setTimeout(() => { document.getElementById("loader-sub-text").innerHTML = "<span style='color:var(--brand);'>通信タイムアウト<br>フリーズしている場合はリロードしてください。</span>"; }, 15000);
    }
    
    function hideLoader() { 
      clearTimeout(loaderTimer1); 
      clearTimeout(loaderTimer2); 
      document.getElementById("global-loader").style.display = "none"; 
    }
    
    function sendErrorLog(errMsg) { 
      if(String(errMsg).includes("Load failed") || String(errMsg).includes("Failed to fetch")) return;
      try { 
        fetch(GAS_API_URL, { 
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
          body: JSON.stringify({ action: "error_log", source: "業務管理(management.html)", errorMsg: errMsg, userAgent: navigator.userAgent }), 
          redirect: "follow" 
        }); 
      } catch(e) {} 
    }

    // 🌟 日付フォーマットのパディング正規化 (YYYY-MM-DD形式)
    function normalizeDate(rawDate) {
      if (!rawDate) return "";
      let rawDateStr = String(rawDate).split(" ")[0]; 
      let dateParts = rawDateStr.split(/[\/\-]/);
      
      if (dateParts.length === 3) {
        return `${dateParts[0]}-${dateParts[1].padStart(2, '0')}-${dateParts[2].padStart(2, '0')}`;
      }
      return rawDateStr.replace(/\//g, "-");
    }

    // 🌟 同期完了タイムスタンプの更新
    function updateSyncTimestamp() {
      const tsSpan = document.getElementById("sync-timestamp");
      const now = new Date();
      const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      tsSpan.innerText = `同期: ${timeStr}`;
      tsSpan.classList.remove("hidden");
    }

    window.onload = () => {
      document.getElementById("month-picker").value = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      fetchData();
    };

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; } 
      else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
      document.getElementById("month-picker").value = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      fetchData();
    }

    function switchView(view) {
      document.getElementById('view-cal').classList.toggle('hidden', view !== 'cal');
      document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
      
      const btnCal = document.getElementById('btn-view-cal'); const btnList = document.getElementById('btn-view-list');
      if(view === 'cal') {
        btnCal.className = "px-4 py-1.5 rounded-md text-sm font-bold bg-white text-blue-600 shadow-sm transition";
        btnList.className = "px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition";
      } else {
        btnList.className = "px-4 py-1.5 rounded-md text-sm font-bold bg-white text-blue-600 shadow-sm transition";
        btnCal.className = "px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition";
      }
    }

    function timeToMins(tStr) {
      if(!tStr) return 0;
      let p = String(tStr).split(':');
      if(p.length < 2) return 0;
      return parseInt(p[0]) * 60 + parseInt(p[1]);
    }

    async function fetchData() {
      const pickerVal = document.getElementById("month-picker").value;
      if(!pickerVal) return;
      [currentYear, currentMonth] = pickerVal.split('-').map(Number);
      document.getElementById("print-month-title").innerText = `${currentYear}年 ${currentMonth}月`;
      
      showLoader();
      try {
        const res = await fetch(GAS_API_URL, { 
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
          body: JSON.stringify({ action: "fetch_all_reports", password: PIN_CODE }), 
          redirect: "follow" 
        });
        const json = await res.json();
        
        if (json.status === "success") {
          allReports = json.data;
          updateSyncTimestamp();
          renderViews();
        } else { throw new Error(json.message); }
      } catch (e) {
        alert("データ同期に失敗しました。接続を確認してください。");
        sendErrorLog(e.toString());
      } finally {
        hideLoader();
      }
    }

    function renderViews() {
      const targetPrefix = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      let monthData = {};
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      
      let timeStats = { mission:0, cancel:0, inspection:0, inspection_end:0, assistant:0, management:0, group:0, other:0 };

      for(let d=1; d<=daysInMonth; d++) {
        monthData[`${targetPrefix}-${String(d).padStart(2,'0')}`] = { date: d, dr: "", ns: "", reason: "", mission: 0, cancel: 0, exists: false };
      }

      allReports.forEach(r => {
        // 🌟 日付を完全に正規化してマッチング (ハイフン区切りの前方一致で安全に比較可能に)
        const normalizedReportDate = normalizeDate(r.date);
        if(normalizedReportDate.startsWith(targetPrefix)) {
          let mCount = 0; let cCount = 0;
          if(Array.isArray(r.events)) {
            r.events.forEach(ev => { 
              if(ev.cat === 'mission') mCount++; else if(ev.cat === 'cancel') cCount++; 
              let sMins = timeToMins(ev.start); let eMins = timeToMins(ev.end);
              if(sMins < eMins && timeStats[ev.cat] !== undefined) {
                timeStats[ev.cat] += (eMins - sMins);
              }
            });
          }
          if(monthData[normalizedReportDate]) {
            monthData[normalizedReportDate] = { date: parseInt(normalizedReportDate.split('-')[2]), dr: r.doctor, ns: r.recorder, reason: r.reason, mission: mCount, cancel: cCount, exists: true };
          }
        }
      });

      const chartLabels = []; const chartData = []; const chartColors = [];
      const statsHtml = [];
      let totalMins = 0;

      Object.keys(timeStats).forEach(key => {
        if(timeStats[key] > 0) {
          totalMins += timeStats[key];
          chartLabels.push(CAT_INFO[key].label);
          chartData.push(timeStats[key]);
          chartColors.push(CAT_INFO[key].color);
          
          let h = Math.floor(timeStats[key]/60); let m = timeStats[key]%60;
          let timeStr = h > 0 ? `${h}時間${m}分` : `${m}分`;
          statsHtml.push(`<div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background-color:${CAT_INFO[key].color}"></span>${CAT_INFO[key].label}: <span class="ml-auto">${timeStr}</span></div>`);
        }
      });

      document.getElementById("activity-stats").innerHTML = statsHtml.join("") || "<div class=\"col-span-2 text-center py-4\">データなし</div>";

      if(chartInstance) chartInstance.destroy();
      const ctx = document.getElementById("activityChart").getContext("2d");
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: chartLabels, datasets: [{ data: chartData, backgroundColor: chartColors, borderWidth: 1 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '60%' }
      });

      const calBody = document.getElementById("cal-body"); calBody.innerHTML = "";
      const firstDayIndex = new Date(currentYear, currentMonth - 1, 1).getDay();
      
      for(let i=0; i<firstDayIndex; i++) { calBody.innerHTML += `<div class="cal-cell empty"></div>`; }
      
      for(let d=1; d<=daysInMonth; d++) {
        const fullDate = `${targetPrefix}-${String(d).padStart(2,'0')}`;
        const dat = monthData[fullDate];
        const isSun = new Date(currentYear, currentMonth - 1, d).getDay() === 0;
        const isSat = new Date(currentYear, currentMonth - 1, d).getDay() === 6;
        let dateColor = isSun ? "text-red-500" : (isSat ? "text-blue-500" : "text-slate-800");

        let content = `<div class="cal-date ${dateColor}">${d}</div>`;
        if(dat.exists) {
          content += `<div class="cal-staff">Dr: ${dat.dr || '-'}<br>Ns: ${dat.ns || '-'}</div>`;
          if(dat.mission > 0) content += `<div class="cal-badge bg-blue-500">🚁 ${dat.mission}</div>`;
          if(dat.cancel > 0) content += `<div class="cal-badge bg-slate-500">⚠️ ${dat.cancel}</div>`;
          if(dat.reason) {
            const reasons = dat.reason.split(',').filter(r => r.includes('風')||r.includes('天候')||r.includes('トラブル')||r.includes('待機'));
            if(reasons.length > 0) content += `<div class="cal-reason truncate w-full">${reasons[0]}</div>`;
          }
        }
        calBody.innerHTML += `<div class="cal-cell" onclick="location.href='report.html?date=${fullDate}'">${content}</div>`;
      }

      const listBody = document.getElementById("list-body"); listBody.innerHTML = "";
      Object.keys(monthData).sort().forEach(dateKey => {
        const dat = monthData[dateKey];
        const weekStr = ["日","月","火","水","木","金","土"][new Date(dateKey.replace(/-/g, '/')).getDay()];
        
        if(dat.exists) {
          listBody.innerHTML += `
            <tr class="hover:bg-blue-50">
              <td class="px-4 py-3 font-mono font-bold text-slate-700">${dateKey} (${weekStr})</td>
              <td class="px-4 py-3 text-slate-600"><span class="font-bold text-slate-800">${dat.dr || '-'}</span> / ${dat.ns || '-'}</td>
              <td class="px-4 py-3 text-center"><span class="bg-blue-100 text-blue-700 font-bold px-2 py-1 rounded">${dat.mission}</span></td>
              <td class="px-4 py-3 text-center"><span class="bg-slate-100 text-slate-600 font-bold px-2 py-1 rounded">${dat.cancel}</span></td>
              <td class="px-4 py-3 text-slate-600 truncate max-w-[200px] print:max-w-none print:whitespace-normal">${dat.reason || '-'}</td>
              <td class="px-4 py-3 text-center no-print"><a href="report.html?date=${dateKey}" class="text-blue-600 font-bold text-xs bg-blue-50 px-3 py-1.5 rounded-lg hover:bg-blue-100">詳細・日誌</a></td>
            </tr>
          `;
        }
      });
      if(listBody.innerHTML === "") listBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-500 font-bold">データがありません</td></tr>`;
    }
  </script>
</body>
</html>
