<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>業務日報 (浜町日誌)</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --ink: #1c1c1e;
      --sub: #8e8e93;
      --blue: #007aff;
      --line: rgba(60,60,67,0.12);
    }
    
    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      padding: 20px;
    }

    header {
      max-width: 800px;
      margin: 0 auto 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hdr-btn {
      background: none;
      border: none;
      color: var(--blue);
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 12px;
      font-weight: bold;
      color: var(--sub);
    }

    input, select, textarea {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      font-size: 14px;
      background: #fff;
      outline: none;
    }

    /* 自由編集・手動修正用のメイン日誌テキストエリア */
    textarea.report-main-textarea {
      width: 100%;
      font-family: -apple-system, SFMono-Regular, monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      background: #fafafa;
      color: var(--ink);
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .chip {
      background: var(--bg);
      border: 1px solid transparent;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      color: var(--sub);
      transition: all 0.2s ease;
    }

    .chip.on {
      background: #e3f2fd;
      color: var(--blue);
      border-color: var(--blue);
    }

    button.save-btn {
      width: 100%;
      padding: 16px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #global-loader {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0,122,255,0.2);
      border-top: 4px solid var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div id="global-loader">
  <div class="spinner"></div>
  <div style="margin-top:16px; font-weight:bold;">日報同期中...</div>
</div>

<header>
  <button class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
  <div style="font-weight:800; font-size:16px;">
    業務日報 (浜町日誌) 
    <span style="font-size:11px; background:var(--blue); color:#fff; padding:2px 6px; border-radius:4px; margin-left:4px;">v3.3</span>
  </div>
  <div></div>
</header>

<main>
  <div class="card">
    <div class="title">📅 日報の作成・同期</div>
    <div class="form-grid">
      <div class="form-group">
        <label>対象日付</label>
        <input type="date" id="r-date" onchange="syncFromDb(false)">
      </div>
      <div class="form-group">
        <label>記録者 (Ns)</label>
        <select id="r-recorder">
          <option value="">選択...</option>
        </select>
      </div>
      <div class="form-group">
        <label>当直Dr</label>
        <select id="v-dr">
          <option value="">選択...</option>
        </select>
      </div>
    </div>
    
    <div class="form-group" style="margin-top:16px;">
      <label>🚁 待機事由・不稼働理由選択 (複数選択可)</label>
      <div class="chip-grid" style="margin-top:8px;">
        <button class="chip" id="reason-風向き" onclick="toggleReason('風向き')">風向き</button>
        <button class="chip" id="reason-天候不良" onclick="toggleReason('天候不良')">天候不良</button>
        <button class="chip" id="reason-強風" onclick="toggleReason('強風')">強風</button>
        <button class="chip" id="reason-機体トラブル" onclick="toggleReason('機体トラブル')">機体トラブル</button>
      </div>
      <input type="hidden" id="r-reason">
    </div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div style="font-weight:800; font-size:15px;">📝 日誌本文・活動タイムライン編集</div>
      <button onclick="syncFromDb(true)" style="padding:6px 12px; font-size:12px; background:#e5e5ea; color:var(--ink); border:none; border-radius:6px; font-weight:bold; cursor:pointer;">
        🔄 データベースから強制再同期
      </button>
    </div>
    
    <div class="form-group">
      <textarea id="r-notes" class="report-main-textarea" rows="18" placeholder="ここに本日のタイムライン文章が自動流し込みされ、手動編集できます。"></textarea>
    </div>
  </div>

  <button class="save-btn" onclick="saveReport()">💾 この内容で日報を確定・保存する</button>
</main>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  let rawEvents = [];
  let selectedReasons = [];

  window.onload = () => {
    const d = new Date();
    const todayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById("r-date").value = todayStr;
    fetchInit();
  };

  function toggleReason(reasonText) {
    const idx = selectedReasons.indexOf(reasonText);
    if (idx === -1) {
      selectedReasons.push(reasonText);
    } else {
      selectedReasons.splice(idx, 1);
    }
    document.querySelectorAll(".chip-grid .chip").forEach(btn => {
      btn.classList.toggle("on", selectedReasons.indexOf(btn.textContent) !== -1);
    });
    document.getElementById("r-reason").value = selectedReasons.join(",");
  }

  // 🌟 GASから取得したイベント群をプレーンな「日誌文章」に変換して流し込む
  async function syncFromDb(force) {
    document.getElementById("global-loader").style.display = "flex";
    const dateVal = document.getElementById("r-date").value;
    
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "fetch_daily_report", date: dateVal, force_sync: force })
      });
      
      const json = await res.json();
      
      if (json.status === "success") {
        if (json.data.recorder) document.getElementById("r-recorder").value = json.data.recorder;
        if (json.data.doctor) document.getElementById("v-dr").value = json.data.doctor;
        
        if (json.data.hamamachiReason) {
          selectedReasons = json.data.hamamachiReason.split(",").filter(Boolean);
          document.querySelectorAll(".chip-grid .chip").forEach(btn => {
            btn.classList.toggle("on", selectedReasons.indexOf(btn.textContent) !== -1);
          });
          document.getElementById("r-reason").value = json.data.hamamachiReason;
        } else {
          selectedReasons = [];
          document.querySelectorAll(".chip-grid .chip").forEach(b => b.classList.remove("on"));
          document.getElementById("r-reason").value = "";
        }
        
        rawEvents = json.data.events || [];
        
        // 🌟 タイムラインブロック表示を排除し、以前のテキストエリア出力へと流し込む
        if (rawEvents.length === 0) {
          document.getElementById("r-notes").value = "【本日の登録事案・イベントはありません。】";
        } else {
          let textNotes = "【本日のフライト・業務タイムライン】\n";
          rawEvents.forEach(e => {
            textNotes += `${e.start} 〜 ${e.end} ｜ ${e.desc}\n`;
          });
          document.getElementById("r-notes").value = textNotes;
        }
      }
    } catch(e) {
      alert("同期エラーが発生しました。");
      console.error(e);
    } finally {
      document.getElementById("global-loader").style.display = "none";
    }
  }

  async function saveReport() {
    const dateVal = document.getElementById("r-date").value;
    const rec = document.getElementById("r-recorder").value;
    const dr = document.getElementById("v-dr").value;
    const reason = document.getElementById("r-reason").value;
    const notesText = document.getElementById("r-notes").value; // 編集後のテキストエリアをそのまま取得
    
    if (!rec || !dr) {
      return alert("「記録者」と「当直Dr」を選択してください。");
    }

    document.getElementById("global-loader").style.display = "flex";
    
    try {
      // 保存時は、ユーザーが手動改変した日誌本文のテキストデータ整合性を崩さないため、
      // 特殊な形式オブジェクト（またはテキストをパースしたダミーイベント）としてGASへ返却格納する
      const virtualEvents = [{
        start: "08:30",
        end: "17:15",
        desc: notesText, // 全文章をそのまま保持
        category: "inspection"
      }];

      const payload = {
        action: "save_daily_report",
        date: dateVal,
        recorder: rec,
        doctor: dr,
        hamamachiReason: reason,
        events: virtualEvents
      };

      const res = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      
      const json = await res.json();
      if (json.status === "success") {
        alert("日報（浜町日誌）をスプレッドシートへ確定・保存しました。");
      } else {
        alert("保存中にエラーが発生しました: " + json.message);
      }
    } catch(e) {
      alert("保存エラーが発生しました。");
    } finally {
      document.getElementById("global-loader").style.display = "none";
    }
  }

  async function fetchInit() {
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "fetch_init", app_name: "日報" })
      });
      
      const json = await res.json();
      
      if (json.status === "success") {
        const fillOptions = (id, arr) => {
          document.getElementById(id).innerHTML = '<option value="">選択...</option>' + arr.map(v => `<option value="${v}">${v}</option>`).join("");
        };
        fillOptions("r-recorder", json.masters.ns);
        fillOptions("v-dr", json.masters.dr);
        
        syncFromDb(false);
      }
    } catch(e) {
      console.error(e);
      document.getElementById("global-loader").style.display = "none";
    }
  }
</script>
</body>
</html>
