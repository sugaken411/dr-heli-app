<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドクターヘリ業務日報・活動タイムライン</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js" crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        @media print {
            @page { 
                size: landscape; 
                margin: 5mm; 
            }
            body { 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                background: white;
                /* A4に収めるためさらに縮小 */
                transform: scale(0.75);
                transform-origin: top left;
                width: 133%;
                height: 100%;
                overflow: visible;
                margin: 0;
                padding: 0;
            }
            
            .no-print, #input-form-area { display: none !important; }
            .print-full-width { width: 100% !important; min-width: 0 !important; }
            .print-break-avoid { page-break-inside: avoid; }
            
            /* --- ヘッダー --- */
            .print-header-compact { display: flex !important; flex-wrap: wrap; gap: 16px; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 2px; margin-bottom: 4px; font-size: 11pt; }
            .print-header-item { display: flex; align-items: center; white-space: nowrap; }
            .print-reason-box { font-size: 10pt; border: 1px solid #ddd; padding: 2px 4px; margin-bottom: 4px; min-height: auto !important; }

            /* --- チャートエリア (高さを大幅に縮小) --- */
            .print-chart-container { 
                height: 80px !important;
                min-height: 80px !important;
                margin-bottom: 4px !important;
                border: 1px solid #ddd !important;
                overflow: hidden !important; 
                position: relative !important;
                background-color: white !important;
            }
            
            .print-time-label { top: 0 !important; font-size: 9pt !important; line-height: 1.5 !important; height: 16px !important; }
            .print-grid-line { top: 16px !important; bottom: 0 !important; height: auto !important; }
            
            /* イベントバー (高さを半分程度に細く) */
            .print-chart-bar-wrapper { top: 24px !important; transform: none !important; }
            .print-chart-bar { height: 24px !important; min-height: 24px !important; flex-direction: row !important; } 
            .print-icon-size { width: 12px !important; height: 12px !important; margin-right: 4px; }
            .print-bar-text { font-size: 9px !important; }

            /* --- リストエリア (余白を詰める) --- */
            .print-list-header th { padding: 1px 4px !important; font-size: 9pt !important; background-color: #f3f4f6 !important; border-bottom: 1px solid #ccc !important; }
            .print-list-row td { padding: 1px 4px !important; font-size: 9pt !important; line-height: 1.1 !important; border-bottom: 1px solid #eee !important; }
            .print-wrap-text { white-space: pre-wrap !important; word-break: break-all !important; font-size: 8.5pt !important; }

            /* --- フッター --- */
            .print-footer { position: fixed; bottom: 0; right: 0; width: 100%; text-align: right; font-size: 8pt; color: #888; padding-top: 2px; border-top: 1px solid #eee; background: white; }
        }
        
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
        const PIN_CODE = "5740";

        // --- アイコン ---
        const Icon = ({ path, className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            ClipboardList: (props) => <Icon {...props} path={<><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 12h.01"/><path d="M13 12h5"/><path d="M9 16h.01"/><path d="M13 16h5"/><path d="M9 8h.01"/><path d="M13 8h5"/></>} />,
            Plus: (props) => <Icon {...props} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
            Trash2: (props) => <Icon {...props} path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />,
            RotateCcw: (props) => <Icon {...props} path={<><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>} />,
            Briefcase: (props) => <Icon {...props} path={<><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>} />,
            Users: (props) => <Icon {...props} path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
            Settings: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />,
            FileSpreadsheet: (props) => <Icon {...props} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M10 9v8"/></>} />,
            User: (props) => <Icon {...props} path={<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />,
            Edit3: (props) => <Icon {...props} path={<><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>} />,
            X: (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />,
            Printer: (props) => <Icon {...props} path={<><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>} />,
            BookOpen: (props) => <Icon {...props} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />,
            AlertCircle: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />,
            CheckCircle: (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
            Activity: (props) => <Icon {...props} path={<><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>} />,
            Folder: (props) => <Icon {...props} path={<><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></>} />,
            Mail: (props) => <Icon {...props} path={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>} />,
            Sun: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>} />,
            Moon: (props) => <Icon {...props} path={<><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>} />,
            Clock: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
            Save: (props) => <Icon {...props} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />
        };

        const DailyTimelineApp = () => {
            const START_HOUR = 8;
            const END_HOUR = 19;
            const TOTAL_HOURS = END_HOUR - START_HOUR;
            const TOTAL_MINUTES = TOTAL_HOURS * 60;

            const CATEGORIES = {
                MISSION: { id: 'mission', label: 'ヘリ活動 (実施)', color: 'bg-blue-600 border-blue-700', icon: Icons.CheckCircle, hasPrep: true, hasRecovery: true },
                CANCEL: { id: 'cancel', label: 'ヘリ活動 (キャンセル)', color: 'bg-gray-400 border-gray-500', icon: Icons.AlertCircle, hasPrep: true, hasRecovery: true },
                INSPECTION: { id: 'inspection', label: '始業点検・整備', color: 'bg-orange-400 border-orange-500', icon: Icons.Settings, hasPrep: false, hasRecovery: false },
                ASSISTANT: { id: 'assistant', label: '補助者業務', color: 'bg-rose-400 border-rose-500', icon: Icons.Activity, hasPrep: false, hasRecovery: false },
                MANAGEMENT: { id: 'management', label: '管理業務', color: 'bg-slate-500 border-slate-600', icon: Icons.Folder, hasPrep: false, hasRecovery: false },
                GROUP: { id: 'group', label: 'グループ業務/会議', color: 'bg-teal-500 border-teal-600', icon: Icons.Users, hasPrep: false, hasRecovery: false },
                OTHER: { id: 'other', label: 'その他活動', color: 'bg-purple-500 border-purple-600', icon: Icons.Briefcase, hasPrep: false, hasRecovery: false },
            };

            const REASON_OPTIONS = ["風向き", "天候不良", "強風", "機体トラブル"];

            const [reportInfo, setReportInfo] = useState({ 
                date: new Date().toISOString().split('T')[0], 
                recorder: '', 
                doctor: '', 
                hamamachiReason: '',
                selectedReasons: [],
                otherReason: ''
            });
            const [events, setEvents] = useState([]);
            const [formData, setFormData] = useState({ category: 'mission', no: '', start: '', end: '', desc: '', isContinuous: false });
            const [editingId, setEditingId] = useState(null);
            const [hoveredId, setHoveredId] = useState(null);
            const [showManual, setShowManual] = useState(false);
            const [sunTimes, setSunTimes] = useState({ sunrise: '--:--', sunset: '--:--', standbyEnd: '--:--' });
            
            // マスタデータ
            const [masters, setMasters] = useState({ dr: [], ns: [] });
            const [isLoading, setIsLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState('');

            const categoryRef = useRef(null);
            const noRef = useRef(null);
            const startRef = useRef(null);
            const endRef = useRef(null);
            const descRef = useRef(null);

            // 1. 初回マウント時にマスタデータを取得
            useEffect(() => {
                const initFetch = async () => {
                    try {
                        const res = await fetch(GAS_API_URL, {
                            method: "POST",
                            headers: {"Content-Type": "text/plain;charset=utf-8"},
                            body: JSON.stringify({action: "fetch_init", password: PIN_CODE})
                        });
                        const json = await res.json();
                        if (json.status === "success") {
                            setMasters({ dr: json.masters.dr || [], ns: json.masters.ns || [] });
                        }
                    } catch (e) {
                        console.warn("マスタデータの取得に失敗しました。オフラインモードで起動します。", e);
                    }
                };
                initFetch();
            }, []);

            // 2. 日付変更時に日報データ＆事案データを取得
            useEffect(() => {
                if (!reportInfo.date) return;
                
                // 日没計算
                try {
                    const date = new Date(reportInfo.date);
                    if (window.SunCalc) {
                        const times = SunCalc.getTimes(date, 31.5602, 130.558); // 鹿児島
                        const formatTime = (dateObj) => dateObj.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                        const sunsetTime = times.sunset;
                        const sunsetMinus1h = new Date(sunsetTime.getTime() - 60 * 60 * 1000);
                        const fixed1730 = new Date(date); fixed1730.setHours(17, 30, 0);
                        const standbyEnd = (sunsetMinus1h < fixed1730) ? sunsetMinus1h : fixed1730;
                        setSunTimes({ sunrise: formatTime(times.sunrise), sunset: formatTime(times.sunset), standbyEnd: formatTime(standbyEnd) });
                    }
                } catch(e) {}

                // GASからデータ取得
                const fetchData = async () => {
                    setLoadingMsg('データを読み込み中...');
                    setIsLoading(true);
                    try {
                        const res = await fetch(GAS_API_URL, {
                            method: "POST",
                            headers: {"Content-Type": "text/plain;charset=utf-8"},
                            body: JSON.stringify({action: "fetch_daily_report", password: PIN_CODE, date: reportInfo.date})
                        });
                        const json = await res.json();
                        if (json.status === "success" && json.data) {
                            const d = json.data;
                            setReportInfo(prev => ({
                                ...prev,
                                recorder: d.recorder || prev.recorder,
                                doctor: d.doctor || prev.doctor,
                                hamamachiReason: d.hamamachiReason || ''
                            }));
                            setEvents(d.events || []);
                        }
                    } catch (e) {
                        console.warn("データの取得に失敗しました。オフラインモードです。", e);
                    }
                    setIsLoading(false);
                };
                fetchData();
            }, [reportInfo.date]);

            // --- ヘルパー関数 ---
            const timeToMinutes = (timeStr) => {
                if (!timeStr) return 0;
                const [hours, minutes] = timeStr.split(':').map(Number);
                return (hours - START_HOUR) * 60 + minutes;
            };

            const getRecoveryDuration = (event) => {
                const cat = Object.values(CATEGORIES).find(c => c.id === event.category);
                if (!cat || !cat.hasRecovery) return 0;
                if (event.isContinuous) return 0;
                const duration = timeToMinutes(event.end) - timeToMinutes(event.start);
                if (event.category === 'cancel') return 10;
                if (duration < 60) return 30;
                return 45;
            };

            const getBasePrepDuration = (event) => {
                const cat = Object.values(CATEGORIES).find(c => c.id === event.category);
                if (!cat || !cat.hasPrep) return 0;
                return 10;
            };

            const getPosition = (startMins, duration) => {
                const left = (startMins / TOTAL_MINUTES) * 100;
                const width = (duration / TOTAL_MINUTES) * 100;
                return { left: `${left}%`, width: `${width}%` };
            };

            const handleReportInfoChange = (e) => {
                const { name, value } = e.target;
                setReportInfo(prev => ({ ...prev, [name]: value }));
            };

            const handleReasonCheck = (reason) => {
                setReportInfo(prev => {
                    const currentReasons = prev.selectedReasons || [];
                    let newReasons;
                    if (currentReasons.includes(reason)) newReasons = currentReasons.filter(r => r !== reason);
                    else newReasons = [...currentReasons, reason];
                    
                    const combined = [...newReasons];
                    if (prev.otherReason) combined.push(prev.otherReason);
                    return { ...prev, selectedReasons: newReasons, hamamachiReason: combined.join('、') };
                });
            };

            const handleOtherReason = (e) => {
                const val = e.target.value;
                setReportInfo(prev => {
                    const combined = [...prev.selectedReasons];
                    if(val) combined.push(val);
                    return { ...prev, otherReason: val, hamamachiReason: combined.join('、') };
                });
            };

            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.type === 'checkbox' ? e.target.checked : e.target.value }));

            const handleKeyDown = (e, nextRef) => {
                if (e.nativeEvent.isComposing) return;
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (nextRef && nextRef.current) nextRef.current.focus();
                    else handleAddOrUpdate();
                }
            };

            const handleEditClick = (event) => {
                setEditingId(event.id);
                setFormData({ category: event.category, no: event.no || '', start: event.start, end: event.end, desc: event.desc, isContinuous: event.isContinuous });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCancelEdit = () => {
                setEditingId(null);
                setFormData({ category: 'mission', no: '', start: '', end: '', desc: '', isContinuous: false });
            };

            const handleAddOrUpdate = () => {
                if (!formData.start || !formData.end) { alert('開始時間と終了時間は必須です。'); return; }
                
                if (editingId) {
                    const updatedEvents = events.map(ev => ev.id === editingId ? { ...formData, id: editingId } : ev).sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
                    setEvents(updatedEvents);
                    setEditingId(null);
                } else {
                    const newEvent = { ...formData, id: Date.now().toString() };
                    setEvents([...events, newEvent].sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start)));
                }
                setFormData(prev => ({ category: prev.category, no: '', start: '', end: '', desc: '', isContinuous: false }));
                if (categoryRef.current) categoryRef.current.focus();
            };

            const handleDelete = (id) => {
                if (window.confirm('この項目を削除しますか？')) {
                    setEvents(events.filter(e => e.id !== id));
                    if (editingId === id) handleCancelEdit();
                }
            };

            const handleReset = () => {
                if(window.confirm('入力内容を全てクリアしますか？')) {
                    setEvents([]);
                    setEditingId(null);
                    setReportInfo({ date: new Date().toISOString().split('T')[0], recorder: '', doctor: '', hamamachiReason: '', selectedReasons: [], otherReason: '' });
                }
            };

            // GASへ保存
            const handleSaveToSheet = async () => {
                if (!reportInfo.date) return alert("日付が未入力です。");
                setLoadingMsg('スプレッドシートへ保存中...');
                setIsLoading(true);
                try {
                    const payload = {
                        action: "save_daily_report",
                        password: PIN_CODE,
                        date: reportInfo.date,
                        recorder: reportInfo.recorder,
                        doctor: reportInfo.doctor,
                        hamamachiReason: reportInfo.hamamachiReason,
                        events: events
                    };
                    const res = await fetch(GAS_API_URL, { method: "POST", headers: {"Content-Type": "text/plain;charset=utf-8"}, body: JSON.stringify(payload) });
                    const json = await res.json();
                    if(json.status === "success") alert("日報をスプレッドシートに保存しました！");
                    else alert("エラー: " + json.message);
                } catch(e) {
                    alert("通信エラーが発生しました。");
                }
                setIsLoading(false);
            };

            const sortedEvents = [...events].sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
            const printDateStr = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });

            return (
                <div className="p-4 max-w-full mx-auto min-h-screen font-sans print:bg-white print:p-0">
                    {/* ローダー */}
                    {isLoading && (
                        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center font-bold text-white text-sm no-print">
                            <div className="bg-slate-800 px-6 py-3 rounded-xl shadow-lg flex items-center gap-3"><Icons.Activity className="w-5 h-5 animate-pulse" /> {loadingMsg}</div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 mb-4 overflow-hidden print:border-0 print:shadow-none print:mb-2 print-break-avoid">
                        <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 print:bg-white print:border-b-2 print:border-slate-800 print:px-0">
                            <div className="flex items-center gap-2">
                                <Icons.ClipboardList className="w-5 h-5 text-blue-600 print:text-black" />
                                <h1 className="text-lg font-bold text-slate-800 print:text-black print:text-xl flex items-center gap-2">業務日報データ / 活動実績チャート <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full border border-blue-200 no-print">v2.0</span></h1>

                                        const isEditing = editingId === event.id;
                                        return (
                                            <tr key={event.id} className={`transition-colors print-list-row ${isEditing ? 'bg-amber-50' : isHovered ? 'bg-yellow-50' : 'hover:bg-slate-50'} print:bg-white`} onMouseEnter={() => setHoveredId(event.id)} onMouseLeave={() => setHoveredId(null)}>
                                                <td className="px-4 py-3 print:py-tight">
                                                    <div className="flex items-center gap-2">
                                                        <div className={`w-3 h-3 rounded-full ${cat.color.split(' ')[0]} print-color-adjust`} title={cat.label}></div>
                                                        <span className="hidden print:inline-block text-black print-color-adjust">
                                                            {IconComponent && <IconComponent className="w-3 h-3" />}
                                                        </span>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-3 font-mono font-bold print:py-tight">{event.no || '-'}</td>
                                                <td className="px-4 py-3 font-mono whitespace-nowrap print:py-tight">{event.start} - {event.end}</td>
                                                <td className="px-4 py-3 text-slate-600 print:py-tight">{endMins - startMins}分</td>
                                                <td className="px-4 py-3 text-slate-600 print:max-w-none print-wrap-text truncate max-w-xs" title={event.desc}>{event.desc}</td>
                                                <td className="px-4 py-3 text-center flex justify-center gap-2 no-print">
                                                    <button onClick={() => handleEditClick(event)} className={`transition-colors ${isEditing ? 'text-amber-600' : 'text-slate-400 hover:text-blue-600'}`} title="修正"><Icons.Edit3 className="w-4 h-4" /></button>
                                                    <button onClick={() => handleDelete(event.id)} className="text-slate-400 hover:text-red-500 transition-colors" title="削除"><Icons.Trash2 className="w-4 h-4" /></button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Print Footer */}
                    <div className="hidden print:block print-footer">
                        ドクターヘリ業務日報 | 出力日: {printDateStr}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DailyTimelineApp />);
    </script>
</body>
</html>
