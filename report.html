<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>業務日報 (浜町日誌)</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --ink: #1c1c1e;
      --sub: #8e8e93;
      --blue: #007aff;
      --line: rgba(60,60,67,0.12);
    }
    
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 20px; }
    header { max-width: 800px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
    .hdr-btn { background: none; border: none; color: var(--blue); font-weight: bold; cursor: pointer; font-size: 14px; }
    main { max-width: 800px; margin: 0 auto; }

    .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .title { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 12px; font-weight: bold; color: var(--sub); }
    input, select, textarea { padding: 10px; border-radius: 8px; border: 1px solid var(--line); font-size: 14px; background: #fff; outline: none; }

    .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .chip { background: var(--bg); border: 1px solid transparent; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: bold; cursor: pointer; color: var(--sub); transition: all 0.2s ease; }
    .chip.on { background: #e3f2fd; color: var(--blue); border-color: var(--blue); }

    /* 🌟 構造化タイムラインUIの復元デザイン */
    .timeline-container { display: flex; flex-direction: column; gap: 8px; }
    .evt-row { display: flex; gap: 12px; align-items: flex-start; background: #fafafa; border: 1px solid #e5e5ea; border-radius: 8px; padding: 12px; position: relative; }
    .evt-time-col { display: flex; flex-direction: column; gap: 4px; width: 110px; flex-shrink: 0; }
    .evt-time-input { padding: 6px; text-align: center; border-radius: 6px; border: 1px solid #ccc; font-family: monospace; font-size: 13px; }
    .time-sep { text-align: center; color: var(--sub); font-size: 12px; }
    .evt-desc-col { flex: 1; }
    .evt-desc-input { width: 100%; resize: vertical; min-height: 60px; font-size: 13px; padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
    
    .btn-remove { background: #ffebeb; color: #d32f2f; border: none; border-radius: 6px; width: 32px; height: 32px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-add-row { background: #e3f2fd; color: var(--blue); border: 1px dashed var(--blue); padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; }

    button.save-btn { width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 16px; }

    #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.2); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="global-loader">
  <div class="spinner"></div>
  <div style="margin-top:16px; font-weight:bold;">日報同期中...</div>
</div>

<header>
  <button class="hdr-btn" onclick="location.href='portal.html'">◀ ポータル</button>
  <div style="font-weight:800; font-size:16px;">業務日報 (浜町日誌) <span style="font-size:11px; background:var(--blue); color:#fff; padding:2px 6px; border-radius:4px; margin-left:4px;">v3.4</span></div>
  <div></div>
</header>

<main>
  <div class="card">
    <div class="title">📅 日報の作成・同期</div>
    <div class="form-grid">
      <div class="form-group"><label>対象日付</label><input type="date" id="r-date" onchange="syncFromDb(false)"></div>
      <div class="form-group"><label>記録者 (Ns)</label><select id="r-recorder"><option value="">選択...</option></select></div>
      <div class="form-group"><label>当直Dr</label><select id="v-dr"><option value="">選択...</option></select></div>
    </div>
    
    <div class="form-group" style="margin-top:16px;">
      <label>🚁 待機事由・不稼働理由選択 (複数選択可)</label>
      <div class="chip-grid" style="margin-top:8px;">
        <button class="chip" id="reason-風向き" onclick="toggleReason('風向き')">風向き</button>
        <button class="chip" id="reason-天候不良" onclick="toggleReason('天候不良')">天候不良</button>
        <button class="chip" id="reason-強風" onclick="toggleReason('強風')">強風</button>
        <button class="chip" id="reason-機体トラブル" onclick="toggleReason('機体トラブル')">機体トラブル</button>
      </div>
      <input type="hidden" id="r-reason">
    </div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div style="font-weight:800; font-size:15px;">📝 活動タイムライン</div>
      <button onclick="syncFromDb(true)" style="padding:6px 12px; font-size:12px; background:#e5e5ea; color:var(--ink); border:none; border-radius:6px; font-weight:bold; cursor:pointer;">
        🔄 データベースから強制再同期
      </button>
    </div>
    
    <!-- 🌟 個別編集可能な構造化タイムラインコンテナ -->
    <div id="timeline-container" class="timeline-container"></div>
    <button class="btn-add-row" onclick="addEventRow()">＋ 新しい行を追加</button>
  </div>

  <button class="save-btn" onclick="saveReport()">💾 この内容で日報を確定・保存する</button>
</main>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdmgxL3GL-x7sANo05V4nujuZ9CzKTZIuQ-KMNJlawOAJdcMTMZH37c4S0xdSXRFnr/exec";
  let currentEvents = [];
  let selectedReasons = [];

  window.onload = () => {
    const d = new Date();
    const todayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById("r-date").value = todayStr;
    fetchInit();
  };

  function toggleReason(reasonText) {
    const idx = selectedReasons.indexOf(reasonText);
    if (idx === -1) selectedReasons.push(reasonText); else selectedReasons.splice(idx, 1);
    document.querySelectorAll(".chip-grid .chip").forEach(btn => {
      btn.classList.toggle("on", selectedReasons.indexOf(btn.textContent) !== -1);
    });
    document.getElementById("r-reason").value = selectedReasons.join(",");
  }

  async function syncFromDb(force) {
    document.getElementById("global-loader").style.display = "flex";
    const dateVal = document.getElementById("r-date").value;
    
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "fetch_daily_report", date: dateVal, force_sync: force })
      });
      const json = await res.json();
      
      if (json.status === "success") {
        if (json.data.recorder) document.getElementById("r-recorder").value = json.data.recorder;
        if (json.data.doctor) document.getElementById("v-dr").value = json.data.doctor;
        
        if (json.data.hamamachiReason) {
          selectedReasons = json.data.hamamachiReason.split(",").filter(Boolean);
          document.querySelectorAll(".chip-grid .chip").forEach(btn => {
            btn.classList.toggle("on", selectedReasons.indexOf(btn.textContent) !== -1);
          });
          document.getElementById("r-reason").value = json.data.hamamachiReason;
        } else {
          selectedReasons = [];
          document.querySelectorAll(".chip-grid .chip").forEach(b => b.classList.remove("on"));
          document.getElementById("r-reason").value = "";
        }
        
        currentEvents = json.data.events || [];
        renderTimeline();
      }
    } catch(e) {
      alert("同期エラーが発生しました。");
    } finally {
      document.getElementById("global-loader").style.display = "none";
    }
  }

  // 🌟 行ごとのタイムライン描画（復元）
  function renderTimeline() {
    const container = document.getElementById("timeline-container");
    if (currentEvents.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--sub); font-size:13px;">データがありません。行を追加してください。</div>';
      return;
    }
    
    container.innerHTML = currentEvents.map((e, idx) => `
      <div class="evt-row">
        <div class="evt-time-col">
          <input type="time" class="evt-time-input" value="${e.start || ''}" onchange="updateEvent(${idx}, 'start', this.value)">
          <div class="time-sep">〜</div>
          <input type="time" class="evt-time-input" value="${e.end || ''}" onchange="updateEvent(${idx}, 'end', this.value)">
        </div>
        <div class="evt-desc-col">
          <textarea class="evt-desc-input" placeholder="活動内容・事案詳細" onchange="updateEvent(${idx}, 'desc', this.value)">${e.desc || ''}</textarea>
        </div>
        <button class="btn-remove" onclick="removeEvent(${idx})" title="削除">×</button>
      </div>
    `).join("");
  }

  function updateEvent(idx, field, value) {
    if(currentEvents[idx]) {
      currentEvents[idx][field] = value;
    }
  }

  function addEventRow() {
    currentEvents.push({ start: "", end: "", desc: "", category: "inspection" });
    renderTimeline();
  }

  function removeEvent(idx) {
    if(confirm("この行を削除しますか？")) {
      currentEvents.splice(idx, 1);
      renderTimeline();
    }
  }

  async function saveReport() {
    const dateVal = document.getElementById("r-date").value;
    const rec = document.getElementById("r-recorder").value;
    const dr = document.getElementById("v-dr").value;
    const reason = document.getElementById("r-reason").value;
    
    if (!rec || !dr) return alert("「記録者」と「当直Dr」を選択してください。");

    document.getElementById("global-loader").style.display = "flex";
    
    try {
      const payload = {
        action: "save_daily_report",
        date: dateVal,
        recorder: rec,
        doctor: dr,
        hamamachiReason: reason,
        events: currentEvents
      };

      const res = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      
      const json = await res.json();
      if (json.status === "success") {
        alert("日報をスプレッドシートへ保存しました。");
      } else {
        alert("保存中にエラーが発生しました: " + json.message);
      }
    } catch(e) {
      alert("保存エラーが発生しました。");
    } finally {
      document.getElementById("global-loader").style.display = "none";
    }
  }

  async function fetchInit() {
    try {
      const res = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "fetch_init", app_name: "日報" })
      });
      const json = await res.json();
      if (json.status === "success") {
        const fillOptions = (id, arr) => {
          document.getElementById(id).innerHTML = '<option value="">選択...</option>' + arr.map(v => `<option value="${v}">${v}</option>`).join("");
        };
        fillOptions("r-recorder", json.masters.ns);
        fillOptions("v-dr", json.masters.dr);
        syncFromDb(false);
      }
    } catch(e) {
      document.getElementById("global-loader").style.display = "none";
    }
  }
</script>
</body>
</html>
